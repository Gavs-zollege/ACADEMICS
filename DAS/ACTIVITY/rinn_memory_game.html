<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RINN XCP Memory Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh; overflow: hidden;
    background: linear-gradient(160deg, #0c0c1a 0%, #141430 40%, #0e1a2e 100%);
    font-family: 'Playfair Display', Georgia, serif;
    display: flex; flex-direction: column;
    padding: 10px 14px 8px;
    user-select: none;
  }

  .header { text-align: center; flex-shrink: 0; margin-bottom: 6px; }
  .header-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 5px;
  }
  .title { font-size: 17px; font-weight: 700; color: #56B4D3; letter-spacing: 0.5px; }
  .reset-btn {
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.08); padding: 3px 14px;
    border-radius: 50px; font-size: 10px; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { color: #56B4D3; border-color: rgba(86,180,211,0.3); }

  .stats-row { display: flex; justify-content: center; gap: 10px; align-items: center; }
  .stat {
    background: rgba(255,255,255,0.04); border-radius: 8px;
    padding: 3px 12px; border: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 4px;
  }
  .stat-icon { font-size: 11px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 12px; color: #56B4D3; font-weight: 500; }
  .progress-track {
    height: 3px; width: 80px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg,#56B4D3,#7ED4E6);
    border-radius: 3px; transition: width 0.6s ease; width: 0%;
  }

  .grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 7px; max-width: 820px; width: 100%;
    margin: 0 auto; min-height: 0;
  }

  .card { perspective: 1000px; cursor: pointer; }
  .card.matched, .card.flipped { cursor: default; }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 10px; overflow: hidden;
  }

  .card-back {
    background: linear-gradient(145deg, #151528 0%, #1d1d3a 50%, #112847 100%);
    border: 1.5px solid rgba(86,180,211,0.18);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 3px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.3);
  }
  .card-back::before {
    content: ''; position: absolute; inset: 0; opacity: 0.25;
    background-image: radial-gradient(circle at 25% 25%, rgba(86,180,211,0.08) 1px, transparent 1px),
                      radial-gradient(circle at 75% 75%, rgba(86,180,211,0.08) 1px, transparent 1px);
    background-size: 12px 12px;
  }
  .card-back-icon { font-size: 20px; position: relative; z-index: 1; }
  .card-back-text {
    font-family: 'DM Mono', monospace; font-size: 7px;
    color: rgba(86,180,211,0.4); letter-spacing: 2px; text-transform: uppercase;
    position: relative; z-index: 1;
  }

  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #1a1a2e 0%, #24243f 100%);
    border: 1.5px solid rgba(255,255,255,0.1);
    box-shadow: 0 3px 14px rgba(0,0,0,0.3);
    display: flex; flex-direction: column;
  }
  .card.matched .card-front {
    background: linear-gradient(145deg, #0b2b1a 0%, #183f2a 100%);
    border: 2px solid rgba(78,205,136,0.45);
    box-shadow: 0 0 18px rgba(78,205,136,0.1);
  }

  .card-img-wrap { width: 100%; height: 100%; position: relative; }
  .card-img {
    width: 100%; height: 100%; object-fit: contain;
    border-radius: 8px; display: block;
    background: #f5f5f5;
  }
  .card-img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 14px 8px 5px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    border-radius: 0 0 8px 8px;
    display: flex; align-items: center; gap: 3px;
  }
  .card-img-label-emoji { font-size: 10px; }
  .card-img-label-text { font-weight: 700; font-size: 9px; color: #fff; }

  .card-text-content {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 6px 8px; width: 100%; height: 100%;
    justify-content: center; gap: 3px;
  }
  .card-text-header { display: flex; align-items: center; gap: 3px; }
  .card-text-emoji { font-size: 12px; }
  .card-text-label { font-size: 10px; font-weight: 700; }
  .card-text-body {
    font-size: 9.5px; line-height: 1.45; color: rgba(255,255,255,0.78); text-align: left;
  }

  .match-check {
    position: absolute; top: 4px; right: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(78,205,136,0.9);
    display: none; align-items: center; justify-content: center;
    font-size: 10px; color: #fff; font-weight: bold;
    box-shadow: 0 2px 6px rgba(78,205,136,0.4);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.matched .match-check { display: flex; }

  .match-notify {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%); z-index: 100;
    padding: 10px 26px; background: rgba(78,205,136,0.92);
    border-radius: 60px; pointer-events: none;
    box-shadow: 0 8px 30px rgba(78,205,136,0.4);
    font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap;
    opacity: 0; display: none;
  }
  .match-notify.show { display: block; animation: matchNotify 1.2s ease-out forwards; }

  .win-screen { flex: 1; display: none; align-items: center; justify-content: center; }
  .win-screen.show { display: flex; }
  .win-card {
    text-align: center; animation: slideUp 0.6s ease-out;
    background: rgba(255,255,255,0.04); border-radius: 22px;
    padding: 28px 32px; border: 1px solid rgba(86,180,211,0.15);
    max-width: 400px; width: 100%;
  }
  .win-trophy { font-size: 42px; margin-bottom: 8px; }
  .win-title { font-size: 21px; color: #56B4D3; margin-bottom: 4px; }
  .win-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 18px; }
  .win-stats { display: flex; justify-content: center; gap: 22px; margin-bottom: 18px; }
  .win-stat-label {
    color: rgba(255,255,255,0.3); font-size: 9px; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 2px; font-family: 'DM Mono', monospace;
  }
  .win-stat-value { color: #FFE66D; font-size: 24px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .win-stat-value.best { color: #A8E6CF; }
  .win-divider { width: 1px; height: 34px; background: rgba(255,255,255,0.08); align-self: center; }
  .win-msg { font-size: 14px; color: #fff; margin-bottom: 16px; }
  .play-again-btn {
    background: linear-gradient(135deg,#56B4D3,#4A9DB8); color: #0c0c1a;
    border: none; padding: 10px 34px; border-radius: 50px;
    font-size: 13px; font-weight: 700; font-family: 'Playfair Display', serif;
    cursor: pointer; box-shadow: 0 4px 18px rgba(86,180,211,0.3);
    transition: transform 0.2s;
  }
  .play-again-btn:hover { transform: scale(1.05); }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; display: none; }
  .confetti-container.show { display: block; }
  .confetti-piece { position: absolute; top: -20px; border-radius: 2px; animation: confettiFall ease-in forwards; }

  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  @keyframes cardEntry { from{opacity:0;transform:scale(0.85) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes matchNotify {
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
    15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
    25%{transform:translate(-50%,-50%) scale(1)}
    75%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) translateY(-20px)}
  }
</style>
</head>
<body>

<div class="match-notify" id="matchNotify"></div>
<div class="confetti-container" id="confetti"></div>

<div class="header">
  <div class="header-row">
    <div class="title">🦷 RINN XCP Memory Match</div>
    <button class="reset-btn" onclick="startGame()">🔄 Reset</button>
  </div>
  <div class="stats-row">
    <div class="stat"><span class="stat-icon">🎯</span><span class="stat-val" id="movesVal">0</span></div>
    <div class="stat"><span class="stat-icon">⏱️</span><span class="stat-val" id="timerVal">0:00</span></div>
    <div class="stat"><span class="stat-icon">🧩</span><span class="stat-val" id="pairsVal">0/5</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="win-screen" id="winScreen">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <h2 class="win-title">Excellent Work!</h2>
    <p class="win-sub">All RINN instruments matched!</p>
    <div class="win-stats" id="winStats"></div>
    <div class="win-msg" id="winMsg"></div>
    <button class="play-again-btn" onclick="startGame()">Play Again 🔄</button>
  </div>
</div>

const CARDS_DATA = [
  { id:"rinn-xcp", type:"image", label:"RINN XCP Set", img:IMAGES.rinn_xcp, match:"rinn-xcp-text", emoji:"🦷", color:"#56B4D3" },
  { id:"rinn-xcp-text", type:"text", label:"RINN XCP Holders", text:"Used to accurately align intraoral sensors or film during radiographic procedures. Each holder is color-coded for specific uses.", match:"rinn-xcp", emoji:"🦷", color:"#56B4D3" },
  { id:"sensor", type:"image", label:"Digital Sensor", img:IMAGES.digital_sensor, match:"sensor-text", emoji:"📡", color:"#A78BFA" },
  { id:"sensor-text", type:"text", label:"Digital Sensor", text:"Where data is digitally converted and transmitted. The sensor acts as the camera and captures the X-ray images.", match:"sensor", emoji:"📡", color:"#A78BFA" },
  { id:"yellow", type:"image", label:"Yellow RINN", img:IMAGES.yellow_rinn, match:"yellow-text", emoji:"🟡", color:"#FACC15" },
  { id:"yellow-text", type:"text", label:"Yellow RINN", text:"Used for Anterior radiographs. The yellow color code indicates positioning for front teeth imaging.", match:"yellow", emoji:"🟡", color:"#FACC15" },
  { id:"blue", type:"image", label:"Blue RINN", img:IMAGES.blue_rinn, match:"blue-text", emoji:"🔵", color:"#3B82F6" },
  { id:"blue-text", type:"text", label:"Blue RINN", text:"Used for Posterior radiographs. The blue color code indicates positioning for back teeth imaging.", match:"blue", emoji:"🔵", color:"#3B82F6" },
  { id:"red", type:"image", label:"Red RINN", img:IMAGES.red_rinn, match:"red-text", emoji:"🔴", color:"#EF4444" },
  { id:"red-text", type:"text", label:"Red RINN", text:"Used for Bitewing radiographs. The red color code indicates positioning for interproximal imaging.", match:"red", emoji:"🔴", color:"#EF4444" },
];

const TOTAL_PAIRS = 5;
let cards = [], flipped = [], matched = new Set(), moves = 0, timer = 0, timerID = null, bestScore = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  cards = shuffle(CARDS_DATA);
  flipped = []; matched = new Set(); moves = 0; timer = 0;
  clearInterval(timerID);
  timerID = setInterval(() => { timer++; document.getElementById("timerVal").textContent = fmtTime(timer); }, 1000);
  updateStats();
  renderGrid();
  document.getElementById("grid").style.display = "grid";
  document.getElementById("winScreen").classList.remove("show");
  document.getElementById("confetti").classList.remove("show");
}

function fmtTime(s) { return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); }

function updateStats() {
  document.getElementById("movesVal").textContent = moves;
  document.getElementById("timerVal").textContent = fmtTime(timer);
  const mc = matched.size / 2;
  document.getElementById("pairsVal").textContent = mc + "/" + TOTAL_PAIRS;
  document.getElementById("progressFill").style.width = (mc/TOTAL_PAIRS*100) + "%";
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards.forEach((card, i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.style.animation = "cardEntry 0.4s " + (i*0.04) + "s both cubic-bezier(0.34,1.56,0.64,1)";
    el.dataset.index = i;
    el.onclick = () => handleFlip(i, el);

    let frontContent = "";
    if (card.type === "image") {
      frontContent =
        '<div class="card-img-wrap">' +
          '<img class="card-img" src="' + card.img + '" alt="' + card.label + '">' +
          '<div class="card-img-label">' +
            '<span class="card-img-label-emoji">' + card.emoji + '</span>' +
            '<span class="card-img-label-text">' + card.label + '</span>' +
          '</div>' +
        '</div>';
    } else {
      frontContent =
        '<div class="card-text-content">' +
          '<div class="card-text-header">' +
            '<span class="card-text-emoji">' + card.emoji + '</span>' +
            '<span class="card-text-label" style="color:' + card.color + '">' + card.label + '</span>' +
          '</div>' +
          '<p class="card-text-body">' + card.text + '</p>' +
        '</div>';
    }

    el.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-face card-back">' +
          '<span class="card-back-icon">🦷</span>' +
          '<span class="card-back-text">FLIP ME</span>' +
        '</div>' +
        '<div class="card-face card-front">' +
          frontContent +
          '<div class="match-check">✓</div>' +
        '</div>' +
      '</div>';
    grid.appendChild(el);
  });
}

function handleFlip(index, el) {
  if (flipped.length >= 2 || el.classList.contains("flipped") || el.classList.contains("matched")) return;
  el.classList.add("flipped");
  flipped.push({ index, el });

  if (flipped.length === 2) {
    moves++;
    updateStats();
    const [a, b] = flipped;
    const cA = cards[a.index], cB = cards[b.index];

    if (cA.match === cB.id) {
      showMatchNotify(cA.label);
      setTimeout(() => {
        a.el.classList.add("matched");
        b.el.classList.add("matched");
        matched.add(cA.id);
        matched.add(cB.id);
        flipped = [];
        updateStats();
        if (matched.size === CARDS_DATA.length) winGame();
      }, 700);
    } else {
      setTimeout(() => {
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        flipped = [];
      }, 1100);
    }
  }
}

function showMatchNotify(label) {
  const n = document.getElementById("matchNotify");
  n.textContent = "✨ " + label + " Matched!";
  n.classList.remove("show");
  void n.offsetWidth;
  n.classList.add("show");
  setTimeout(() => n.classList.remove("show"), 1300);
}

function winGame() {
  clearInterval(timerID);
  if (!bestScore || moves < bestScore) bestScore = moves;

  document.getElementById("grid").style.display = "none";
  document.getElementById("winScreen").classList.add("show");

  let statsHTML =
    '<div><div class="win-stat-label">Moves</div><div class="win-stat-value">' + moves + '</div></div>' +
    '<div class="win-divider"></div>' +
    '<div><div class="win-stat-label">Time</div><div class="win-stat-value">' + fmtTime(timer) + '</div></div>';
  if (bestScore !== null) {
    statsHTML +=
      '<div class="win-divider"></div>' +
      '<div><div class="win-stat-label">Best</div><div class="win-stat-value best">' + bestScore + '</div></div>';
  }
  document.getElementById("winStats").innerHTML = statsHTML;
  document.getElementById("winMsg").textContent =
    moves <= 7 ? "🌟 Perfect memory!" : moves <= 12 ? "💪 Great job!" : "👍 Keep practicing!";

  spawnConfetti();
}

function spawnConfetti() {
  const colors = ["#FF6B6B","#56B4D3","#FFE66D","#A8E6CF","#FF8B94","#B8F3FF","#DDA0DD","#98D8C8"];
  const container = document.getElementById("confetti");
  container.innerHTML = "";
  container.classList.add("show");
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    const size = 6 + Math.random() * 8;
    p.style.cssText =
      "left:" + (Math.random()*100) + "%; width:" + size + "px; height:" + (size*0.6) + "px;" +
      "background:" + colors[Math.floor(Math.random()*colors.length)] + ";" +
      "transform:rotate(" + (Math.random()*360) + "deg);" +
      "animation-duration:" + (1.5+Math.random()*2) + "s;" +
      "animation-delay:" + (Math.random()*0.6) + "s;";
    container.appendChild(p);
  }
  setTimeout(() => container.classList.remove("show"), 4000);
}

startGame();
</script>
