<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathogen Memory Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh; overflow: hidden;
    background: linear-gradient(160deg, #0a0a16 0%, #12122a 40%, #101830 100%);
    font-family: 'Playfair Display', Georgia, serif;
    display: flex; flex-direction: column;
    padding: 10px 14px 8px;
    user-select: none;
  }

  /* HEADER */
  .header { text-align: center; flex-shrink: 0; margin-bottom: 8px; }
  .header-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 6px;
  }
  .title { font-size: 18px; font-weight: 700; color: #4ECDC4; letter-spacing: 0.5px; }
  .reset-btn {
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.08); padding: 3px 14px;
    border-radius: 50px; font-size: 10px; font-family: 'DM Mono', monospace;
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { color: #4ECDC4; border-color: rgba(78,205,196,0.3); }

  .stats-row { display: flex; justify-content: center; gap: 10px; align-items: center; }
  .stat {
    background: rgba(255,255,255,0.04); border-radius: 8px;
    padding: 3px 12px; border: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 4px;
  }
  .stat-icon { font-size: 11px; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 12px; color: #4ECDC4; font-weight: 500; }
  .progress-track {
    height: 3px; width: 80px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg,#4ECDC4,#56CFE1);
    border-radius: 3px; transition: width 0.6s ease; width: 0%;
  }

  /* GRID */
  .grid {
    flex: 1; display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px; max-width: 740px; width: 100%;
    margin: 0 auto; min-height: 0;
  }

  /* CARD */
  .card { perspective: 1000px; cursor: pointer; }
  .card.matched, .card.flipped { cursor: default; }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 12px; overflow: hidden;
  }

  /* Back */
  .card-back {
    background: linear-gradient(145deg, #141428 0%, #1c1c3a 50%, #0f2847 100%);
    border: 1.5px solid rgba(78,205,196,0.18);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .card-back::before {
    content: ''; position: absolute; inset: 0; opacity: 0.3;
    background-image: radial-gradient(circle at 25% 25%, rgba(78,205,196,0.08) 1px, transparent 1px),
                      radial-gradient(circle at 75% 75%, rgba(78,205,196,0.08) 1px, transparent 1px);
    background-size: 14px 14px;
  }
  .card-back-icon { font-size: 22px; position: relative; z-index: 1; }
  .card-back-text {
    font-family: 'DM Mono', monospace; font-size: 7px;
    color: rgba(78,205,196,0.45); letter-spacing: 2px; text-transform: uppercase;
    position: relative; z-index: 1;
  }

  /* Front */
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #18182d 0%, #222240 100%);
    border: 1.5px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    display: flex; flex-direction: column;
  }
  .card.matched .card-front {
    background: linear-gradient(145deg, #0b2b18 0%, #163d28 100%);
    border: 2px solid rgba(78,205,136,0.5);
    box-shadow: 0 0 20px rgba(78,205,136,0.12);
  }

  /* Image card */
  .card-img-wrap { width: 100%; height: 100%; position: relative; }
  .card-img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: block; }
  .card-img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 10px 6px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    border-radius: 0 0 10px 10px;
    display: flex; align-items: center; gap: 4px;
  }
  .card-img-label-emoji { font-size: 12px; }
  .card-img-label-text { font-weight: 700; font-size: 11px; color: #fff; }

  /* Text card */
  .card-text-content {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 8px 10px; width: 100%; height: 100%;
    justify-content: center; gap: 4px;
  }
  .card-text-header { display: flex; align-items: center; gap: 4px; }
  .card-text-emoji { font-size: 14px; }
  .card-text-label { font-size: 11px; font-weight: 700; }
  .card-text-body {
    font-size: 10px; line-height: 1.5; color: rgba(255,255,255,0.8); text-align: left;
  }

  /* Match check */
  .match-check {
    position: absolute; top: 5px; right: 5px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(78,205,136,0.9);
    display: none; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; font-weight: bold;
    box-shadow: 0 2px 8px rgba(78,205,136,0.4);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .card.matched .match-check { display: flex; }

  /* Match notification */
  .match-notify {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%); z-index: 100;
    padding: 10px 28px; background: rgba(78,205,136,0.92);
    border-radius: 60px; pointer-events: none;
    box-shadow: 0 8px 32px rgba(78,205,136,0.4);
    font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap;
    opacity: 0; display: none;
  }
  .match-notify.show {
    display: block;
    animation: matchNotify 1.2s ease-out forwards;
  }

  /* Win overlay */
  .win-screen {
    flex: 1; display: none; align-items: center; justify-content: center;
  }
  .win-screen.show { display: flex; }
  .win-card {
    text-align: center; animation: slideUp 0.6s ease-out;
    background: rgba(255,255,255,0.04); border-radius: 24px;
    padding: 32px 36px; border: 1px solid rgba(78,205,196,0.15);
    max-width: 420px; width: 100%;
  }
  .win-trophy { font-size: 44px; margin-bottom: 10px; }
  .win-title { font-size: 22px; color: #4ECDC4; margin-bottom: 4px; }
  .win-sub { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 20px; }
  .win-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; }
  .win-stat-label {
    color: rgba(255,255,255,0.3); font-size: 9px; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 2px; font-family: 'DM Mono', monospace;
  }
  .win-stat-value { color: #FFE66D; font-size: 26px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .win-stat-value.best { color: #A8E6CF; }
  .win-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.08); align-self: center; }
  .win-msg { font-size: 15px; color: #fff; margin-bottom: 18px; }
  .play-again-btn {
    background: linear-gradient(135deg,#4ECDC4,#45B7AA); color: #0a0a16;
    border: none; padding: 11px 36px; border-radius: 50px;
    font-size: 14px; font-weight: 700; font-family: 'Playfair Display', serif;
    cursor: pointer; box-shadow: 0 4px 20px rgba(78,205,196,0.3);
    transition: transform 0.2s;
  }
  .play-again-btn:hover { transform: scale(1.05); }

  /* Confetti */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; display: none; }
  .confetti-container.show { display: block; }
  .confetti-piece {
    position: absolute; top: -20px; border-radius: 2px;
    animation: confettiFall ease-in forwards;
  }

  /* Animations */
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  @keyframes cardEntry { from{opacity:0;transform:scale(0.85) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes matchNotify {
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
    15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
    25%{transform:translate(-50%,-50%) scale(1)}
    75%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-50%) scale(0.9) translateY(-20px)}
  }
</style>
</head>
<body>

<div class="match-notify" id="matchNotify"></div>
<div class="confetti-container" id="confetti"></div>

<div class="header">
  <div class="header-row">
    <div class="title">🔬 Pathogen Memory Match</div>
    <button class="reset-btn" onclick="startGame()">🔄 Reset</button>
  </div>
  <div class="stats-row">
    <div class="stat"><span class="stat-icon">🎯</span><span class="stat-val" id="movesVal">0</span></div>
    <div class="stat"><span class="stat-icon">⏱️</span><span class="stat-val" id="timerVal">0:00</span></div>
    <div class="stat"><span class="stat-icon">🧩</span><span class="stat-val" id="pairsVal">0/4</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="win-screen" id="winScreen">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <h2 class="win-title">Excellent Work!</h2>
    <p class="win-sub">All pathogens matched!</p>
    <div class="win-stats" id="winStats"></div>
    <div class="win-msg" id="winMsg"></div>
    <button class="play-again-btn" onclick="startGame()">Play Again 🔄</button>
  </div>
</div>

const CARDS_DATA = [
  { id:"bacteria", type:"image", label:"Bacteria", img:IMAGES.bacteria, match:"bacteria-text", emoji:"🦠", color:"#4EA8DE" },
  { id:"bacteria-text", type:"text", label:"Bacteria", text:"Three primary shapes: cocci (spherical), bacilli (rod-shaped), and spirilla (spiral). Classified by the Gram stain — Gram-positive have thick cell walls.", match:"bacteria", emoji:"🦠", color:"#4EA8DE" },
  { id:"virus", type:"image", label:"Viruses", img:IMAGES.virus, match:"virus-text", emoji:"🧬", color:"#F4845F" },
  { id:"virus-text", type:"text", label:"Viruses", text:"Much smaller than bacteria and unable to replicate alone — they hijack a host cell's machinery. Examples: HIV, HSV, and Influenza.", match:"virus", emoji:"🧬", color:"#F4845F" },
  { id:"fungi", type:"image", label:"Fungi", img:IMAGES.fungi, match:"fungi-text", emoji:"🍄", color:"#56CFE1" },
  { id:"fungi-text", type:"text", label:"Fungi", text:"Example: Candida albicans, causing oral thrush. Thrive in warm, moist environments. Infections arise when normal flora is imbalanced.", match:"fungi", emoji:"🍄", color:"#56CFE1" },
  { id:"prion", type:"image", label:"Prions", img:IMAGES.prion, match:"prion-text", emoji:"🧠", color:"#E07A5F" },
  { id:"prion-text", type:"text", label:"Prions", text:"Infectious proteins lacking genetic material that cause neurological disorders by misfolding brain proteins. Example: Creutzfeldt-Jakob Disease.", match:"prion", emoji:"🧠", color:"#E07A5F" },
];

let cards = [], flipped = [], matched = new Set(), moves = 0, timer = 0, timerID = null, bestScore = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  cards = shuffle(CARDS_DATA);
  flipped = []; matched = new Set(); moves = 0; timer = 0;
  clearInterval(timerID);
  timerID = setInterval(() => { timer++; document.getElementById("timerVal").textContent = fmtTime(timer); }, 1000);
  updateStats();
  renderGrid();
  document.getElementById("grid").style.display = "grid";
  document.getElementById("winScreen").classList.remove("show");
  document.getElementById("confetti").classList.remove("show");
}

function fmtTime(s) { return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); }

function updateStats() {
  document.getElementById("movesVal").textContent = moves;
  document.getElementById("timerVal").textContent = fmtTime(timer);
  const mc = matched.size / 2;
  document.getElementById("pairsVal").textContent = mc + "/4";
  document.getElementById("progressFill").style.width = (mc/4*100) + "%";
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards.forEach((card, i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.style.animation = `cardEntry 0.4s ${i*0.05}s both cubic-bezier(0.34,1.56,0.64,1)`;
    el.dataset.index = i;
    el.onclick = () => handleFlip(i, el);

    let frontContent = "";
    if (card.type === "image") {
      frontContent = `
        <div class="card-img-wrap">
          <img class="card-img" src="${card.img}" alt="${card.label}">
          <div class="card-img-label">
            <span class="card-img-label-emoji">${card.emoji}</span>
            <span class="card-img-label-text">${card.label}</span>
          </div>
        </div>`;
    } else {
      frontContent = `
        <div class="card-text-content">
          <div class="card-text-header">
            <span class="card-text-emoji">${card.emoji}</span>
            <span class="card-text-label" style="color:${card.color}">${card.label}</span>
          </div>
          <p class="card-text-body">${card.text}</p>
        </div>`;
    }

    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <span class="card-back-icon">🔬</span>
          <span class="card-back-text">FLIP ME</span>
        </div>
        <div class="card-face card-front">
          ${frontContent}
          <div class="match-check">✓</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}

function handleFlip(index, el) {
  if (flipped.length >= 2 || el.classList.contains("flipped") || el.classList.contains("matched")) return;
  el.classList.add("flipped");
  flipped.push({ index, el });

  if (flipped.length === 2) {
    moves++;
    updateStats();
    const [a, b] = flipped;
    const cA = cards[a.index], cB = cards[b.index];

    if (cA.match === cB.id) {
      showMatchNotify(cA.label);
      setTimeout(() => {
        a.el.classList.add("matched");
        b.el.classList.add("matched");
        matched.add(cA.id);
        matched.add(cB.id);
        flipped = [];
        updateStats();
        if (matched.size === CARDS_DATA.length) winGame();
      }, 700);
    } else {
      setTimeout(() => {
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        flipped = [];
      }, 1100);
    }
  }
}

function showMatchNotify(label) {
  const n = document.getElementById("matchNotify");
  n.textContent = "✨ " + label + " Matched!";
  n.classList.remove("show");
  void n.offsetWidth;
  n.classList.add("show");
  setTimeout(() => n.classList.remove("show"), 1300);
}

function winGame() {
  clearInterval(timerID);
  if (!bestScore || moves < bestScore) bestScore = moves;

  document.getElementById("grid").style.display = "none";
  document.getElementById("winScreen").classList.add("show");

  let statsHTML = `
    <div><div class="win-stat-label">Moves</div><div class="win-stat-value">${moves}</div></div>
    <div class="win-divider"></div>
    <div><div class="win-stat-label">Time</div><div class="win-stat-value">${fmtTime(timer)}</div></div>`;
  if (bestScore !== null) {
    statsHTML += `<div class="win-divider"></div>
      <div><div class="win-stat-label">Best</div><div class="win-stat-value best">${bestScore}</div></div>`;
  }
  document.getElementById("winStats").innerHTML = statsHTML;
  document.getElementById("winMsg").textContent =
    moves <= 6 ? "🌟 Perfect memory!" : moves <= 10 ? "💪 Great job!" : "👍 Keep practicing!";

  spawnConfetti();
}

function spawnConfetti() {
  const colors = ["#FF6B6B","#4ECDC4","#FFE66D","#A8E6CF","#FF8B94","#B8F3FF","#DDA0DD","#98D8C8"];
  const container = document.getElementById("confetti");
  container.innerHTML = "";
  container.classList.add("show");
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      left:${Math.random()*100}%; width:${size}px; height:${size*0.6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      transform:rotate(${Math.random()*360}deg);
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.6}s;`;
    container.appendChild(p);
  }
  setTimeout(() => container.classList.remove("show"), 4000);
}

startGame();
</script>
