<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dental Assistant Flashcards – Week 10</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f7f6f2;
      --surface:    #ffffff;
      --surface2:   #f0ede8;
      --border:     #e4e2da;
      --border2:    #ccc9bf;
      --text:       #1a1916;
      --muted:      #74726a;
      --accent:     #1d5fa8;
      --accent-bg:  #e8f0fb;
      --accent-bd:  #a8c5ed;
      --green:      #1e6b3c;
      --green-bg:   #e6f4ec;
      --green-bd:   #7ec49a;
      --amber:      #7a4a0a;
      --amber-bg:   #fef3e2;
      --amber-bd:   #f0c060;
      --radius-md:  10px;
      --radius-lg:  14px;
      --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      --shadow-lg:  0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    #app { max-width: 560px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .header-icon {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-icon svg { width: 22px; height: 22px; fill: #fff; }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub   { font-size: 13px; color: var(--muted); margin-top: 1px; }

    /* Progress */
    .progress-wrap { margin-bottom: 1rem; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s; }

    /* Score pills */
    .score-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .pill { font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 99px; border: 1px solid; }
    .pill-got    { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
    .pill-missed { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }

    /* Flashcard */
    .card {
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius-lg);
      min-height: 230px;
      display: flex; flex-direction: column;
      justify-content: flex-start;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: background .25s, border-color .25s;
      box-shadow: var(--shadow-lg);
      margin-bottom: 1.25rem;
    }
    .card.flipped { background: var(--surface); border-color: var(--border); }

    .card-label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: 1rem;
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      background: rgba(255,255,255,.15); color: rgba(255,255,255,.8);
      align-self: flex-start;
    }
    .card.flipped .card-label { background: var(--accent-bg); color: var(--accent); }

    .card-q {
      font-size: 16px; font-weight: 500; line-height: 1.6; color: #fff;
      flex: 1; display: flex; align-items: center;
    }
    .card-a {
      font-size: 14px; font-weight: 400; line-height: 1.7; color: var(--text);
      flex: 1; white-space: pre-line;
    }
    .card-hint { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 12px; }

    /* Buttons */
    .btn-reveal {
      width: 100%; padding: 11px; border-radius: var(--radius-md);
      border: 1px solid var(--accent-bd); background: var(--accent-bg); color: var(--accent);
      font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .12s; margin-bottom: 8px;
    }
    .btn-reveal:hover { background: #d4e4f7; }

    .answer-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn-got {
      flex: 1; padding: 11px 10px; border-radius: var(--radius-md);
      border: 1px solid var(--green-bd); background: var(--green-bg); color: var(--green);
      font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .12s;
    }
    .btn-got:hover { background: #d0edda; }
    .btn-miss {
      flex: 1; padding: 11px 10px; border-radius: var(--radius-md);
      border: 1px solid var(--amber-bd); background: var(--amber-bg); color: var(--amber);
      font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: all .12s;
    }
    .btn-miss:hover { background: #fdeac8; }

    .btn-next {
      width: 100%; padding: 11px; border-radius: var(--radius-md);
      border: none; background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity .12s;
    }
    .btn-next:hover { opacity: .88; }

    /* Done screen */
    #done-screen { display: none; }
    .done-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2.5rem 2rem;
      text-align: center; box-shadow: var(--shadow-lg);
    }
    .done-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-bg); border: 1px solid var(--accent-bd);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 26px;
    }
    .done-title  { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .done-score  { font-size: 14px; color: var(--muted); margin-bottom: 1.25rem; }
    .done-stats  { display: flex; gap: 10px; margin-bottom: 1rem; }
    .done-stat   { flex: 1; border-radius: var(--radius-md); padding: 14px 10px; text-align: center; border: 1px solid; }
    .done-stat.got    { background: var(--green-bg); border-color: var(--green-bd); }
    .done-stat.missed { background: var(--amber-bg); border-color: var(--amber-bd); }
    .done-stat-num    { font-size: 28px; font-weight: 600; }
    .done-stat.got    .done-stat-num { color: var(--green); }
    .done-stat.missed .done-stat-num { color: var(--amber); }
    .done-stat-lbl    { font-size: 12px; font-weight: 500; margin-top: 2px; color: var(--muted); }
    .done-msg    { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
    .btn-restart {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-restart:hover { opacity: .88; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Dental Assistant Flashcards</div>
      <div class="header-sub">Week 10 — Resume, Interview &amp; Career</div>
    </div>
  </div>

  <!-- Main screen -->
  <div id="main-screen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="card-count">Card 1 of 12</span>
        <span id="correct-count">0 correct</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="score-row">
      <span class="pill pill-got"    id="pill-got">Got it: 0</span>
      <span class="pill pill-missed" id="pill-missed">Review: 0</span>
    </div>

    <div class="card" id="card" onclick="flipCard()">
      <div class="card-label" id="card-label">Question — tap to flip</div>
      <div class="card-q" id="card-q"></div>
      <div class="card-a" id="card-a" style="display:none"></div>
      <div class="card-hint" id="card-hint">Tap to reveal answer</div>
    </div>

    <div id="btn-area"></div>
  </div>

  <!-- Done screen -->
  <div id="done-screen">
    <div class="done-card">
      <div class="done-icon" id="done-icon">&#127881;</div>
      <p class="done-title">You finished!</p>
      <p class="done-score" id="done-score"></p>
      <div class="done-stats">
        <div class="done-stat got">
          <div class="done-stat-num" id="final-got">0</div>
          <div class="done-stat-lbl">Got it</div>
        </div>
        <div class="done-stat missed">
          <div class="done-stat-num" id="final-missed">0</div>
          <div class="done-stat-lbl">Review</div>
        </div>
      </div>
      <p class="done-msg" id="done-msg"></p>
      <button class="btn-restart" onclick="restart()">Play again</button>
    </div>
  </div>

</div>

<script>
const CARDS = [
  { q: "What are the 5 recommended sections of a Dental Assistant resume?",
    a: "1. Contact Information\n2. Professional Summary\n3. Skills Section\n4. Work / Externship Experience\n5. Education & Certifications." },
  { q: "How long should a Dental Assistant resume be?",
    a: "One page long — unless you have extensive experience." },
  { q: "What should you AVOID in your contact email?",
    a: "Unprofessional emails like 'cutegirl123@email.com'. Keep it clean and professional (e.g., janedoe@email.com)." },
  { q: "What is a Professional Summary on a resume?",
    a: "A 2–3 sentence statement highlighting your experience, skills, and career goals. Tailor it to match the job description!" },
  { q: "Name 3 Clinical Skills employers look for in a Dental Assistant.",
    a: "Chairside Assisting, Sterilization & Infection Control, Taking & Developing X-rays (if certified), Four-Handed Dentistry, Impression Taking & Model Pouring." },
  { q: "Name 3 Soft Skills to include on your resume.",
    a: "Patient Education & Communication, Time Management & Multitasking, Team Collaboration, HIPAA & OSHA Compliance." },
  { q: "Name 3 dental-specific job boards where you can find jobs.",
    a: "Indeed, DentalPost, ZipRecruiter, Glassdoor, ADA Career Center." },
  { q: "What are 3 tips to ace a Dental Assisting interview?",
    a: "1. Research the practice's services & values.\n2. Prepare answers to common questions.\n3. Showcase clinical skills.\n4. Ask thoughtful questions.\n5. Follow up with a thank-you email." },
  { q: "What certifications should a Dental Assistant list on their resume?",
    a: "CPR & Basic Life Support (BLS), Dental Radiology Certification, HIPAA & OSHA Training, RDA or EFDA license (if required by your state)." },
  { q: "What format should you save your resume in before sending?",
    a: "Save as a PDF — this keeps your formatting intact." },
  { q: "What should you do after a job interview?",
    a: "Send a thank-you email to express appreciation for the opportunity and reemphasize your enthusiasm for the position." },
  { q: "What 3 things should you ask about when negotiating salary?",
    a: "1. Average salaries in your state (use Payscale or BLS).\n2. Benefits: PTO, health insurance, CE opportunities.\n3. Politely express your worth if offered a lower salary." },
];

let idx = 0, flipped = false, answered = false, got = 0, missed = 0;
const TOTAL = CARDS.length;

function render() {
  const card = CARDS[idx];
  const progress = Math.round((idx + (answered ? 1 : 0)) / TOTAL * 100);

  document.getElementById('card').classList.toggle('flipped', flipped);
  document.getElementById('card-label').textContent = flipped ? 'Answer' : 'Question — tap to flip';

  const qEl = document.getElementById('card-q');
  const aEl = document.getElementById('card-a');
  const hint = document.getElementById('card-hint');
  if (flipped) {
    qEl.style.display = 'none';
    aEl.style.display = 'block';
    aEl.textContent   = card.a;
    hint.style.display = 'none';
  } else {
    qEl.style.display = 'flex';
    aEl.style.display = 'none';
    qEl.textContent   = card.q;
    hint.style.display = 'block';
  }

  document.getElementById('card-count').textContent    = `Card ${idx + 1} of ${TOTAL}`;
  document.getElementById('correct-count').textContent = `${got} correct`;
  document.getElementById('prog-fill').style.width     = progress + '%';
  document.getElementById('pill-got').textContent      = `Got it: ${got}`;
  document.getElementById('pill-missed').textContent   = `Review: ${missed}`;

  const area = document.getElementById('btn-area');
  if (!flipped) {
    area.innerHTML = `<button class="btn-reveal" onclick="flipCard()">Reveal answer</button>`;
  } else if (!answered) {
    area.innerHTML = `
      <div class="answer-row">
        <button class="btn-miss" onclick="answer(false)">Still learning</button>
        <button class="btn-got"  onclick="answer(true)">Got it! &#10003;</button>
      </div>`;
  } else {
    const isLast = idx + 1 >= TOTAL;
    area.innerHTML = `<button class="btn-next" onclick="next()">${isLast ? 'See results &rarr;' : 'Next card &rarr;'}</button>`;
  }
}

function flipCard() { flipped = !flipped; render(); }

function answer(correct) {
  if (correct) got++; else missed++;
  answered = true;
  render();
}

function next() {
  if (idx + 1 >= TOTAL) { showDone(); return; }
  idx++; flipped = false; answered = false;
  render();
}

function showDone() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'block';
  const pct = Math.round(got / TOTAL * 100);
  document.getElementById('final-got').textContent    = got;
  document.getElementById('final-missed').textContent = missed;
  document.getElementById('done-score').textContent   = `Score: ${got} / ${TOTAL} correct (${pct}%)`;
  const msg = pct === 100 ? 'Perfect score! Amazing work.'
            : pct >= 70  ? 'Great job! Keep reviewing the missed ones.'
            : "Keep practicing — you've got this!";
  document.getElementById('done-msg').textContent = msg;
}

function restart() {
  idx = 0; flipped = false; answered = false; got = 0; missed = 0;
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
