<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Questions: Patient Intake and Evaluation</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0b0f14;
    --bg-card: #141c26;
    --bg-card-hover: #1c2836;
    --accent: #94a3b8;
    --accent-bright: #e2e8f0;
    --accent-glow: rgba(148, 163, 184, 0.2);
    --wrong: #fb7185;
    --wrong-glow: rgba(251, 113, 133, 0.25);
    --correct-color: #67e8f9;
    --correct-glow: rgba(103, 232, 249, 0.25);
    --text-primary: #f1f5f9;
    --text-secondary: #7a8da6;
    --border: #1e2d40;
    --option-bg: #101820;
    --option-border: #1c2e42;
    --gradient-start: #67e8f9;
    --gradient-end: #a78bfa;
  }

  html, body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100%; width: 100%;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 15%, rgba(103, 232, 249, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 85%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
    z-index: 0; pointer-events: none;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 720px; width: 100%; height: 100vh;
    margin: 0 auto; padding: 14px 16px 10px;
    display: flex; flex-direction: column;
  }

  .start-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex: 1; text-align: center; animation: fadeUp 0.7s ease;
  }
  .start-screen .icon { font-size: 52px; margin-bottom: 12px; filter: drop-shadow(0 0 24px var(--correct-glow)); }
  .start-screen h1 {
    font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.3rem;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; max-width: 560px; line-height: 1.4;
  }
  .start-screen p { color: var(--text-secondary); font-size: 0.92rem; font-weight: 600; margin-bottom: 6px; max-width: 490px; }
  .badge-row { display: flex; gap: 10px; margin: 14px 0 24px; flex-wrap: wrap; justify-content: center; }
  .badge {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px;
    padding: 5px 14px; font-size: 0.78rem; font-weight: 700; color: var(--correct-color);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gradient-start), #22d3ee);
    color: #0b0f14; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1rem;
    border: none; border-radius: 12px; padding: 13px 40px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px var(--correct-glow);
  }
  .btn-primary:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 32px var(--correct-glow); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-sm { padding: 10px 28px; font-size: 0.9rem; }

  .btn-secondary {
    background: var(--bg-card); border: 2px solid var(--correct-color);
    color: var(--correct-color); font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
    border-radius: 12px; padding: 10px 28px; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(103, 232, 249, 0.1); }

  .progress-wrapper { flex-shrink: 0; margin-bottom: 10px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .progress-header span { font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); }
  .progress-header .q-count { color: var(--correct-color); font-family: 'Space Mono', monospace; font-size: 0.88rem; }
  .progress-track {
    width: 100%; height: 7px; background: var(--bg-card); border-radius: 100px;
    overflow: hidden; border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    border-radius: 100px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .live-score {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px;
    padding: 3px 12px; font-weight: 700; font-size: 0.78rem;
  }
  .live-score .correct-count { color: var(--correct-color); }
  .live-score .wrong-count { color: var(--wrong); }

  .question-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
    padding: 18px 20px; animation: fadeUp 0.4s ease; position: relative;
    overflow-y: auto; flex: 1; display: flex; flex-direction: column;
  }
  .question-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
  }
  .q-type-badge {
    display: inline-block; background: rgba(167, 139, 250, 0.12); color: #c4b5fd;
    font-size: 0.68rem; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 5px; margin-bottom: 8px; flex-shrink: 0;
  }
  .question-text { font-size: 1.02rem; font-weight: 700; line-height: 1.45; margin-bottom: 12px; flex-shrink: 0; }

  .options-list { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

  .option-btn {
    width: 100%; text-align: left; background: var(--option-bg); border: 2px solid var(--option-border);
    border-radius: 11px; padding: 9px 14px; font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 600; color: var(--text-primary); cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; gap: 10px; position: relative;
  }
  .option-btn:hover:not(.disabled) {
    background: var(--bg-card-hover); border-color: var(--correct-color);
    transform: translateX(3px); box-shadow: 0 0 16px var(--correct-glow);
  }
  .option-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 7px;
    background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.78rem; color: var(--text-secondary);
    border: 1px solid var(--border); transition: all 0.2s;
  }
  .option-btn:hover:not(.disabled) .option-letter {
    background: var(--correct-color); color: var(--bg-deep); border-color: var(--correct-color);
  }
  .option-btn.correct {
    background: rgba(103, 232, 249, 0.12); border-color: var(--correct-color);
    box-shadow: 0 0 18px var(--correct-glow); animation: popIn 0.35s ease;
  }
  .option-btn.correct .option-letter { background: var(--correct-color); color: var(--bg-deep); border-color: var(--correct-color); }
  .option-btn.correct .check-icon { display: block; }

  .option-btn.wrong {
    background: rgba(251, 113, 133, 0.12); border-color: var(--wrong);
    box-shadow: 0 0 18px var(--wrong-glow); animation: shake 0.4s ease;
  }
  .option-btn.wrong .option-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
  .option-btn.wrong .x-icon { display: block; }

  .option-btn.disabled { pointer-events: none; opacity: 0.5; }
  .option-btn.correct.disabled { opacity: 1; }

  .check-icon, .x-icon { display: none; position: absolute; right: 12px; font-size: 1rem; font-weight: 900; }
  .check-icon { color: var(--correct-color); }
  .x-icon { color: var(--wrong); }

  /* Multi-select */
  .option-btn.selected { border-color: var(--correct-color); background: rgba(103, 232, 249, 0.08); }
  .option-btn.selected .option-letter { background: var(--correct-color); color: var(--bg-deep); border-color: var(--correct-color); }
  .submit-btn-wrap { margin-top: 10px; display: flex; justify-content: center; flex-shrink: 0; }

  /* Flashcard */
  .flashcard-input {
    width: 100%; background: var(--option-bg); border: 2px solid var(--option-border);
    border-radius: 11px; padding: 10px 14px; font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 600; color: var(--text-primary); resize: none;
    min-height: 55px; outline: none; transition: border-color 0.2s;
  }
  .flashcard-input:focus { border-color: var(--correct-color); }
  .flashcard-input::placeholder { color: var(--text-secondary); font-weight: 500; }
  .reveal-btn-wrap { margin-top: 10px; display: flex; justify-content: center; flex-shrink: 0; }
  .self-grade { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
  .self-grade button {
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.82rem;
    border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; transition: all 0.2s;
  }
  .self-grade .grade-correct { background: var(--correct-color); color: var(--bg-deep); }
  .self-grade .grade-wrong { background: var(--wrong); color: #fff; }

  .feedback-box {
    margin-top: 8px; padding: 8px 12px; border-radius: 10px;
    font-weight: 600; font-size: 0.8rem; line-height: 1.4;
    animation: fadeUp 0.3s ease; display: flex; align-items: flex-start; gap: 10px;
    flex-shrink: 0;
  }
  .feedback-box.correct-fb { background: rgba(103, 232, 249, 0.1); border: 1px solid rgba(103, 232, 249, 0.3); }
  .feedback-box.wrong-fb { background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); }
  .feedback-box.neutral-fb { background: rgba(103, 232, 249, 0.08); border: 1px solid rgba(103, 232, 249, 0.25); }
  .feedback-box .fb-icon { font-size: 1rem; flex-shrink: 0; }

  .next-btn-wrap { margin-top: 8px; display: flex; justify-content: flex-end; flex-shrink: 0; }

  .results-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; animation: fadeUp 0.6s ease; overflow: hidden;
  }
  .results-top { flex-shrink: 0; }
  .results-screen .icon { font-size: 52px; margin-bottom: 6px; }
  .results-screen h2 { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; margin-bottom: 2px; }
  .score-display {
    font-size: 3.2rem; font-weight: 900; margin: 10px 0;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .score-subtitle { color: var(--text-secondary); font-weight: 600; margin-bottom: 18px; font-size: 0.92rem; }
  .results-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }

  .review-section { width: 100%; max-width: 720px; flex: 1; overflow-y: auto; text-align: left; min-height: 0; }
  .review-section h3 { font-size: 0.9rem; font-weight: 800; margin-bottom: 10px; color: var(--text-secondary); position: sticky; top: 0; background: var(--bg-deep); padding: 4px 0 6px; z-index: 2; }
  .review-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .review-card .rv-q { font-weight: 700; font-size: 0.84rem; margin-bottom: 5px; }
  .review-card .rv-status { font-weight: 800; font-size: 0.72rem; margin-bottom: 3px; }
  .review-card .rv-status.rv-correct { color: var(--correct-color); }
  .review-card .rv-status.rv-wrong { color: var(--wrong); }
  .review-card .rv-answer { font-weight: 600; color: var(--text-secondary); font-size: 0.8rem; }
  .review-card .rv-answer strong { color: var(--correct-color); }
  .review-card .rv-explain { margin-top: 4px; font-size: 0.76rem; color: var(--text-secondary); font-weight: 600; }

  .timer-bar { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); }
  .timer-bar .time { font-family: 'Space Mono', monospace; color: var(--text-primary); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn { 0% { transform: scale(0.96); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }

  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; opacity: 0; animation: confettiFall 2.5s ease-out forwards; }
  @keyframes confettiFall { 0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); } }

  .question-card::-webkit-scrollbar, .review-section::-webkit-scrollbar { width: 5px; }
  .question-card::-webkit-scrollbar-track, .review-section::-webkit-scrollbar-track { background: transparent; }
  .question-card::-webkit-scrollbar-thumb, .review-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  @media (max-width: 600px) {
    .start-screen h1 { font-size: 1.1rem; }
    .question-text { font-size: 0.91rem; }
    .option-btn { padding: 8px 11px; font-size: 0.82rem; }
    .option-letter { width: 22px; height: 22px; font-size: 0.72rem; }
    .score-display { font-size: 2.6rem; }
    .app { padding: 10px 10px 6px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const QUESTIONS = [
  { type:"mcq", question:"Which of the following is a normal adult body temperature range?", options:["96.0°F – 97.0°F","97.8°F – 99.1°F","99.5°F – 101.0°F","100.0°F – 103.0°F"], correct:1, explanation:"Normal adult body temperature ranges from approximately 97.8°F to 99.1°F (36.5°C–37.3°C), with 98.6°F being the commonly cited average." },
  { type:"mcq", question:"A pain rating of 8/10 is considered:", options:["Mild","Moderate","Severe","Chronic"], correct:2, explanation:"On the 0–10 pain scale, 7–10 is considered severe pain requiring prompt attention. Mild is 1–3, moderate is 4–6." },
  { type:"tf", question:"Rectal temperatures are typically 1°F lower than oral temperatures.", options:["True","False"], correct:1, explanation:"False — rectal temperatures are typically 1°F higher than oral temperatures, not lower. Axillary temperatures are about 1°F lower than oral." },
  { type:"tf", question:"You should use your thumb to take a radial pulse.", options:["True","False"], correct:1, explanation:"False — never use your thumb, as it has its own pulse that can interfere with the count. Use your index and middle fingers." },
  { type:"tf", question:"Respiratory rate is the number of breaths per minute.", options:["True","False"], correct:0, explanation:"True — respiratory rate counts the number of complete breath cycles (one inhalation + one exhalation) per minute. Normal adult range is 12–20 breaths/min." },
  { type:"tf", question:"Pain is a subjective measure reported by the patient.", options:["True","False"], correct:0, explanation:"True — pain is subjective and self-reported. The patient's own assessment is the most reliable indicator of their pain level." },
  { type:"tf", question:"Pulse oximeter readings can be affected by nail polish.", options:["True","False"], correct:0, explanation:"True — dark nail polish, artificial nails, and cold fingers can interfere with pulse oximeter readings by blocking the light sensor." },
  { type:"multi", question:"Select the six vital signs:", options:["Temperature","Heat","Pulse","Respiration","Pressure","Blood Pressure","Oxygen Saturation","Pain","Anxiety"], correctSet:[0,2,3,5,6,7], explanation:"The six vital signs are: Temperature, Pulse, Respiration, Blood Pressure, Oxygen Saturation, and Pain." },
  { type:"open", question:"When should you report a low oxygen saturation level?", answer:"Report when SpO₂ falls below 90%, or if there is a sudden or significant drop from the patient's baseline — this may indicate respiratory distress requiring immediate intervention.", keyPoints:["Below 90%","Sudden drop from baseline"] },
  { type:"open", question:"What steps would you take to measure blood pressure manually?", answer:"1) Position the patient comfortably with arm at heart level. 2) Apply the cuff snugly to the upper arm. 3) Locate the brachial artery. 4) Inflate the cuff. 5) Slowly deflate while listening with the stethoscope. 6) Record systolic and diastolic readings.", keyPoints:["Position patient","Apply cuff","Locate brachial artery","Inflate","Deflate slowly & listen","Record results"] },
  { type:"open", question:"Why is it important not to tell a patient when you are counting respirations?", answer:"If patients know their breathing is being observed, they may consciously alter their breathing pattern — breathing faster, slower, or deeper than normal — which produces an inaccurate count.", keyPoints:["Patients alter breathing if aware","Produces inaccurate count"] },
  { type:"mcq", question:"Which method is the most accurate for measuring core body temperature?", options:["Axillary","Temporal","Rectal","Oral"], correct:2, explanation:"Rectal temperature is the most accurate measurement of core body temperature, though it is the most invasive method." },
  { type:"open", question:"Describe how you would assess pain in a non-verbal child or confused patient.", answer:"Use visual pain scales like the Wong-Baker FACES scale. Observe behavioral cues: facial grimacing, crying, guarding, restlessness, or changes in vital signs. Document observations objectively.", keyPoints:["FACES or visual pain scale","Observe behavior and facial expressions","Note vital sign changes"] },
  { type:"mcq", question:"The radial pulse is most commonly taken at the:", options:["Neck","Wrist","Ankle","Chest"], correct:1, explanation:"The radial pulse is palpated at the wrist (radial artery on the thumb side). The neck pulse is the carotid, and the ankle is the dorsalis pedis." },
  { type:"mcq", question:"What is a normal adult resting pulse rate?", options:["40–60 bpm","60–100 bpm","100–120 bpm","80–130 bpm"], correct:1, explanation:"Normal adult resting heart rate is 60–100 beats per minute. Below 60 is bradycardia; above 100 is tachycardia." },
  { type:"mcq", question:"When measuring respiration, the patient should:", options:["Take deep breaths","Be lying flat","Not be aware their respirations are being counted","Count with you"], correct:2, explanation:"Patients should not know their breathing is being counted — awareness causes them to consciously alter their breathing pattern, producing inaccurate results." },
  { type:"mcq", question:'The "top" number in a blood pressure reading is called:', options:["Diastolic","Systolic","Pulse pressure","Volume"], correct:1, explanation:"Systolic (top number) measures pressure when the heart contracts. Diastolic (bottom number) measures pressure when the heart rests between beats." },
  { type:"mcq", question:"What blood pressure reading is considered pre-hypertension?", options:["90/60 mmHg","110/70 mmHg","130/85 mmHg","180/100 mmHg"], correct:2, explanation:"Elevated/pre-hypertension is defined as systolic 120–139 or diastolic 80–89 mmHg. 130/85 falls in this range. 180/100 is hypertensive crisis." },
  { type:"mcq", question:"What is a normal oxygen saturation range in a healthy adult?", options:["80–85%","86–90%","91–94%","95–100%"], correct:3, explanation:"Normal SpO₂ is 95–100%. Below 90% is considered hypoxemia and requires immediate attention." },
  { type:"mcq", question:"What tool is used to measure oxygen saturation?", options:["Thermometer","Sphygmomanometer","Pulse oximeter","Stethoscope"], correct:2, explanation:"A pulse oximeter clips onto the finger and uses light sensors to measure the percentage of hemoglobin saturated with oxygen (SpO₂)." }
];

let state = { screen:'start', currentQ:0, answers:[], correctCount:0, wrongCount:0, answered:false, selectedIdx:null, shuffledQuestions:[], timer:0, timerInterval:null, showReview:false, revealed:false, multiSelected:new Set() };

function shuffleArray(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function startQuiz(){ state.shuffledQuestions=shuffleArray(QUESTIONS.map((q,i)=>({...q,origIdx:i}))); state.currentQ=0;state.answers=[];state.correctCount=0;state.wrongCount=0;state.answered=false;state.selectedIdx=null;state.screen='quiz';state.timer=0;state.showReview=false;state.revealed=false;state.multiSelected=new Set(); clearInterval(state.timerInterval); state.timerInterval=setInterval(()=>{state.timer++;updateTimer();},1000); render(); }
function formatTime(s){ return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }
function updateTimer(){ const el=document.getElementById('timer-time'); if(el) el.textContent=formatTime(state.timer); }

function selectAnswer(idx){ if(state.answered) return; state.answered=true;state.selectedIdx=idx; const q=state.shuffledQuestions[state.currentQ]; const ok=idx===q.correct; if(ok) state.correctCount++; else state.wrongCount++; state.answers.push({qIdx:q.origIdx,selected:idx,correct:ok,type:q.type}); render(); }

function toggleMulti(idx){ if(state.answered) return; if(state.multiSelected.has(idx)) state.multiSelected.delete(idx); else state.multiSelected.add(idx); render(); }
function submitMulti(){ if(state.answered||state.multiSelected.size===0) return; state.answered=true; const q=state.shuffledQuestions[state.currentQ]; const sel=[...state.multiSelected].sort(); const cor=[...q.correctSet].sort(); const ok=JSON.stringify(sel)===JSON.stringify(cor); if(ok) state.correctCount++; else state.wrongCount++; state.answers.push({qIdx:q.origIdx,selected:sel,correct:ok,type:'multi'}); render(); }

function revealAnswer(){ state.revealed=true; render(); }
function selfGrade(ok){ state.answered=true; const q=state.shuffledQuestions[state.currentQ]; if(ok) state.correctCount++; else state.wrongCount++; state.answers.push({qIdx:q.origIdx,selected:null,correct:ok,type:'open'}); render(); }

function nextQuestion(){ if(state.currentQ<state.shuffledQuestions.length-1){ state.currentQ++;state.answered=false;state.selectedIdx=null;state.revealed=false;state.multiSelected=new Set();render(); } else { clearInterval(state.timerInterval);state.screen='results';render(); } }
function showResults(){ clearInterval(state.timerInterval);state.screen='results';render(); }

function spawnConfetti(){ const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c); const cols=['#67e8f9','#a78bfa','#fbbf24','#4ade80','#f472b6','#fb923c']; for(let i=0;i<50;i++){ const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.top='-10px';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1.2+'s';p.style.animationDuration=(1.8+Math.random()*1.5)+'s';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p); } setTimeout(()=>c.remove(),4000); }

function getGrade(p){ if(p===100) return{emoji:'🏆',msg:'PERFECT SCORE!',sub:'Flawless — every question!'}; if(p>=80) return{emoji:'🌟',msg:'EXCELLENT!',sub:'Outstanding — well prepared!'}; if(p>=60) return{emoji:'👍',msg:'GOOD JOB!',sub:'Solid — review what you missed.'}; if(p>=40) return{emoji:'📖',msg:'KEEP STUDYING',sub:'Getting there — check explanations.'}; return{emoji:'💪',msg:"DON'T GIVE UP",sub:'Review and retry!'}; }

function render(){
  const app=document.getElementById('app');
  if(state.screen==='start'){ app.innerHTML=`<div class="start-screen"><div class="icon">🩺</div><h1>Patient Intake and Evaluation</h1><p>Vital signs, pain assessment, blood pressure, oxygen saturation, temperature routes, and clinical measurement techniques.</p><div class="badge-row"><span class="badge">📋 20 Questions</span><span class="badge">✍️ Mixed Types</span><span class="badge">🔀 Shuffled</span><span class="badge">⏱ Timed</span></div><button class="btn-primary" onclick="startQuiz()">Start Quiz →</button></div>`; return; }

  if(state.screen==='quiz'){
    const q=state.shuffledQuestions[state.currentQ], total=state.shuffledQuestions.length;
    const pct=((state.currentQ+(state.answered?1:0))/total*100);
    const L=['A','B','C','D','E','F','G','H','I'];
    let badge='MULTIPLE CHOICE'; if(q.type==='tf') badge='TRUE / FALSE'; if(q.type==='multi') badge='SELECT ALL THAT APPLY'; if(q.type==='open') badge='WRITTEN RESPONSE';
    let body='';

    if(q.type==='mcq'||q.type==='tf'){
      let opts=q.options.map((o,i)=>{ let c='option-btn'; if(state.answered){ if(i===q.correct) c+=' correct'; else if(i===state.selectedIdx&&i!==q.correct) c+=' wrong'; if(i!==q.correct&&i!==state.selectedIdx) c+=' disabled'; } return `<button class="${c}" onclick="selectAnswer(${i})"><span class="option-letter">${L[i]}</span><span>${o}</span><span class="check-icon">✓</span><span class="x-icon">✗</span></button>`; }).join('');
      let fb=''; if(state.answered){ const ok=state.selectedIdx===q.correct; fb=`<div class="feedback-box ${ok?'correct-fb':'wrong-fb'}"><span class="fb-icon">${ok?'✅':'❌'}</span><div><strong style="font-size:0.83rem;">${ok?'Correct!':'Incorrect — Answer: '+q.options[q.correct]}</strong><br><span style="color:var(--text-secondary);font-size:0.78rem;">${q.explanation}</span></div></div><div class="next-btn-wrap"><button class="btn-primary btn-sm" onclick="${state.currentQ<total-1?'nextQuestion()':'showResults()'}">${state.currentQ<total-1?'Next →':'Results →'}</button></div>`; }
      body=`<div class="options-list">${opts}</div>${fb}`;

    } else if(q.type==='multi'){
      let opts=q.options.map((o,i)=>{ let c='option-btn'; if(!state.answered&&state.multiSelected.has(i)) c+=' selected'; if(state.answered){ if(q.correctSet.includes(i)) c+=' correct'; else if(state.multiSelected.has(i)&&!q.correctSet.includes(i)) c+=' wrong'; else c+=' disabled'; } return `<button class="${c}" onclick="${state.answered?'':'toggleMulti('+i+')'}"><span class="option-letter">${L[i]}</span><span>${o}</span><span class="check-icon">✓</span><span class="x-icon">✗</span></button>`; }).join('');
      let fb='';
      if(!state.answered){ fb=`<div class="submit-btn-wrap"><button class="btn-primary btn-sm" onclick="submitMulti()">Submit Answer</button></div>`; }
      else { const a=state.answers[state.answers.length-1]; fb=`<div class="feedback-box ${a.correct?'correct-fb':'wrong-fb'}"><span class="fb-icon">${a.correct?'✅':'❌'}</span><div><strong style="font-size:0.83rem;">${a.correct?'Correct!':'Incorrect'}</strong><br><span style="color:var(--text-secondary);font-size:0.78rem;">${q.explanation}</span></div></div><div class="next-btn-wrap"><button class="btn-primary btn-sm" onclick="${state.currentQ<total-1?'nextQuestion()':'showResults()'}">${state.currentQ<total-1?'Next →':'Results →'}</button></div>`; }
      body=`<div class="options-list">${opts}</div>${fb}`;

    } else if(q.type==='open'){
      if(!state.answered&&!state.revealed){ body=`<textarea class="flashcard-input" id="open-input" placeholder="Type your answer…" rows="3"></textarea><div class="reveal-btn-wrap"><button class="btn-primary btn-sm" onclick="revealAnswer()">Reveal Answer</button></div>`; }
      else if(state.revealed&&!state.answered){ body=`<div class="feedback-box neutral-fb"><span class="fb-icon">📝</span><div><strong style="font-size:0.83rem;">Model Answer:</strong><br><span style="color:var(--text-primary);font-size:0.8rem;">${q.answer}</span><div style="margin-top:5px;font-size:0.76rem;color:var(--text-secondary);"><strong>Key:</strong> ${q.keyPoints.join(' · ')}</div></div></div><div style="text-align:center;margin-top:6px;font-weight:700;font-size:0.8rem;color:var(--text-secondary);">How did you do?</div><div class="self-grade"><button class="grade-correct" onclick="selfGrade(true)">✓ I Got It</button><button class="grade-wrong" onclick="selfGrade(false)">✗ Missed It</button></div>`; }
      else { const a=state.answers[state.answers.length-1]; body=`<div class="feedback-box ${a.correct?'correct-fb':'wrong-fb'}"><span class="fb-icon">${a.correct?'✅':'❌'}</span><div><strong style="font-size:0.83rem;">${a.correct?'Marked Correct!':'Marked Incorrect'}</strong><br><span style="color:var(--text-primary);font-size:0.8rem;">${q.answer}</span></div></div><div class="next-btn-wrap"><button class="btn-primary btn-sm" onclick="${state.currentQ<total-1?'nextQuestion()':'showResults()'}">${state.currentQ<total-1?'Next →':'Results →'}</button></div>`; }
    }

    app.innerHTML=`<div class="progress-wrapper"><div class="progress-header"><div class="timer-bar">⏱ <span class="time" id="timer-time">${formatTime(state.timer)}</span></div><span class="q-count">Q${state.currentQ+1}/${total}</span><div class="live-score"><span class="correct-count">✓ ${state.correctCount}</span><span style="color:var(--border)">|</span><span class="wrong-count">✗ ${state.wrongCount}</span></div></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div><div class="question-card"><span class="q-type-badge">${badge}</span><div class="question-text">${q.question}</div>${body}</div>`; return;
  }

  if(state.screen==='results'){
    const total=QUESTIONS.length, pct=Math.round(state.correctCount/total*100), grade=getGrade(pct);
    let rev=state.answers.map(a=>{ const q=QUESTIONS[a.qIdx]; let ad=''; if(q.type==='open') ad=`Answer: <strong>${q.answer}</strong>`; else if(q.type==='multi') ad=`Correct: <strong>${q.options.filter((_,i)=>q.correctSet.includes(i)).join(', ')}</strong>`; else ad=`${a.correct?'':`Your answer: <span style="color:var(--wrong)">${q.options[a.selected]}</span><br>`}Correct: <strong>${q.options[q.correct]}</strong>`; return `<div class="review-card"><div class="rv-status ${a.correct?'rv-correct':'rv-wrong'}">${a.correct?'✓ CORRECT':'✗ INCORRECT'}</div><div class="rv-q">${q.question}</div><div class="rv-answer">${ad}</div><div class="rv-explain">${q.explanation||q.answer}</div></div>`; }).join('');

    app.innerHTML=`<div class="results-screen"><div class="results-top"><div class="icon">${grade.emoji}</div><h2>${grade.msg}</h2><div class="score-display">${pct}%</div><div class="score-subtitle">${state.correctCount}/${total} correct · ${formatTime(state.timer)}</div><div class="results-actions"><button class="btn-primary btn-sm" onclick="startQuiz()">🔄 Retake</button><button class="btn-secondary" onclick="toggleReview()">📋 ${state.showReview?'Hide':'Review'}</button></div></div><div class="review-section" id="review-section" style="display:${state.showReview?'flex':'none'};flex-direction:column;"><h3>📝 ANSWER REVIEW</h3>${rev}</div></div>`;
    if(pct>=80) setTimeout(spawnConfetti,300);
  }
}

function toggleReview(){ state.showReview=!state.showReview; render(); }
render();
</script>
</body>
</html>
