<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Assistant — Patient Intake & Vital Signs</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ff:"Libre Baskerville","Georgia",serif;
  --fs:"Source Sans 3","Segoe UI",sans-serif;
  --slideBg:#FFFFFF;--slideAlt:#F6F8FB;
  --dark:#0D2137;--darkSub:#1B3A57;
  --accent:#0F7B6C;--accentLight:#E6F5F2;
  --warm:#D94F4F;--warmLight:#FDF0F0;
  --amber:#D4880F;--amberLight:#FFF7E6;
  --blue:#2B6CB0;--blueLight:#EBF2FA;
  --purple:#6B46A8;
  --text:#1A202C;--textMid:#4A5568;--textLight:#8896A6;
  --border:#E2E8F0;--headerBg:#0D2137;
}
body{background:#E8ECF0;font-family:var(--fs);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px 24px;font-size:16px;line-height:1.6}
button{cursor:pointer;font-family:var(--fs)}
.slide-wrap{width:100%;max-width:1100px}
.slide-frame{width:100%;height:600px;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.08);overflow:hidden;position:relative;display:flex;flex-direction:column;animation:slideFade .35s ease-out}
.slide-frame.dark{background:var(--headerBg)}
.slide-frame:not(.dark){background:var(--slideBg)}
.slide-header{background:var(--headerBg);padding:14px 32px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.slide-header .num{font-size:12px;font-weight:700;color:var(--accent);background:rgba(15,123,108,.15);border-radius:3px;padding:3px 9px;letter-spacing:1px}
.slide-header .title{font-family:var(--ff);font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px}
.slide-body{flex:1;padding:18px 32px 14px;overflow-y:auto}
.slide-footer{display:flex;justify-content:space-between;align-items:center;padding:0 32px 8px;flex-shrink:0}
.slide-footer .left{font-size:11px;color:var(--textLight);letter-spacing:1px;text-transform:uppercase}
.slide-footer .right{font-size:12px;font-weight:600;color:var(--textLight)}

.controls{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin-top:14px}
.ctrl-btn{font-size:14px;font-weight:600;color:#4A5568;background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:10px 22px;transition:all .2s}
.ctrl-btn:hover:not(:disabled){filter:brightness(1.08)}
.ctrl-btn:disabled{opacity:.3;cursor:default}
.ctrl-btn.active{background:var(--dark);color:#fff}
.dots{display:flex;gap:3px;align-items:center}
.dot{height:5px;border-radius:3px;cursor:pointer;transition:all .3s}
.dot.current{width:16px;background:var(--accent)}
.dot.visited{width:5px;background:var(--darkSub)}
.dot.future{width:5px;background:rgba(0,0,0,.12)}

.toc-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.toc-panel{background:#fff;border-radius:12px;padding:28px 24px;max-height:70vh;overflow-y:auto;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.toc-title{font-family:var(--ff);font-size:20px;font-weight:700;color:var(--text);margin-bottom:14px}
.toc-item{font-size:15px;padding:8px 12px;border-radius:5px;cursor:pointer;margin-bottom:2px;transition:all .15s}
.toc-item:hover{background:var(--slideAlt)}
.toc-item.active{color:var(--accent);background:var(--accentLight);font-weight:700}
.toc-item .idx{color:var(--textLight);margin-right:8px;font-weight:600;font-size:13px}

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.flex-row{display:flex;gap:16px}
.card{background:var(--slideAlt);border-radius:6px;padding:12px 14px}
.card-accent{border-left:3px solid var(--accent)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:7px 10px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
td{padding:7px 10px;font-size:14px;color:var(--text)}
.thead-dark th{background:var(--headerBg);color:#fff}
tr.alt{background:var(--slideAlt)}

.tab-bar{display:flex;gap:0;margin-bottom:12px;border-bottom:2px solid var(--border)}
.tab-btn{font-size:14px;font-weight:500;color:var(--textMid);background:none;border:none;border-bottom:3px solid transparent;padding:7px 14px;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{font-weight:700;color:var(--accent)}

.callout{border-radius:6px;padding:10px 14px;border-left:3px solid}
.callout-accent{background:var(--accentLight);border-color:var(--accent)}
.callout-warm{background:var(--warmLight);border-color:var(--warm)}
.callout-amber{background:var(--amberLight);border-color:var(--amber)}

.tag{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:5px 14px;letter-spacing:.5px}

@keyframes slideFade{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
input[type=range]{height:5px;-webkit-appearance:none;appearance:none;border-radius:3px;outline:none;background:#E2E8F0;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.hidden{display:none!important}

.step-btn{font-size:13px;text-align:left;border-radius:5px;padding:7px 11px;min-width:150px;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--textMid);font-weight:500}
.step-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}

.quiz-opt{font-size:15px;text-align:left;padding:11px 14px;border-radius:6px;border:2px solid var(--border);background:var(--slideAlt);color:var(--text);font-weight:400;transition:all .25s;width:100%;display:block;margin-bottom:5px}
.quiz-opt:hover:not(.answered){border-color:var(--accent)}
.quiz-opt.correct{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}
.quiz-opt.wrong{background:var(--warm);color:#fff;font-weight:700;border-color:var(--warm)}

.obj-row{display:flex;gap:10px;align-items:flex-start;opacity:.25;cursor:pointer;transition:opacity .4s}
.obj-row.shown{opacity:1}
.obj-circle{min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .3s}
.obj-circle.active{background:var(--accent);color:#fff}
.obj-circle.inactive{background:var(--border);color:var(--textLight)}

.id-card{border:1px solid var(--border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .25s}
.id-card.open{background:var(--accentLight);border-color:var(--accent)}
.id-card .desc{max-height:0;overflow-y:auto;transition:max-height .3s;font-size:14px;color:var(--textMid);line-height:1.5}
.id-card.open .desc{max-height:200px;margin-top:6px}

.takeaway{display:flex;gap:10px;align-items:flex-start;padding:8px 12px;border-radius:5px;border:1px solid var(--border);background:var(--slideAlt);cursor:pointer;transition:all .25s}
.takeaway.checked{background:var(--accentLight);border-color:var(--accent)}
.takeaway .box{min-width:20px;height:20px;border-radius:3px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px}
.takeaway.checked .box{border-color:var(--accent)}
.takeaway .label{font-size:14px;color:var(--text);line-height:1.45}
.takeaway.checked .label{color:var(--accent);text-decoration:line-through}

.vital-card{flex:1;text-align:center;background:var(--slideBg);border-radius:8px;padding:12px 6px;border:1px solid var(--border)}

/* Fullscreen mode */
.fs-btn{font-size:13px;font-weight:600;color:#4A5568;background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:10px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.fs-btn:hover{filter:brightness(1.08)}
body.fullscreen{padding:0;background:#E8ECF0}
body.fullscreen .slide-wrap,body.fullscreen .sw{max-width:100%;height:100vh;display:flex;flex-direction:column}
body.fullscreen .sf,body.fullscreen .slide-frame{height:auto;flex:1;border-radius:0;box-shadow:none}
body.fullscreen .sb,body.fullscreen .slide-body{flex:1;overflow-y:auto}
body.fullscreen .controls,body.fullscreen .ctrls{max-width:100%;padding:8px 24px;margin-top:0;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
body.fullscreen .sh,body.fullscreen .slide-header{padding:16px 40px 14px}
body.fullscreen .sb,body.fullscreen .slide-body{padding:22px 40px 16px}
body.fullscreen .ft,body.fullscreen .sft,body.fullscreen .slide-footer{padding:0 40px 10px}
</style>
</head>
<body>

<div class="slide-wrap" id="slideWrap"></div>

<div class="controls">
  <button class="ctrl-btn" id="prevBtn" onclick="go(cur-1)">← Previous</button>
  <div style="display:flex;align-items:center;gap:14px">
    <button class="ctrl-btn" id="tocBtn" onclick="toggleTOC()">☰ Slides</button>
    <div class="dots" id="dots"></div>
  </div>
  <button class="ctrl-btn" id="nextBtn" onclick="go(cur+1)">Next →</button>
  <button class="fs-btn" id="fsB" onclick="toggleFS()" title="Toggle fullscreen">⛶ Fullscreen</button>
</div>

<div class="toc-overlay hidden" id="tocOverlay" onclick="closeTOC()">
  <div class="toc-panel" onclick="event.stopPropagation()">
    <div class="toc-title">Slide Navigator</div>
    <div id="tocList"></div>
  </div>
</div>

<script>
const SLIDES=[
{id:0,type:"title",title:"Patient Intake &\nVital Signs",subtitle:"MEDICAL ASSISTANT PROGRAM",week:"Week One",tags:["Clinical Skills","Patient Safety","Documentation","Vital Signs"]},
{id:1,type:"overview",title:"Course Overview — What to Expect",description:"This week lays the groundwork for every patient encounter you will manage as a medical assistant. You will learn how to accurately identify patients, collect comprehensive histories, measure and interpret vital signs, and conduct routine health screenings.",items:[{icon:"🪪",label:"Patient Identification",desc:"Accurate verification methods to prevent errors"},{icon:"📋",label:"History Collection",desc:"Medical, surgical, family, and social history gathering"},{icon:"💓",label:"Vital Sign Measurement",desc:"BP, pulse, temperature, respiration, and SpO₂"},{icon:"📝",label:"Clinical Documentation",desc:"Charting standards that meet legal and regulatory requirements"},{icon:"👶",label:"Pediatric Considerations",desc:"Growth charts, anthropometric measurements, and age-specific norms"},{icon:"🔍",label:"Screenings & Assessments",desc:"Tobacco, alcohol, HIV, depression, and anxiety tools"}]},
{id:2,type:"objectives",title:"Learning Objectives",objectives:["Correctly identify patients using two independent identifiers: full name, DOB, MRN, or last four of SSN","Gather a thorough patient history — medical, surgical, family, and social — and document each component in the EHR","Measure and interpret the five cardinal vital signs: BP, pulse, temperature, respiration rate, and pulse oximetry","Distinguish normal from abnormal vital sign ranges across neonatal, pediatric, adolescent, adult, and geriatric populations","Identify factors that influence vital sign accuracy and apply troubleshooting strategies","Conduct routine screenings for tobacco, alcohol, HIV; administer PHQ-2/PHQ-9 and GAD-7 tools","Obtain and plot pediatric anthropometric measurements on CDC growth charts","Perform unit conversions for height, weight, and temperature between metric and standard systems"]},
{id:3,type:"stats",title:"Why Patient Identification Matters",description:"Misidentification is one of the most common — and most preventable — sources of medical error.",stats:[{value:"72%",label:"of wrong-patient events involve a name or chart mismatch"},{value:"86%",label:"of errors are caught when two identifiers are consistently used"}],principles:["Always ask the patient to state their own name — never confirm it for them","Use two independent identifiers at every encounter, without exception","Verify identity before administering medications, drawing labs, or performing procedures","Remain vigilant for patients with similar names or dates of birth"]},
{id:4,type:"identifiers",title:"Step 1: Identifying Your Patient",subtitle:"Two Required Identifiers",identifiers:[{icon:"👤",name:"Full Name",desc:"Ask the patient to state it aloud — never read it to them for confirmation"},{icon:"🎂",name:"Date of Birth",desc:"The most common secondary identifier used in clinical settings"},{icon:"🔢",name:"Medical Record Number",desc:"Unique within each EHR system; used to link all patient data"},{icon:"🔐",name:"Last 4 of SSN",desc:"Reserved primarily for billing, insurance, and financial verification"}],warning:"Never read the patient's name aloud and ask them to verify it. A patient who is stressed, unwell, or distracted may inadvertently agree to the wrong identity.",tip:"Wristbands, photo IDs, and electronic check-in systems serve as supplemental — not primary — identifiers."},
{id:5,type:"history",title:"Patient History & the Rooming Process",categories:[{name:"Medical History",icon:"🏥",color:"#0F7B6C",items:["Past illnesses, chronic conditions, and diagnoses","Previous surgeries and hospitalizations","Current medications — perform medication reconciliation at every visit","Known allergies — document the specific reaction type (e.g., anaphylaxis, rash)"]},{name:"Family History",icon:"👨‍👩‍👧‍👦",color:"#1B6B93",items:["Diseases affecting immediate family members (parents, siblings, children)","Genetic predispositions and hereditary conditions","Heart disease, diabetes, cancer, autoimmune disorders, and mental illness"]},{name:"Social History",icon:"🏠",color:"#7B5EA7",items:["Diet, exercise, and sleep patterns","Caffeine, tobacco, alcohol, and recreational drug use","Occupational history, hazard exposures, and travel history","Living situation, support system, and stress level"]},{name:"Chief Complaint (CC)",icon:"💬",color:"#B8860B",items:['Use open-ended questions: "What brings you in today?"',"Document in the patient's exact words using quotation marks","This is subjective data — felt or described by the patient, not measured","Always record onset, duration, and severity"]}]},
{id:6,type:"documentation",title:"Documentation Best Practices",description:"Thorough, accurate documentation is a legal record of care and the primary communication tool among providers.",practices:[{icon:"⏱️",title:"Chart in Real Time",desc:"Record findings during or immediately after the encounter."},{icon:"🎯",title:"Be Objective & Specific",desc:'Write what you observe, not what you assume.'},{icon:"📖",title:"Use Accepted Abbreviations",desc:"Follow your facility's approved abbreviation list."},{icon:"🚫",title:"Never Alter Records",desc:"Draw a single line through the error, initial, date, and correct."},{icon:"📄",title:"Document Refusals",desc:"If a patient declines, document the refusal and reason given."},{icon:"🔒",title:"Protect Patient Privacy",desc:"All documentation must comply with HIPAA. Log out when stepping away."}]},
{id:7,type:"vitals",title:"Vital Signs at a Glance",description:"Vital signs are quantitative indicators of homeostasis. All five are measured at every patient encounter.",vitals:[{name:"Blood\nPressure",value:"< 120/80",unit:"mmHg",color:"#D94F4F"},{name:"Pulse\nRate",value:"60–100",unit:"bpm",color:"#E8853D"},{name:"Respiratory\nRate",value:"12–20",unit:"breaths/min",color:"#3DAE8E"},{name:"Temperature",value:"97.6–99.6",unit:"°F",color:"#4A90D9"},{name:"Pulse\nOximetry",value:"≥ 95%",unit:"SpO₂",color:"#8B6FC0"}],factors:"Stress, physical activity, medications, food and drink intake, patient age, and pain level"},
{id:8,type:"bp_table",title:"Blood Pressure Classification",categories:[{name:"Normal",systolic:"< 120",diastolic:"< 80",color:"#3DAE8E"},{name:"Elevated",systolic:"120–129",diastolic:"< 80",color:"#E8C840"},{name:"Stage 1 HTN",systolic:"130–139",diastolic:"80–89",color:"#E8853D"},{name:"Stage 2 HTN",systolic:"≥ 140",diastolic:"≥ 90",color:"#D94F4F"},{name:"Crisis ⚠",systolic:"> 180",diastolic:"> 120",color:"#8B3A8B"}],errors:["Incorrect cuff size can shift reading by up to 7 mmHg","Crossed legs raise systolic pressure by 2–8 mmHg","Arm below heart level produces falsely elevated reading","Caffeine or tobacco within past 30 minutes","Cuff bladder not fully deflated before repeat measurement","Pressure released too quickly — deflate 2–3 mmHg/sec","Failed to wait 1–2 min between consecutive measurements"]},
{id:9,type:"bp_steps",title:"Blood Pressure — Proper Technique",subtitle:"Accurate BP measurement depends on correct technique at every step.",steps:[{num:1,title:"Patient Preparation",desc:"Seat patient with back supported, feet flat, legs uncrossed, for 5 min. Arm bare and at heart level."},{num:2,title:"Select Correct Cuff",desc:"Bladder should encircle ≥80% of arm. Too small reads high; too large reads low."},{num:3,title:"Position & Palpate",desc:"Center bladder over brachial artery. Palpate radial pulse while inflating to estimate systolic."},{num:4,title:"Inflate & Listen",desc:"Inflate 20–30 mmHg above estimated systolic. Stethoscope bell over brachial artery. Deflate 2–3 mmHg/sec."},{num:5,title:"Record Korotkoff Sounds",desc:"Phase I (first sound) = systolic. Phase V (last sound) = diastolic. Record as whole, even numbers."},{num:6,title:"Repeat if Needed",desc:"Wait 1–2 min before second reading. Average both. Document arm used and patient position."}]},
{id:10,type:"orthostatic",title:"Orthostatic (Postural) Hypotension",definition:"A clinically significant drop in BP — with a rise in heart rate — when transitioning from lying to sitting, or sitting to standing.",finding:"Systolic BP drops ≥ 20 mmHg AND/OR pulse increases ≥ 10 bpm between positions",causes:["Dehydration or volume depletion","Cardiovascular disease","Diabetes mellitus (autonomic neuropathy)","Medications (antihypertensives, diuretics)","Nervous system disorders","Prolonged bed rest"],steps:["Lie supine 5 min, then measure BP and pulse","Stand; record BP and pulse at 1 minute","Still standing, record again at 3 minutes","Keep arm at heart level throughout","Monitor for dizziness — stop if symptoms appear"]},
{id:11,type:"pulse",title:"Pulse: Rate, Rhythm & Strength",sites:[{name:"Radial",desc:"Thumb side of wrist — most common"},{name:"Brachial",desc:"Inside upper arm — children and BP"},{name:"Carotid",desc:"Neck below jawbone — emergencies"},{name:"Apical",desc:"Heart apex — irregular rhythms, infants"},{name:"Temporal",desc:"Side of forehead"},{name:"Dorsalis Pedis",desc:"Top of foot — circulation check"}],rates:[{age:"Adolescent & older",range:"60–100 bpm"},{age:"School-age (6–15 yrs)",range:"75–118 bpm"},{age:"Preschooler (3–5 yrs)",range:"80–120 bpm"},{age:"Toddler (1–2 yrs)",range:"98–140 bpm"},{age:"Infant (1–12 mo)",range:"100–180 bpm"}]},
{id:12,type:"temperature",title:"Measuring Body Temperature",routes:[{name:"Oral",doc:"No notation",offset:"Baseline",note:"Standard site. No hot/cold liquids, gum, or smoking within 15 min.",color:"#4A90D9"},{name:"Axillary (Ax)",doc:"(Ax)",offset:"~1°F Lower",note:"Less accurate — not an enclosed cavity. Used when others contraindicated.",color:"#3DAE8E"},{name:"Rectal (R)",doc:"(R)",offset:"~1°F Higher",note:"Most accurate. Preferred for infants/young children.",color:"#D94F4F"},{name:"Tympanic (T/AU)",doc:"(T) or (AU)",offset:"~1°F Higher",note:"Infrared from tympanic membrane. Not with ear infections.",color:"#E8853D"},{name:"Temporal (TA)",doc:"(TA)",offset:"~1°F Higher",note:"Scans temporal artery on forehead. Preferred pediatric.",color:"#8B6FC0"}],keyFacts:["Normal oral: 98.6°F (37°C)","Older adults (70+): 96.8°F","Dangerous fever: ≥ 104°F","Fatal: ≥ 106°F"]},
{id:13,type:"respiration",title:"Respiration & Pulse Oximetry",rates:[{age:"Adolescent & older",range:"12–20"},{age:"School-age (6–15 yrs)",range:"18–25"},{age:"Preschooler (3–5 yrs)",range:"20–28"},{age:"Toddler (1–2 yrs)",range:"22–37"},{age:"Infant (1–12 mo)",range:"30–53"}],terms:[{term:"Tachypnea",def:"Abnormally rapid breathing"},{term:"Bradypnea",def:"Abnormally slow breathing"},{term:"Dyspnea",def:"Labored or painful breathing"},{term:"Apnea",def:"Temporary cessation of breathing"}],oximetry:{normal:"≥ 95%",report:"< 90%"},tip:"Count for 30 sec × 2 (or full minute if irregular). Don't announce you're counting."},
{id:14,type:"pain",title:"Pain Assessment",painApproach:["Pain is subjective — patient's self-report is the gold standard","Observe nonverbal cues: grimacing, guarding, rigid posture","Use Wong-Baker FACES® Scale for children or nonverbal patients","Ask about location, onset, duration, character, radiation","Document all pain responses and report to the provider"],lmpFacts:[{q:"What is LMP?",a:"Last Menstrual Period — first day of most recent cycle. Ask at every visit."},{q:"Why does it matter?",a:"Determines pregnancy status before labs, imaging, or prescribing."},{q:"Cycle basics",a:"Average ~28 days, regulated by estrogen and progesterone."}]},
{id:15,type:"screenings",title:"Routine Health Screenings",screenings:[{icon:"🚬",name:"Tobacco",color:"#D94F4F",items:["Screen: cigarettes, cigars, chewing tobacco, e-cigs, vaping","Document pack-year history when applicable","Positive → cessation counseling and resource referral",'Declined → document "Patient declined to answer"']},{icon:"🍷",name:"Alcohol",color:"#E8853D",items:["Assess frequency, quantity, and pattern","Identifies at-risk drinking requiring intervention","Results inform preventive care and referrals","Respect right to decline — document accordingly"]},{icon:"🔬",name:"HIV",color:"#8B6FC0",items:["Routine for all adults ages 15–65 (CDC/USPSTF)","Sexual health questions in social history","All results confidential in medical record","Right to decline; document if refused"]},{icon:"🧠",name:"Mental Health",color:"#4A90D9",items:["PHQ-2: 2-question depression screen","PHQ-9: Full assessment if PHQ-2 positive","GAD-7: Generalized anxiety disorder","MMSE: Cognitive screening for older adults"]}]},
{id:16,type:"conversions",title:"Anthropometric Measurements & BMI",conversions:[{from:"lbs → kg",formula:"÷ 2.2",example:"148 lb ÷ 2.2 = 67.3 kg"},{from:"kg → lbs",formula:"× 2.2",example:"87 kg × 2.2 = 191.4 lb"},{from:"in → ft",formula:"÷ 12",example:"62 in ÷ 12 = 5 ft 2 in"},{from:"°F → °C",formula:"(°F − 32) ÷ 1.8",example:"99°F → 37.2°C"},{from:"°C → °F",formula:"(°C × 1.8) + 32",example:"38°C → 100.4°F"}],bmi:[{cat:"Underweight",range:"< 18.5",color:"#4A90D9"},{cat:"Normal",range:"18.5–24.9",color:"#3DAE8E"},{cat:"Overweight",range:"25.0–29.9",color:"#E8853D"},{cat:"Obese",range:"≥ 30.0",color:"#D94F4F"}]},
{id:17,type:"pediatric",title:"Pediatric Measurements & Growth Charts",measurements:[{icon:"📏",name:"Length / Height",desc:"Infants: lay flat, mark head & heel, measure. Standing children: stadiometer. Remove shoes."},{icon:"⚖️",name:"Weight",desc:"Infants unclothed, no diaper. Record lbs/oz and kg. Never leave infant unattended on scale."},{icon:"🧠",name:"Head Circumference",desc:"Widest point: above eyebrows, around occiput. Tracked birth to 36 months."}],percentiles:[{range:"< 5th",label:"Underweight",color:"#4A90D9"},{range:"5th–84th",label:"Healthy Weight",color:"#3DAE8E"},{range:"85th–94th",label:"Overweight",color:"#E8853D"},{range:"≥ 95th",label:"Obese",color:"#D94F4F"}]},
{id:18,type:"factors",title:"Factors That Influence Vital Sign Readings",factors:[{factor:"Hot beverage consumption",effect:"↑ Oral temperature reading"},{factor:"Cold beverage consumption",effect:"↓ Oral temperature reading"},{factor:"Anxiety / White coat syndrome",effect:"↑ Blood pressure, ↑ Heart rate"},{factor:"Smoking within 30 minutes",effect:"↑ Blood pressure, ↑ Heart rate"},{factor:"Physical exertion",effect:"↑ BP, ↑ Heart rate, ↓ SpO₂"},{factor:"Pain (acute or chronic)",effect:"↑ Blood pressure, ↑ Heart rate"},{factor:"Illness or active infection",effect:"↑ Temperature"},{factor:"Beta-blocker medication",effect:"↓ Blood pressure, ↓ Heart rate"},{factor:"Young children",effect:"Greater temperature fluctuation"},{factor:"Older adults (65+)",effect:"Lower baseline temperature"}],note:"Always account for these variables before drawing clinical conclusions."},

const total=SLIDES.length;let cur=0;let slideState={};
function resetState(){slideState={objShown:new Set([0]),idOpen:null,historyTab:0,bpShowErr:false,bpStep:0,screenTab:0,painVal:0,convMode:"lbs_to_kg",convInput:"",takeaways:{},quizIdx:0,quizSel:null,quizAnswered:false,quizScore:0,quizDone:false}}
resetState();
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function go(n){if(n<0||n>=total)return;if(n!==cur){slideState.idOpen=null;slideState.bpShowErr=false;slideState.bpStep=0}cur=n;render()}
function toggleTOC(){document.getElementById('tocOverlay').classList.toggle('hidden');document.getElementById('tocBtn').classList.toggle('active')}
function closeTOC(){document.getElementById('tocOverlay').classList.add('hidden');document.getElementById('tocBtn').classList.remove('active')}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1)}if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1)}if(e.key==='Escape')closeTOC()});

function render(){
  document.getElementById('slideWrap').innerHTML=renderSlide(SLIDES[cur]);
  document.getElementById('dots').innerHTML=SLIDES.map((_,i)=>`<div class="dot ${i===cur?'current':i<cur?'visited':'future'}" onclick="go(${i})"></div>`).join('');
  document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur===total-1;
  document.getElementById('tocList').innerHTML=SLIDES.map((s,i)=>`<div class="toc-item ${i===cur?'active':''}" onclick="go(${i});closeTOC()" style="color:${i===cur?'var(--accent)':'var(--textMid)'}"><span class="idx">${String(i+1).padStart(2,'0')}</span>${esc(s.title)}</div>`).join('');
}
function H(idx,title){return `<div class="slide-header"><div class="num">${String(idx+1).padStart(2,'0')}</div><div class="title">${esc(title)}</div></div>`}
function F(idx){return `<div class="slide-footer"><span class="left">Medical Assistant Program • Week 1</span><span class="right">${idx+1} / ${total}</span></div>`}
function renderSlide(s){const i=s.id;const fn={title:renderTitle,overview:renderOverview,objectives:renderObjectives,stats:renderStats,identifiers:renderIdentifiers,history:renderHistory,documentation:renderDocumentation,vitals:renderVitals,bp_table:renderBPTable,bp_steps:renderBPSteps,orthostatic:renderOrthostatic,pulse:renderPulse,temperature:renderTemperature,respiration:renderRespiration,pain:renderPain,screenings:renderScreenings,conversions:renderConversions,pediatric:renderPediatric,factors:renderFactors,safety:renderSafety,takeaways:renderTakeaways,quiz:renderQuiz,end:renderEnd};return fn[s.type]?fn[s.type](s,i):''}

function renderTitle(s){return `<div class="slide-frame dark"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px;position:relative"><div style="position:absolute;top:24px;left:32px;display:flex;align-items:center;gap:6px"><div style="width:24px;height:2px;background:var(--accent);border-radius:2px"></div><span style="font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase">${esc(s.subtitle)}</span></div><div style="font-size:19px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">${esc(s.week)}</div><h1 style="font-family:var(--ff);font-size:50px;font-weight:700;color:#fff;margin:0;line-height:1.25;white-space:pre-line">${esc(s.title)}</h1><div style="display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center">${s.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

function renderOverview(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.6;margin:0 0 10px;max-width:680px">${esc(s.description)}</p><div class="grid-3">${s.items.map(it=>`<div class="card card-accent"><div style="font-size:18px;margin-bottom:3px">${it.icon}</div><div style="font-size:19px;font-weight:700;color:var(--text)">${esc(it.label)}</div><div style="font-size:18px;color:var(--textMid);line-height:1.4;margin-top:2px">${esc(it.desc)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderObjectives(s,idx){const sh=slideState.objShown;return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div style="display:flex;flex-direction:column;gap:4px">${s.objectives.map((obj,i)=>`<div class="obj-row ${sh.has(i)?'shown':''}" onclick="revealObj(${i})"><div class="obj-circle ${sh.has(i)?'active':'inactive'}">${i+1}</div><div style="font-size:18px;color:var(--text);line-height:1.5;padding-top:2px">${esc(obj)}</div></div>`).join('')}</div>${sh.size<s.objectives.length?'<p style="font-size:20px;color:var(--textLight);margin-top:8px;font-style:italic">Click each objective to reveal</p>':''}</div>${F(idx)}</div>`}
function revealObj(i){for(let x=0;x<=i;x++)slideState.objShown.add(x);render()}

function renderStats(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.6;margin:0 0 10px;max-width:640px">${esc(s.description)}</p><div style="display:flex;gap:12px;margin-bottom:12px">${s.stats.map((st,i)=>`<div style="flex:1;background:${i===0?'var(--warmLight)':'var(--accentLight)'};border-radius:8px;padding:14px 16px;text-align:center"><div style="font-family:var(--ff);font-size:40px;font-weight:700;color:${i===0?'var(--warm)':'var(--accent)'}">${esc(st.value)}</div><div style="font-size:19px;color:var(--textMid);line-height:1.4;margin-top:4px">${esc(st.label)}</div></div>`).join('')}</div><div class="callout callout-accent"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Core Principles</div>${s.principles.map(p=>`<div style="font-size:18px;color:var(--text);line-height:1.6">• ${esc(p)}</div>`).join('')}</div></div>${F(idx)}</div>`}

function renderIdentifiers(s,idx){const o=slideState.idOpen;return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div style="font-size:19px;font-weight:600;color:var(--textMid);margin-bottom:10px">${esc(s.subtitle)} — click to expand</div><div class="grid-2" style="margin-bottom:10px">${s.identifiers.map((id,i)=>`<div class="id-card ${o===i?'open':''}" onclick="slideState.idOpen=${o===i?'null':i};render()" style="background:${o===i?'var(--accentLight)':'var(--slideAlt)'}"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${id.icon}</span><span style="font-size:19px;font-weight:700;color:var(--text)">${esc(id.name)}</span></div><div class="desc">${esc(id.desc)}</div></div>`).join('')}</div><div class="callout callout-warm" style="margin-bottom:6px"><div style="font-size:20px;font-weight:700;color:var(--warm);margin-bottom:2px;text-transform:uppercase;letter-spacing:1px">⚠ Common Mistake</div><div style="font-size:18px;color:var(--text);line-height:1.5">${esc(s.warning)}</div></div><div style="font-size:18px;color:var(--accent);font-style:italic">💡 ${esc(s.tip)}</div></div>${F(idx)}</div>`}

function renderHistory(s,idx){const t=slideState.historyTab;const cat=s.categories[t];return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="tab-bar">${s.categories.map((c,i)=>`<button class="tab-btn ${t===i?'active':''}" onclick="slideState.historyTab=${i};render()" style="${t===i?'font-weight:700;color:var(--accent);border-bottom-color:'+c.color:''}">${c.icon} ${esc(c.name)}</button>`).join('')}</div><div style="background:var(--slideAlt);border-radius:8px;padding:16px 20px;border-left:3px solid ${cat.color};min-height:140px"><div style="font-family:var(--ff);font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px">${cat.icon} ${esc(cat.name)}</div>${cat.items.map(item=>`<div style="font-size:19px;color:var(--textMid);line-height:1.7;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:${cat.color};font-weight:700">›</span>${esc(item)}</div>`).join('')}</div></div>${F(idx)}</div>`}

function renderDocumentation(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.5;margin:0 0 10px">${esc(s.description)}</p><div class="grid-3" style="gap:8px">${s.practices.map(p=>`<div class="card"><div style="font-size:20px;margin-bottom:3px">${p.icon}</div><div style="font-size:19px;font-weight:700;color:var(--text);margin-bottom:2px">${esc(p.title)}</div><div style="font-size:20px;color:var(--textMid);line-height:1.5">${esc(p.desc)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderVitals(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.5;margin:0 0 12px">${esc(s.description)}</p><div style="display:flex;gap:10px;margin-bottom:12px">${s.vitals.map(v=>`<div class="vital-card" style="border-top:3px solid ${v.color}"><div style="font-family:var(--ff);font-size:20px;font-weight:700;color:${v.color}">${esc(v.value)}</div><div style="font-size:20px;color:var(--textLight);margin-top:1px">${esc(v.unit)}</div><div style="font-size:20px;font-weight:700;color:var(--text);margin-top:6px;white-space:pre-line;line-height:1.3">${esc(v.name)}</div></div>`).join('')}</div><div class="callout callout-amber"><span style="font-size:18px;font-weight:700;color:var(--amber)">Influencing Factors: </span><span style="font-size:18px;color:var(--textMid)">${esc(s.factors)}</span></div></div>${F(idx)}</div>`}

function renderBPTable(s,idx){const show=slideState.bpShowErr;return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><table><thead><tr class="thead-dark"><th>Category</th><th>Systolic</th><th>Diastolic</th></tr></thead><tbody>${s.categories.map((c,i)=>`<tr ${i%2?'class="alt"':''}><td style="font-weight:700"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.color};margin-right:6px;vertical-align:middle"></span>${esc(c.name)}</td><td>${esc(c.systolic)} mmHg</td><td>${esc(c.diastolic)} mmHg</td></tr>`).join('')}</tbody></table></div><div style="flex:1"><button onclick="slideState.bpShowErr=!slideState.bpShowErr;render()" style="font-size:18px;font-weight:700;color:var(--warm);background:var(--warmLight);border:1px solid rgba(217,79,79,.2);border-radius:5px;padding:7px 14px;width:100%;margin-bottom:8px">${show?'Hide':'Show'} Common Errors ⚠</button>${show?`<div style="background:var(--warmLight);border-radius:6px;padding:8px 12px">${s.errors.map(e=>`<div style="font-size:18px;color:var(--text);line-height:1.6;padding-left:12px;position:relative"><span style="position:absolute;left:0;color:var(--warm);font-weight:700">×</span>${esc(e)}</div>`).join('')}</div>`:''}</div></div></div>${F(idx)}</div>`}

function renderBPSteps(s,idx){const st=slideState.bpStep;const c=s.steps[st];return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:18px;color:var(--textMid);margin:0 0 10px">${esc(s.subtitle)}</p><div class="flex-row"><div style="display:flex;flex-direction:column;gap:3px">${s.steps.map((step,i)=>`<button class="step-btn ${st===i?'active':''}" onclick="slideState.bpStep=${i};render()"><span style="font-weight:700;margin-right:4px">${step.num}.</span>${esc(step.title)}</button>`).join('')}</div><div style="flex:1;background:var(--accentLight);border-radius:8px;padding:18px 22px;border-left:3px solid var(--accent)"><div style="font-family:var(--ff);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px">Step ${c.num}</div><div style="font-family:var(--ff);font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px">${esc(c.title)}</div><div style="font-size:19px;color:var(--textMid);line-height:1.7">${esc(c.desc)}</div></div></div></div>${F(idx)}</div>`}

function renderOrthostatic(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.5;margin:0 0 8px">${esc(s.definition)}</p><div class="callout callout-warm" style="margin-bottom:10px"><span style="font-size:18px;font-weight:700;color:var(--warm)">Positive Finding: </span><span style="font-size:18px;color:var(--text);font-weight:600">${esc(s.finding)}</span></div><div class="flex-row" style="gap:12px"><div style="flex:1;background:var(--amberLight);border-radius:6px;padding:10px 14px"><div style="font-size:18px;font-weight:700;color:var(--amber);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Common Causes</div>${s.causes.map(c=>`<div style="font-size:18px;color:var(--text);line-height:1.6">• ${esc(c)}</div>`).join('')}</div><div style="flex:1;background:var(--accentLight);border-radius:6px;padding:10px 14px"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">How to Measure</div>${s.steps.map((st,i)=>`<div style="font-size:18px;color:var(--text);line-height:1.6"><span style="font-weight:700;color:var(--accent)">${i+1}.</span> ${esc(st)}</div>`).join('')}</div></div></div>${F(idx)}</div>`}

function renderPulse(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Pulse Sites</div><div class="grid-2" style="gap:5px">${s.sites.map(site=>`<div class="card" style="padding:6px 8px"><div style="font-size:18px;font-weight:700;color:var(--accent)">${esc(site.name)}</div><div style="font-size:20px;color:var(--textMid);line-height:1.3">${esc(site.desc)}</div></div>`).join('')}</div></div><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Pulse Rate by Age</div><table><tbody>${s.rates.map((r,i)=>`<tr ${i%2?'class="alt"':''} style="border-bottom:1px solid var(--border)"><td style="padding:7px 10px;color:var(--textMid)">${esc(r.age)}</td><td style="padding:7px 10px;font-weight:700;color:var(--blue);text-align:right">${esc(r.range)}</td></tr>`).join('')}</tbody></table></div></div></div>${F(idx)}</div>`}

function renderTemperature(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">${s.routes.map(r=>`<div style="display:flex;align-items:center;gap:12px;background:var(--slideAlt);border-radius:6px;padding:7px 12px;border-left:3px solid ${r.color}"><div style="min-width:85px"><div style="font-size:19px;font-weight:700;color:${r.color}">${esc(r.name)}</div><div style="font-size:19px;color:var(--textLight)">Chart: ${esc(r.doc)}</div></div><div style="min-width:70px;font-size:18px;font-weight:700;color:var(--text)">${esc(r.offset)}</div><div style="font-size:20px;color:var(--textMid);line-height:1.4;flex:1">${esc(r.note)}</div></div>`).join('')}</div><div style="display:flex;gap:8px">${s.keyFacts.map((f,i)=>`<div style="flex:1;background:${i>=2?'var(--warmLight)':'var(--blueLight)'};border-radius:5px;padding:7px 10px;text-align:center"><div style="font-size:18px;font-weight:700;color:${i>=2?'var(--warm)':'var(--blue)'}">${esc(f)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderRespiration(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Resp Rate by Age</div><table style="margin-bottom:10px"><tbody>${s.rates.map((r,i)=>`<tr ${i%2?'class="alt"':''}><td style="padding:5px 10px;color:var(--textMid)">${esc(r.age)}</td><td style="padding:5px 10px;font-weight:700;color:var(--accent);text-align:right">${esc(r.range)} bpm</td></tr>`).join('')}</tbody></table><div style="font-size:18px;font-weight:700;color:var(--purple);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Key Terminology</div>${s.terms.map(t=>`<div style="font-size:18px;line-height:1.6"><span style="font-weight:700;color:var(--purple)">${esc(t.term)}: </span><span style="color:var(--textMid)">${esc(t.def)}</span></div>`).join('')}</div><div style="flex:1;display:flex;flex-direction:column;gap:8px"><div style="background:var(--accentLight);border-radius:8px;padding:16px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center"><div style="font-family:var(--ff);font-size:50px;font-weight:700;color:var(--accent)">${esc(s.oximetry.normal)}</div><div style="font-size:19px;color:var(--textMid);margin-top:2px">Normal SpO₂</div></div><div style="background:var(--warmLight);border-radius:8px;padding:16px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center"><div style="font-family:var(--ff);font-size:50px;font-weight:700;color:var(--warm)">${esc(s.oximetry.report)}</div><div style="font-size:19px;color:var(--textMid);margin-top:2px">Report to Provider</div></div><div style="font-size:20px;color:var(--accent);font-style:italic;padding:0 4px">💡 ${esc(s.tip)}</div></div></div></div>${F(idx)}</div>`}

function renderPain(s,idx){const p=slideState.painVal;const col=p<=3?'var(--accent)':p<=6?'var(--amber)':'var(--warm)';const label=p===0?'No Pain':p<=3?'Mild':p<=6?'Moderate':p<=8?'Severe':'Worst Possible';return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Interactive Pain Scale</div><div style="background:var(--slideAlt);border-radius:8px;padding:14px;text-align:center;margin-bottom:10px"><div style="font-family:var(--ff);font-size:50px;font-weight:700;color:${col}">${p}</div><div style="font-size:19px;font-weight:700;color:${col};margin-bottom:8px">${label}</div><input type="range" min="0" max="10" value="${p}" oninput="slideState.painVal=+this.value;render()"><div style="display:flex;justify-content:space-between;font-size:19px;color:var(--textLight);margin-top:2px"><span>0 — No Pain</span><span>10 — Worst</span></div></div><div style="font-size:18px;font-weight:700;color:var(--purple);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Menstrual History (LMP)</div>${s.lmpFacts.map(f=>`<div style="font-size:18px;line-height:1.6;margin-bottom:2px"><span style="font-weight:700;color:var(--purple)">${esc(f.q)}: </span><span style="color:var(--textMid)">${esc(f.a)}</span></div>`).join('')}</div><div style="flex:1;background:var(--accentLight);border-radius:8px;padding:14px 16px"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Clinical Approach</div>${s.painApproach.map(a=>`<div style="font-size:18px;color:var(--text);line-height:1.7;padding-left:12px;position:relative"><span style="position:absolute;left:0;color:var(--accent);font-weight:700">›</span>${esc(a)}</div>`).join('')}</div></div></div>${F(idx)}</div>`}

function renderScreenings(s,idx){const t=slideState.screenTab;const sc=s.screenings[t];return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="tab-bar">${s.screenings.map((item,i)=>`<button class="tab-btn ${t===i?'active':''}" onclick="slideState.screenTab=${i};render()" style="${t===i?'font-weight:700;color:'+item.color+';border-bottom-color:'+item.color:''}">${item.icon} ${esc(item.name)}</button>`).join('')}</div><div style="background:var(--slideAlt);border-radius:8px;padding:16px 20px;border-left:3px solid ${sc.color};min-height:140px"><div style="font-family:var(--ff);font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px">${sc.icon} ${esc(sc.name)}</div>${sc.items.map(item=>`<div style="font-size:19px;color:var(--textMid);line-height:1.7;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:${sc.color};font-weight:700">›</span>${esc(item)}</div>`).join('')}</div></div>${F(idx)}</div>`}

function renderConversions(s,idx){const mode=slideState.convMode,inp=slideState.convInput,v=parseFloat(inp);let result='—';if(!isNaN(v)){if(mode==='lbs_to_kg')result=(v/2.2).toFixed(1)+' kg';else if(mode==='kg_to_lbs')result=(v*2.2).toFixed(1)+' lbs';else if(mode==='f_to_c')result=((v-32)/1.8).toFixed(1)+' °C';else if(mode==='c_to_f')result=(v*1.8+32).toFixed(1)+' °F'}const modes=[['lbs_to_kg','lbs → kg'],['kg_to_lbs','kg → lbs'],['f_to_c','°F → °C'],['c_to_f','°C → °F']];return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Unit Conversions</div><table style="margin-bottom:10px"><tbody>${s.conversions.map((c,i)=>`<tr ${i%2?'class="alt"':''}><td style="padding:7px 10px;font-weight:700;color:var(--accent);width:70px">${esc(c.from)}</td><td style="padding:7px 10px;color:var(--text)">${esc(c.formula)}</td><td style="padding:7px 10px;color:var(--textLight);font-style:italic;font-size:18px">${esc(c.example)}</td></tr>`).join('')}</tbody></table><div style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">BMI Categories</div><div style="display:flex;gap:6px">${s.bmi.map(b=>`<div style="flex:1;text-align:center;border-top:3px solid ${b.color};background:var(--slideAlt);border-radius:5px;padding:6px 4px"><div style="font-size:19px;font-weight:700;color:${b.color}">${esc(b.range)}</div><div style="font-size:19px;color:var(--textMid)">${esc(b.cat)}</div></div>`).join('')}</div></div><div style="flex:1;background:var(--accentLight);border-radius:8px;padding:16px"><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Interactive Converter</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${modes.map(([k,l])=>`<button onclick="slideState.convMode='${k}';render()" style="font-size:18px;font-weight:${mode===k?'700':'500'};color:${mode===k?'#fff':'var(--textMid)'};background:${mode===k?'var(--accent)':'var(--slideBg)'};border:1px solid ${mode===k?'var(--accent)':'var(--border)'};border-radius:4px;padding:4px 10px;cursor:pointer">${l}</button>`).join('')}</div><input value="${esc(inp)}" oninput="slideState.convInput=this.value;render()" placeholder="Enter value..." type="number" style="font-size:18px;padding:8px 12px;border-radius:6px;border:2px solid var(--accent);background:#fff;color:var(--text);width:100%;outline:none;box-sizing:border-box;margin-bottom:10px"><div style="font-family:var(--ff);font-size:50px;font-weight:700;color:var(--accent);text-align:center">${esc(result)}</div></div></div></div>${F(idx)}</div>`}

function renderPediatric(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">${s.measurements.map(m=>`<div style="display:flex;gap:12px;align-items:flex-start;background:var(--slideAlt);border-radius:6px;padding:10px 14px"><span style="font-size:22px">${m.icon}</span><div><div style="font-size:19px;font-weight:700;color:var(--text);margin-bottom:1px">${esc(m.name)}</div><div style="font-size:18px;color:var(--textMid);line-height:1.5">${esc(m.desc)}</div></div></div>`).join('')}</div><div style="font-size:18px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">CDC Growth Chart Percentiles</div><div style="display:flex;gap:8px">${s.percentiles.map(p=>`<div style="flex:1;text-align:center;border-top:3px solid ${p.color};background:var(--slideAlt);border-radius:6px;padding:10px 8px"><div style="font-size:18px;font-weight:700;color:${p.color}">${esc(p.range)}</div><div style="font-size:20px;color:var(--textMid);margin-top:1px">${esc(p.label)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderFactors(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><table><thead><tr class="thead-dark"><th>Factor</th><th>Effect on Readings</th></tr></thead><tbody>${s.factors.map((f,i)=>{const isUp=f.effect.includes('↑'),isDown=f.effect.includes('↓');const col=isUp&&isDown?'var(--amber)':isUp?'var(--warm)':'var(--blue)';return `<tr ${i%2?'class="alt"':''}><td>${esc(f.factor)}</td><td style="font-weight:700;color:${col}">${esc(f.effect)}</td></tr>`}).join('')}</tbody></table><div style="font-size:18px;color:var(--textMid);font-style:italic;margin-top:8px">${esc(s.note)}</div></div>${F(idx)}</div>`}

function renderSafety(s,idx){return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><p style="font-size:19px;color:var(--textMid);line-height:1.5;margin:0 0 10px">${esc(s.intro)}</p><div class="grid-3" style="gap:8px">${s.practices.map(p=>`<div class="card"><div style="font-size:20px;margin-bottom:3px">${p.icon}</div><div style="font-size:19px;font-weight:700;color:var(--text);margin-bottom:2px">${esc(p.title)}</div><div style="font-size:20px;color:var(--textMid);line-height:1.5">${esc(p.desc)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderTakeaways(s,idx){const ch=slideState.takeaways;const done=Object.values(ch).filter(Boolean).length;return `<div class="slide-frame">${H(idx,s.title)}<div class="slide-body"><div style="font-size:18px;font-weight:600;color:var(--accent);margin-bottom:8px">${done}/${s.items.length} reviewed — check off each takeaway</div><div class="grid-2" style="gap:5px">${s.items.map((item,i)=>`<div class="takeaway ${ch[i]?'checked':''}" onclick="slideState.takeaways[${i}]=!slideState.takeaways[${i}];render()"><div class="box">${ch[i]?'✓':''}</div><div class="label">${esc(item)}</div></div>`).join('')}</div></div>${F(idx)}</div>`}

function renderQuiz(s,idx){const{quizIdx:qi,quizSel:sel,quizAnswered:ans,quizScore:score,quizDone:done}=slideState;if(done){const pct=Math.round((score/s.questions.length)*100);return `<div class="slide-frame">${H(idx,'Quiz Results')}<div class="slide-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-family:var(--ff);font-size:72px;font-weight:700;color:${pct>=80?'var(--accent)':'var(--amber)'}">${pct}%</div><div style="font-size:20px;font-weight:600;color:var(--text)">${score}/${s.questions.length} Correct</div><div style="font-size:19px;color:var(--textMid);margin-top:6px">${pct>=80?"Excellent work! You've mastered this material.":'Review the slides and try again.'}</div><button onclick="slideState.quizIdx=0;slideState.quizSel=null;slideState.quizAnswered=false;slideState.quizScore=0;slideState.quizDone=false;render()" style="font-size:19px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:6px;padding:10px 24px;cursor:pointer;margin-top:18px">Retake Quiz</button></div>${F(idx)}</div>`}const q=s.questions[qi];return `<div class="slide-frame">${H(idx,`Knowledge Check — Q${qi+1}/${s.questions.length}`)}<div class="slide-body"><div class="flex-row"><div style="flex:1"><div style="font-family:var(--ff);font-size:19px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:14px">${esc(q.q)}</div><div style="display:flex;flex-direction:column;gap:5px">${q.options.map((opt,i)=>{const right=ans&&i===q.correct;const wrong=ans&&i===sel&&i!==q.correct;let cls='quiz-opt'+(ans?' answered':'')+(right?' correct':'')+(wrong?' wrong':'');return `<button class="${cls}" onclick="pickQuiz(${i})">${String.fromCharCode(65+i)}.  ${esc(opt)}</button>`}).join('')}</div></div><div style="flex:1;display:flex;flex-direction:column;justify-content:center">${ans?`<div style="background:${sel===q.correct?'var(--accentLight)':'var(--warmLight)'};border-radius:8px;padding:18px 16px;border-left:3px solid ${sel===q.correct?'var(--accent)':'var(--warm)'}"><div style="font-size:19px;font-weight:700;color:${sel===q.correct?'var(--accent)':'var(--warm)'};margin-bottom:6px">${sel===q.correct?'✓ Correct!':'✗ Incorrect'}</div><div style="font-size:19px;color:var(--textMid);line-height:1.6">${esc(q.explanation)}</div><button onclick="nextQuiz()" style="font-size:19px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:5px;padding:8px 18px;cursor:pointer;margin-top:10px">${qi<s.questions.length-1?'Next Question →':'See Results →'}</button></div>`:`<div style="text-align:center;color:var(--textLight)"><div style="font-size:19px;font-style:italic">Select an answer to continue</div></div>`}</div></div></div>${F(idx)}</div>`}

function pickQuiz(i){if(slideState.quizAnswered)return;slideState.quizSel=i;slideState.quizAnswered=true;if(i===SLIDES[21].questions[slideState.quizIdx].correct)slideState.quizScore++;render()}
function nextQuiz(){if(slideState.quizIdx<SLIDES[21].questions.length-1){slideState.quizIdx++;slideState.quizSel=null;slideState.quizAnswered=false}else slideState.quizDone=true;render()}

function renderEnd(s){return `<div class="slide-frame dark"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px"><div style="font-size:19px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">${esc(s.title)}</div><h1 style="font-family:var(--ff);font-size:38px;font-weight:700;color:#fff;margin:0 0 16px">${esc(s.subtitle)}</h1><p style="font-size:19px;color:rgba(255,255,255,0.6);max-width:480px;line-height:1.6">${esc(s.message)}</p><div style="display:flex;gap:16px;margin-top:24px;font-size:19px;color:rgba(255,255,255,0.4)"><span>Questions?</span><span>•</span><span>Review</span><span>•</span><span>Practice</span></div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

function toggleFS(){document.body.classList.toggle('fullscreen');const b=document.getElementById('fsB');b.textContent=document.body.classList.contains('fullscreen')?'✕ Exit Fullscreen':'⛶ Fullscreen'}
render();
</script>
</body>
</html>
