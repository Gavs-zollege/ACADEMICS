<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vital Signs Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111827;
    --card-bg: #1F2937;
    --border: #374151;
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #6B7280;
    --accent: #0E7490;
    --accent-hover: #0891b2;
    --know-bg: #064E3B;
    --know-border: #10B981;
    --know-text: #6EE7B7;
    --study-bg: #78350F;
    --study-border: #F59E0B;
    --study-text: #FDE68A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .topbar-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .stats { display: flex; gap: 16px; align-items: center; }
  .stat-item { text-align: center; }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }

  .tabs {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
  }
  .tabs-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-secondary);
  }
  .tab-btn:hover { border-color: var(--accent-hover); color: var(--accent-hover); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .main { max-width: 720px; margin: 0 auto; padding: 28px 24px 48px; }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .progress-text { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .reset-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'Inter', sans-serif;
  }
  .reset-btn:hover { color: var(--text-secondary); }

  .card-container {
    perspective: 1200px;
    margin-bottom: 20px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .card-flipper {
    position: relative;
    min-height: 290px;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
  }
  .card-flipper.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 290px;
  }
  .card-front {
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .card-back {
    transform: rotateY(180deg);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .cat-badge span {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-family: 'Inter', sans-serif;
  }

  .card-question {
    font-size: 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    line-height: 1.5;
    white-space: pre-line;
  }
  .card-answer {
    font-size: 22px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    line-height: 1.55;
    white-space: pre-line;
  }
  .flip-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 20px;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .action-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .action-btn {
    flex: 1;
    max-width: 220px;
    padding: 13px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }
  .btn-study { background: var(--study-bg); border: 1.5px solid var(--study-border); color: var(--study-text); }
  .btn-study:hover { box-shadow: 0 4px 16px rgba(245,158,11,0.2); }
  .btn-know { background: var(--know-bg); border: 1.5px solid var(--know-border); color: var(--know-text); }
  .btn-know:hover { box-shadow: 0 4px 16px rgba(16,185,129,0.2); }

  .mastery-box {
    padding: 18px 22px;
    background: var(--card-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .mastery-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .mastery-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .mastery-pct {
    font-size: 14px;
    font-weight: 700;
    color: var(--know-text);
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }
  .bar-known { height: 100%; background: linear-gradient(90deg,#10B981,#059669); transition: width 0.5s; }
  .bar-study { height: 100%; background: linear-gradient(90deg,#F59E0B,#D97706); transition: width 0.5s; }
  .mastery-legend {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="topbar-title">Vital Signs Flashcards</div>
      <div class="topbar-sub" id="cardCount">31 cards &middot; Tap to flip</div>
    </div>
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" style="color:#10B981" id="knownCount">0</div>
        <div class="stat-label">Know it</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" style="color:#F59E0B" id="studyCount">0</div>
        <div class="stat-label">Studying</div>
      </div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner" id="tabsContainer"></div>
</div>

<div class="main">
  <div class="progress-row">
    <span class="progress-text" id="progressText">Card 1 of 31</span>
    <button class="reset-btn" onclick="resetProgress()">Reset progress</button>
  </div>

  <div class="card-container" id="cardContainer">
    <div class="card-flipper" id="cardFlipper">
      <div class="card-face card-front">
        <div class="cat-badge" id="frontBadge"><span id="frontCat"></span></div>
        <div class="card-question" id="frontText"></div>
        <div class="flip-hint">Tap to reveal answer</div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <div class="cat-badge" id="backBadge"><span id="backCat">Answer</span></div>
        <div class="card-answer" id="backText"></div>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn btn-study" id="btnStudy">Still Learning</button>
    <button class="action-btn btn-know" id="btnKnow">Know It!</button>
  </div>

  <div class="mastery-box">
    <div class="mastery-header">
      <span class="mastery-label">Mastery Progress</span>
      <span class="mastery-pct" id="masteryPct">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-known" id="barKnown" style="width:0%"></div>
      <div class="bar-study" id="barStudy" style="width:0%"></div>
    </div>
    <div class="mastery-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div><span id="legendKnown">Mastered: 0</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div><span id="legendStudy">Studying: 0</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#4B5563"></div><span id="legendUnseen">Unseen: 0</span></div>
    </div>
  </div>
</div>

<script>
var CARDS = [
  { front: "Normal adult blood pressure", back: "< 120/80 mmHg", category: "BP", color: "#3B82F6" },
  { front: "Stage 1 Hypertension range", back: "Systolic 130\u201339 mmHg\nDiastolic 80\u201389 mmHg", category: "BP", color: "#3B82F6" },
  { front: "Stage 2 Hypertension range", back: "Systolic \u2265 140 mmHg\nDiastolic \u2265 90 mmHg", category: "BP", color: "#3B82F6" },
  { front: "Hypertensive Crisis threshold", back: "Systolic > 180 mmHg\nDiastolic > 120 mmHg\n\u26a0 Medical emergency", category: "BP", color: "#3B82F6" },
  { front: "Positive orthostatic finding", back: "BP drops \u2265 20 mmHg systolic\nAND/OR pulse rises \u2265 10 bpm\nbetween positions", category: "BP", color: "#3B82F6" },
  { front: "Normal adult pulse rate", back: "60\u2013100 bpm", category: "Pulse", color: "#EF4444" },
  { front: "Normal infant pulse rate\n(1\u201312 months)", back: "100\u2013180 bpm", category: "Pulse", color: "#EF4444" },
  { front: "Normal toddler pulse rate\n(1\u20132 years)", back: "98\u2013140 bpm", category: "Pulse", color: "#EF4444" },
  { front: "Primary pulse site for adults", back: "Radial artery\n(thumb side of wrist)", category: "Pulse", color: "#EF4444" },
  { front: "Primary pulse site for infants", back: "Brachial artery\n(inside upper arm)", category: "Pulse", color: "#EF4444" },
  { front: "Normal adult oral temperature", back: "98.6\u00b0F (37\u00b0C)\nRange: 97.6\u201399.6\u00b0F", category: "Temp", color: "#F97316" },
  { front: "Rectal temp compared to oral", back: "~1\u00b0F HIGHER than oral\n(Most accurate route)", category: "Temp", color: "#F97316" },
  { front: "Axillary temp compared to oral", back: "~1\u00b0F LOWER than oral\n(Least accurate route)", category: "Temp", color: "#F97316" },
  { front: "Dangerous fever threshold", back: "\u2265 104\u00b0F (40\u00b0C)\nFatal: \u2265 106\u00b0F (41.1\u00b0C)", category: "Temp", color: "#F97316" },
  { front: "Normal adult respiratory rate", back: "12\u201320 breaths per minute", category: "Resp", color: "#10B981" },
  { front: "Normal infant respiratory rate\n(1\u201312 months)", back: "30\u201353 breaths per minute", category: "Resp", color: "#10B981" },
  { front: "Tachypnea definition", back: "Abnormally FAST breathing rate", category: "Resp", color: "#10B981" },
  { front: "Bradypnea definition", back: "Abnormally SLOW breathing rate", category: "Resp", color: "#10B981" },
  { front: "Dyspnea definition", back: "Difficult or labored breathing", category: "Resp", color: "#10B981" },
  { front: "Normal SpO\u2082 reading", back: "\u2265 95%\nReport to provider if < 90%", category: "SpO\u2082", color: "#8B5CF6" },
  { front: "lbs \u2192 kg conversion", back: "Divide by 2.2\nExample: 154 lbs \u00f7 2.2 = 70 kg", category: "Math", color: "#EC4899" },
  { front: "kg \u2192 lbs conversion", back: "Multiply by 2.2\nExample: 70 kg \u00d7 2.2 = 154 lbs", category: "Math", color: "#EC4899" },
  { front: "\u00b0F \u2192 \u00b0C formula", back: "(\u00b0F \u2212 32) \u00f7 1.8\nExample: 100.4\u00b0F \u2192 38\u00b0C", category: "Math", color: "#EC4899" },
  { front: "\u00b0C \u2192 \u00b0F formula", back: "(\u00b0C \u00d7 1.8) + 32\nExample: 38\u00b0C \u2192 100.4\u00b0F", category: "Math", color: "#EC4899" },
  { front: "BMI formula", back: "Weight (kg) \u00f7 Height\u00b2 (m\u00b2)\nor\n[Weight (lb) \u00f7 Height\u00b2 (in\u00b2)] \u00d7 703", category: "Math", color: "#EC4899" },
  { front: "BMI: Overweight range", back: "25.0 \u2013 29.9", category: "Math", color: "#EC4899" },
  { front: "Two required patient identifiers", back: "1) Full name (patient states it)\n2) Date of birth\n(or MRN / last 4 SSN)", category: "Safety", color: "#0E7490" },
  { front: "PHQ-2 purpose", back: "Initial 2-question depression screen\n(covers past 2 weeks)\nIf positive \u2192 follow up with PHQ-9", category: "Screen", color: "#6366F1" },
  { front: "GAD-7 purpose", back: "7-question validated screening tool\nfor Generalized Anxiety Disorder", category: "Screen", color: "#6366F1" },
  { front: "Pediatric underweight percentile", back: "< 5th percentile on\nCDC growth chart", category: "Peds", color: "#F59E0B" },
  { front: "Head circumference tracking stops at", back: "36 months (3 years)\nBy then, brain is ~75% of adult size", category: "Peds", color: "#F59E0B" }
];

var CATEGORIES = ["All","BP","Pulse","Temp","Resp","SpO\u2082","Math","Safety","Screen","Peds"];
var filter = "All";
var currentIdx = 0;
var flipped = false;
var known = {};
var studying = {};

function getFilteredItems() {
  var result = [];
  for (var i = 0; i < CARDS.length; i++) {
    if (filter === "All" || CARDS[i].category === filter) {
      result.push({ card: CARDS[i], idx: i });
    }
  }
  return result;
}

function render() {
  var filtered = getFilteredItems();
  var total = filtered.length;
  if (currentIdx >= total) currentIdx = 0;
  var item = filtered[currentIdx];
  var card = item ? item.card : null;

  var knownCount = 0, studyCount = 0;
  for (var i = 0; i < filtered.length; i++) {
    var gi = filtered[i].idx;
    if (known[gi]) knownCount++;
    else if (studying[gi]) studyCount++;
  }

  document.getElementById('cardCount').textContent = total + ' cards \u00b7 Tap to flip';
  document.getElementById('knownCount').textContent = knownCount;
  document.getElementById('studyCount').textContent = studyCount;
  document.getElementById('progressText').textContent = 'Card ' + (currentIdx + 1) + ' of ' + total;

  document.getElementById('cardFlipper').className = 'card-flipper' + (flipped ? ' flipped' : '');

  if (card) {
    var c = card.color;
    document.getElementById('frontBadge').style.background = c + '22';
    document.getElementById('frontCat').style.color = c;
    document.getElementById('frontCat').textContent = card.category;
    document.getElementById('frontText').textContent = card.front;
    document.getElementById('cardBack').style.background = 'linear-gradient(135deg,' + c + '18,' + c + '06)';
    document.getElementById('cardBack').style.border = '1.5px solid ' + c + '38';
    document.getElementById('backBadge').style.background = c + '25';
    document.getElementById('backCat').style.color = c;
    document.getElementById('backText').textContent = card.back;
  }

  var pct = total > 0 ? Math.round(knownCount / total * 100) : 0;
  document.getElementById('masteryPct').textContent = pct + '%';
  document.getElementById('barKnown').style.width = (total > 0 ? knownCount / total * 100 : 0) + '%';
  document.getElementById('barStudy').style.width = (total > 0 ? studyCount / total * 100 : 0) + '%';
  document.getElementById('legendKnown').textContent = 'Mastered: ' + knownCount;
  document.getElementById('legendStudy').textContent = 'Studying: ' + studyCount;
  document.getElementById('legendUnseen').textContent = 'Unseen: ' + (total - knownCount - studyCount);

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.className = 'tab-btn' + (btn.getAttribute('data-cat') === filter ? ' active' : '');
  });
}

function buildTabs() {
  var container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  CATEGORIES.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tab-btn' + (cat === filter ? ' active' : '');
    btn.textContent = cat;
    btn.setAttribute('data-cat', cat);
    btn.addEventListener('click', function() {
      filter = cat; currentIdx = 0; flipped = false; render();
    });
    container.appendChild(btn);
  });
}

document.getElementById('cardContainer').addEventListener('click', function() {
  flipped = !flipped; render();
});

document.getElementById('btnKnow').addEventListener('click', function() {
  var filtered = getFilteredItems();
  var item = filtered[currentIdx];
  if (item) { known[item.idx] = true; delete studying[item.idx]; }
  flipped = false;
  currentIdx = (currentIdx + 1) % filtered.length;
  render();
});

document.getElementById('btnStudy').addEventListener('click', function() {
  var filtered = getFilteredItems();
  var item = filtered[currentIdx];
  if (item) { studying[item.idx] = true; delete known[item.idx]; }
  flipped = false;
  currentIdx = (currentIdx + 1) % filtered.length;
  render();
});

function resetProgress() {
  known = {}; studying = {}; currentIdx = 0; flipped = false; render();
}

buildTabs();
render();
</script>
</body>
</html>
