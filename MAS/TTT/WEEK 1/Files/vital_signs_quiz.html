<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vital Signs Clinical Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-start: #0F2B3C;
    --bg-mid: #0D4F5C;
    --bg-end: #0E7490;
    --teal: #0E7490;
    --teal-dark: #0D4F5C;
    --teal-light: #e0f2f7;
    --mint: #B2F0E8;
    --green: #10B981;
    --green-dark: #059669;
    --green-bg: #D1FAE5;
    --green-text: #065F46;
    --red: #EF4444;
    --red-bg: #FEE2E2;
    --red-text: #991B1B;
    --amber: #F59E0B;
    --amber-dark: #D97706;
    --card-bg: #ffffff;
    --scenario-bg: #F0F7FA;
    --slate-900: #0F172A;
    --slate-800: #1E293B;
    --slate-700: #334155;
    --slate-500: #64748B;
    --slate-400: #94A3B8;
    --slate-200: #E2E8F0;
    --slate-100: #F1F5F9;
    --slate-50: #F8FAFC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Inter', sans-serif;
  }

  .quiz-wrapper { max-width: 640px; width: 100%; }

  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .progress-label {
    color: var(--mint);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #22A6B3, var(--mint));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .scenario-block {
    background: var(--scenario-bg);
    padding: 26px 30px;
    border-bottom: 1px solid #dce8ed;
  }
  .scenario-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .scenario-number {
    background: var(--teal);
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    flex-shrink: 0;
  }
  .scenario-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--teal);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    background: var(--teal-light);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .scenario-text {
    font-size: 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    color: var(--slate-800);
    line-height: 1.6;
  }

  .options-block {
    padding: 20px 30px 28px;
    background: var(--card-bg);
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 13px 16px;
    margin-bottom: 8px;
    background: #ffffff;
    border: 1.5px solid var(--slate-200);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--slate-800);
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;
  }
  .option-btn:last-of-type { margin-bottom: 0; }
  .option-btn:not([disabled]):hover {
    border-color: var(--teal);
    background: var(--teal-light);
    transform: translateX(3px);
  }
  .option-btn[disabled] { cursor: default; }

  .option-btn.correct-choice {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green-text);
    font-weight: 500;
  }
  .option-btn.correct-choice .option-letter {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .option-btn.wrong-choice {
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red-text);
  }
  .option-btn.wrong-choice .option-letter {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }
  .option-btn.dimmed {
    background: var(--slate-50);
    border-color: var(--slate-100);
    color: var(--slate-400);
  }
  .option-btn.dimmed .option-letter {
    background: var(--slate-100);
    color: var(--slate-400);
    border-color: var(--slate-100);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 6px;
    background: white;
    border: 1.5px solid var(--slate-200);
    color: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
  }
  .option-text {
    font-size: 14px;
    line-height: 1.5;
    font-family: 'Inter', sans-serif;
  }

  .explanation {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    border-left: 3px solid transparent;
    animation: fadeSlideIn 0.3s ease;
  }
  .explanation.correct-exp { background: #ECFDF5; border-left-color: var(--green); }
  .explanation.wrong-exp { background: #FFFBEB; border-left-color: var(--amber); }
  .explanation-label {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 5px;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .correct-exp .explanation-label { color: var(--green-dark); }
  .wrong-exp .explanation-label { color: var(--amber-dark); }
  .explanation p {
    font-size: 13.5px;
    color: var(--slate-700);
    line-height: 1.6;
    font-family: 'Inter', sans-serif;
  }

  .next-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: 0.2px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .next-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(14,116,144,0.45);
  }
  .next-btn:active { transform: translateY(0); }

  .results-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 44px 40px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: fadeIn 0.4s ease;
  }
  .results-emoji { font-size: 48px; margin-bottom: 10px; }
  .results-title {
    font-size: 26px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    color: var(--bg-start);
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .results-grade {
    color: var(--slate-500);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 24px;
  }
  .results-score-box {
    background: var(--scenario-bg);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .results-big-score {
    font-size: 52px;
    font-weight: 800;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--teal);
    line-height: 1;
    letter-spacing: -2px;
  }
  .results-pct {
    font-size: 13px;
    color: var(--slate-500);
    margin-top: 4px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .results-bar-track {
    margin-top: 16px;
    height: 6px;
    background: var(--slate-200);
    border-radius: 3px;
    overflow: hidden;
  }
  .results-bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 1s ease;
  }
  .results-bar-fill.pass { background: linear-gradient(90deg, var(--green), var(--green-dark)); }
  .results-bar-fill.fail { background: linear-gradient(90deg, var(--amber), var(--amber-dark)); }

  .results-review { text-align: left; margin-bottom: 24px; }
  .review-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--slate-100);
  }
  .review-icon {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    margin-top: 1px;
  }
  .review-icon.ok { background: var(--green-bg); color: var(--green-dark); }
  .review-icon.nope { background: var(--red-bg); color: #DC2626; }
  .review-text {
    font-size: 13px;
    color: var(--slate-700);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }
  .review-q {
    font-weight: 600;
    color: var(--slate-900);
    display: block;
    margin-bottom: 1px;
  }
  .review-verdict { color: var(--slate-400); font-size: 12px; }

  .restart-btn {
    display: inline-block;
    padding: 13px 36px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .restart-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(14,116,144,0.45);
  }

  .hidden { display: none !important; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="quiz-wrapper" id="quizScreen">
  <div class="progress-header">
    <span class="progress-label" id="qLabel">Question 1 of 10</span>
    <span class="progress-label" id="scoreLabel">Score: 0 / 10</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="card">
    <div class="scenario-block">
      <div class="scenario-badge">
        <div class="scenario-number" id="qNum">1</div>
        <span class="scenario-tag" id="qTag">Clinical Scenario</span>
      </div>
      <p class="scenario-text" id="scenarioText"></p>
    </div>
    <div class="options-block" id="optionsBlock"></div>
  </div>
</div>

<div id="resultsScreen" class="hidden" style="max-width:640px;width:100%;">
  <div class="results-card">
    <div class="results-emoji" id="resEmoji"></div>
    <h1 class="results-title">Quiz Complete!</h1>
    <p class="results-grade" id="resGrade"></p>
    <div class="results-score-box">
      <div class="results-big-score" id="resBigScore"></div>
      <div class="results-pct" id="resPct"></div>
      <div class="results-bar-track">
        <div class="results-bar-fill" id="resBar"></div>
      </div>
    </div>
    <div class="results-review" id="resReview"></div>
    <button class="restart-btn" onclick="restart()">Restart Quiz</button>
  </div>
</div>

<script>
const QUESTIONS = [
  { scenario: "A 45-year-old patient presents with a BP reading of 142/94 mmHg. How would you classify this?", tag: "Blood Pressure", options: ["Normal", "Elevated", "Stage 1 Hypertension", "Stage 2 Hypertension", "Hypertensive Crisis"], correct: 3, explanation: "Systolic &ge;140 OR diastolic &ge;90 qualifies as Stage 2 Hypertension. This patient has both values in range." },
  { scenario: "You're measuring an infant's pulse. Which site should you use as your PRIMARY assessment location?", tag: "Pulse Assessment", options: ["Radial artery", "Carotid artery", "Brachial artery", "Dorsalis pedis", "Femoral artery"], correct: 2, explanation: "The brachial artery (inside upper arm) is the primary pulse site for infants and young children. The radial pulse can be difficult to palpate in very small patients." },
  { scenario: "A patient's oral temperature reads 99.8°F. Their rectal temperature would most likely read approximately:", tag: "Temperature", options: ["98.8°F", "99.8°F", "100.8°F", "101.8°F"], correct: 2, explanation: "Rectal temperatures read approximately 1°F higher than oral. So 99.8°F oral &asymp; 100.8°F rectal." },
  { scenario: "You notice a patient's SpO₂ reads 88%. What is the appropriate next step?", tag: "Oxygen Saturation", options: ["Document and continue with the visit", "Recheck in 30 minutes", "Report to the provider immediately", "Remove nail polish and recheck"], correct: 2, explanation: "An SpO₂ below 90% is clinically significant and must be reported to the provider immediately. While nail polish can affect readings, 88% is too critical to delay &mdash; report first, troubleshoot second." },
  { scenario: "When performing orthostatic blood pressure measurements, a positive finding is defined as:", tag: "Orthostatic BP", options: ["BP drops &ge;10 mmHg systolic", "BP drops &ge;20 mmHg systolic AND/OR pulse rises &ge;10 bpm", "Pulse drops &ge;20 bpm upon standing", "BP rises &ge;15 mmHg upon standing"], correct: 1, explanation: "A positive orthostatic finding = systolic BP drops &ge;20 mmHg AND/OR pulse increases &ge;10 bpm when moving from lying to standing." },
  { scenario: "A mother brings in her 2-year-old toddler. The child's heart rate is 130 bpm. This is:", tag: "Pediatric Vitals", options: ["Bradycardic &mdash; dangerously low", "Below normal range", "Within normal range", "Tachycardic &mdash; dangerously high"], correct: 2, explanation: "Normal pulse for a toddler (1&ndash;2 years) is 98&ndash;140 bpm. A heart rate of 130 bpm falls well within the expected range." },
  { scenario: "You need to convert a patient's weight of 176 lbs to kilograms. The correct conversion is:", tag: "Unit Conversion", options: ["176 &times; 2.2 = 387.2 kg", "176 &divide; 2.2 = 80 kg", "176 &divide; 1.8 = 97.8 kg", "176 &times; 0.45 = 79.2 kg"], correct: 1, explanation: "To convert pounds to kilograms, divide by 2.2. So 176 &divide; 2.2 = 80 kg." },
  { scenario: "A patient tells you they have no complaints, but their face is grimacing and they're guarding their abdomen. You should:", tag: "Pain Assessment", options: ["Accept their verbal report &mdash; pain is subjective", "Document both the verbal denial and nonverbal cues, then report to the provider", "Assign a pain score of 0 since they denied pain", "Ignore the nonverbal cues &mdash; only the patient can rate their pain"], correct: 1, explanation: "While pain IS subjective, nonverbal cues are clinically significant. Document both the verbal denial AND the observed nonverbal indicators (grimacing, guarding) and report the discrepancy to the provider." },
  { scenario: "Before taking a blood pressure reading, you should ensure the patient has NOT done which of the following in the last 30 minutes?", tag: "BP Technique", options: ["Eaten a full meal", "Smoked or consumed caffeine", "Taken a shower", "Used their cell phone"], correct: 1, explanation: "Smoking and caffeine consumption within 30 minutes can elevate both blood pressure and heart rate, producing an inaccurate reading." },
  { scenario: "A patient's BMI is calculated at 27.3. This falls into which category?", tag: "BMI Classification", options: ["Underweight", "Normal / Healthy", "Overweight", "Obese"], correct: 2, explanation: "A BMI of 25.0&ndash;29.9 is classified as Overweight. 27.3 falls within this range." }
];

const LETTERS = ["A","B","C","D","E"];
let current = 0, score = 0, selected = null, revealed = false, answers = [];

function render() {
  var q = QUESTIONS[current];
  document.getElementById("qLabel").textContent = "Question " + (current+1) + " of " + QUESTIONS.length;
  document.getElementById("scoreLabel").textContent = "Score: " + score + " / " + QUESTIONS.length;
  document.getElementById("progressBar").style.width = ((current / QUESTIONS.length) * 100) + "%";
  document.getElementById("qNum").textContent = current + 1;
  document.getElementById("qTag").textContent = q.tag;
  document.getElementById("scenarioText").textContent = q.scenario;

  var block = document.getElementById("optionsBlock");
  block.innerHTML = "";

  for (var i = 0; i < q.options.length; i++) {
    (function(idx) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "option-btn";
      if (revealed) {
        btn.setAttribute("disabled", "disabled");
        if (idx === q.correct) btn.classList.add("correct-choice");
        else if (idx === selected && idx !== q.correct) btn.classList.add("wrong-choice");
        else btn.classList.add("dimmed");
      }
      var letter = document.createElement("span");
      letter.className = "option-letter";
      letter.textContent = LETTERS[idx];
      var text = document.createElement("span");
      text.className = "option-text";
      text.innerHTML = q.options[idx];
      btn.appendChild(letter);
      btn.appendChild(text);
      btn.addEventListener("click", function() { selectOption(idx); });
      block.appendChild(btn);
    })(i);
  }

  if (revealed) {
    var isCorrect = selected === q.correct;
    var exp = document.createElement("div");
    exp.className = "explanation " + (isCorrect ? "correct-exp" : "wrong-exp");
    var lbl = document.createElement("div");
    lbl.className = "explanation-label";
    lbl.textContent = isCorrect ? "✓ Correct!" : "✗ Not quite";
    var para = document.createElement("p");
    para.innerHTML = q.explanation;
    exp.appendChild(lbl);
    exp.appendChild(para);
    block.appendChild(exp);

    var nb = document.createElement("button");
    nb.type = "button";
    nb.className = "next-btn";
    nb.textContent = (current + 1 >= QUESTIONS.length) ? "See Results" : "Next Question →";
    nb.addEventListener("click", nextQuestion);
    block.appendChild(nb);
  }
}

function selectOption(i) {
  if (revealed) return;
  selected = i; revealed = true;
  if (i === QUESTIONS[current].correct) score++;
  answers.push({ picked: i, correct: QUESTIONS[current].correct, isCorrect: i === QUESTIONS[current].correct, scenario: QUESTIONS[current].scenario });
  render();
}

function nextQuestion() {
  if (current + 1 >= QUESTIONS.length) { showResults(); return; }
  current++; selected = null; revealed = false; render();
}

function showResults() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultsScreen").classList.remove("hidden");
  var pct = Math.round((score / QUESTIONS.length) * 100);
  var grade = pct >= 90 ? "Outstanding performance!" : pct >= 70 ? "Great work!" : pct >= 50 ? "Keep studying!" : "Review the material and try again.";
  document.getElementById("resEmoji").textContent = pct >= 70 ? "🎉" : "📚";
  document.getElementById("resGrade").textContent = grade;
  document.getElementById("resBigScore").textContent = score + " / " + QUESTIONS.length;
  document.getElementById("resPct").textContent = pct + "% correct";
  var bar = document.getElementById("resBar");
  bar.className = "results-bar-fill " + (pct >= 70 ? "pass" : "fail");
  setTimeout(function() { bar.style.width = pct + "%"; }, 80);
  var html = "";
  for (var i = 0; i < answers.length; i++) {
    var a = answers[i];
    var shortQ = a.scenario.length > 70 ? a.scenario.substring(0,70) + "…" : a.scenario;
    var verdict = a.isCorrect ? "Correct" : "You chose " + LETTERS[a.picked] + " — answer was " + LETTERS[a.correct];
    html += '<div class="review-row"><span class="review-icon '+(a.isCorrect?"ok":"nope")+'">'+(a.isCorrect?"✓":"✗")+'</span><span class="review-text"><span class="review-q">Q'+(i+1)+': '+shortQ+'</span><span class="review-verdict">'+verdict+'</span></span></div>';
  }
  document.getElementById("resReview").innerHTML = html;
}

function restart() {
  current = 0; score = 0; selected = null; revealed = false; answers = [];
  document.getElementById("resultsScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("resBar").style.width = "0%";
  render();
}

render();
</script>
</body>
</html>
