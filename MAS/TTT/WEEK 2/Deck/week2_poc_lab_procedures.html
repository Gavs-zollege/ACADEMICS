<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Assistant — POC Testing & Lab Procedures</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ff:"Libre Baskerville","Georgia",serif;
  --fs:"Source Sans 3","Segoe UI",sans-serif;
  --slideBg:#FFFFFF;--slideAlt:#F6F8FB;
  --dark:#0D2137;--darkSub:#1B3A57;
  --accent:#0F7B6C;--accentLight:#E6F5F2;
  --warm:#D94F4F;--warmLight:#FDF0F0;
  --amber:#D4880F;--amberLight:#FFF7E6;
  --blue:#2B6CB0;--blueLight:#EBF2FA;
  --purple:#6B46A8;
  --text:#1A202C;--textMid:#4A5568;--textLight:#8896A6;
  --border:#E2E8F0;--headerBg:#0D2137;
}
body{background:#E8ECF0;font-family:var(--fs);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px 24px}
button{cursor:pointer;font-family:var(--fs)}
.slide-wrap{width:100%;max-width:960px}
.sf{width:100%;aspect-ratio:16/9;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.08);overflow:hidden;position:relative;display:flex;flex-direction:column;animation:slideFade .35s ease-out}
.sf.dk{background:var(--headerBg)}.sf:not(.dk){background:var(--slideBg)}
.sh{background:var(--headerBg);padding:10px 28px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sh .n{font-size:9px;font-weight:700;color:var(--accent);background:rgba(15,123,108,.15);border-radius:3px;padding:2px 7px;letter-spacing:1px}
.sh .t{font-family:var(--ff);font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.sb{flex:1;padding:12px 28px 8px;overflow:hidden}
.sft{display:flex;justify-content:space-between;align-items:center;padding:0 28px 6px;flex-shrink:0}
.sft .l{font-size:8px;color:var(--textLight);letter-spacing:1px;text-transform:uppercase}
.sft .r{font-size:9px;font-weight:600;color:var(--textLight)}
.controls{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:960px;margin-top:14px}
.cb{font-size:12px;font-weight:600;color:#4A5568;background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:8px 18px;transition:all .2s}
.cb:hover:not(:disabled){filter:brightness(1.08)}.cb:disabled{opacity:.3;cursor:default}.cb.active{background:var(--dark);color:#fff}
.dots{display:flex;gap:3px;align-items:center}
.dot{height:5px;border-radius:3px;cursor:pointer;transition:all .3s}
.dot.cur{width:16px;background:var(--accent)}.dot.vis{width:5px;background:var(--darkSub)}.dot.fut{width:5px;background:rgba(0,0,0,.12)}
.toc-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.toc-p{background:#fff;border-radius:12px;padding:24px 20px;max-height:70vh;overflow-y:auto;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.toc-t{font-family:var(--ff);font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}
.toc-i{font-size:12px;padding:6px 10px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:all .15s}
.toc-i:hover{background:var(--slideAlt)}.toc-i.act{color:var(--accent);background:var(--accentLight);font-weight:700}
.toc-i .ix{color:var(--textLight);margin-right:8px;font-weight:600;font-size:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fr{display:flex;gap:16px}
.cd{background:var(--slideAlt);border-radius:6px;padding:10px 12px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:5px 8px;text-align:left;font-weight:700;font-size:8px;letter-spacing:.5px;text-transform:uppercase}
td{padding:5px 8px;font-size:10px;color:var(--text)}
.thd th{background:var(--headerBg);color:#fff}
tr.a{background:var(--slideAlt)}
.tb{display:flex;gap:0;margin-bottom:10px;border-bottom:2px solid var(--border)}
.tbtn{font-size:10px;font-weight:500;color:var(--textMid);background:none;border:none;border-bottom:3px solid transparent;padding:5px 10px;margin-bottom:-2px;transition:all .2s}
.tbtn.act{font-weight:700;color:var(--accent)}
.co{border-radius:6px;padding:8px 12px;border-left:3px solid}
.co-a{background:var(--accentLight);border-color:var(--accent)}
.co-w{background:var(--warmLight);border-color:var(--warm)}
.co-am{background:var(--amberLight);border-color:var(--amber)}
.tag{font-size:10px;font-weight:600;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:4px 12px;letter-spacing:.5px}
@keyframes slideFade{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
.hidden{display:none!important}
.obj-row{display:flex;gap:10px;align-items:flex-start;opacity:.25;cursor:pointer;transition:opacity .4s}.obj-row.shown{opacity:1}
.obj-c{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .3s}
.obj-c.on{background:var(--accent);color:#fff}.obj-c.off{background:var(--border);color:var(--textLight)}
.qo{font-size:11px;text-align:left;padding:9px 12px;border-radius:6px;border:2px solid var(--border);background:var(--slideAlt);color:var(--text);font-weight:400;transition:all .25s;width:100%;display:block;margin-bottom:4px}
.qo:hover:not(.ans){border-color:var(--accent)}.qo.cor{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}.qo.wrg{background:var(--warm);color:#fff;font-weight:700;border-color:var(--warm)}
.tw{display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--slideAlt);cursor:pointer;transition:all .25s}
.tw.chk{background:var(--accentLight);border-color:var(--accent)}
.tw .bx{min-width:16px;height:16px;border-radius:3px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px}
.tw.chk .bx{border-color:var(--accent)}.tw .lb{font-size:10px;color:var(--text);line-height:1.45}.tw.chk .lb{color:var(--accent);text-decoration:line-through}
.step-b{font-size:10px;text-align:left;border-radius:5px;padding:5px 9px;min-width:130px;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--textMid);font-weight:500}
.step-b.act{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
</style>
</head>
<body>
<div class="slide-wrap" id="W"></div>
<div class="controls">
  <button class="cb" id="pB" onclick="go(cur-1)">← Previous</button>
  <div style="display:flex;align-items:center;gap:14px">
    <button class="cb" id="tB" onclick="toggleTOC()">☰ Slides</button>
    <div class="dots" id="dots"></div>
  </div>
  <button class="cb" id="nB" onclick="go(cur+1)">Next →</button>
</div>
<div class="toc-ov hidden" id="tocO" onclick="closeTOC()">
  <div class="toc-p" onclick="event.stopPropagation()">
    <div class="toc-t">Slide Navigator</div><div id="tocL"></div>
  </div>
</div>
<script>
const S=[
{id:0,type:"title",title:"Point of Care Testing\n& Laboratory Procedures",subtitle:"MEDICAL ASSISTANT PROGRAM",week:"Week Two",tags:["Specimen Collection","CLIA Testing","Quality Assurance","Specialty Screenings"]},
{id:1,type:"objectives",title:"Learning Objectives",objectives:["Collect nonblood specimens — urine, stool, cultures, and sputum — using correct technique","Perform CLIA-waived point-of-care tests accurately and safely","Recognize, document, and report in-range and out-of-range lab values","Match and label every specimen to the correct patient and lab requisition","Process, handle, and transport collected specimens to maintain integrity","Perform vision and hearing screening tests","Assist with or perform allergy testing procedures","Perform spirometry and peak flow (pulmonary function) tests","Identify common testing errors that lead to inaccurate results"]},
{id:2,type:"clinical_lab",title:"The Clinical Laboratory",purposes:[{icon:"📊",label:"Document health status",desc:"Establish a baseline for the patient's normal values over time"},{icon:"🔍",label:"Screen for disease",desc:"Detect conditions early before symptoms appear"},{icon:"🩺",label:"Aid in diagnosis",desc:"Help confirm or rule out suspected conditions"},{icon:"💊",label:"Guide treatment decisions",desc:"Inform medication choices and dosing adjustments"},{icon:"📈",label:"Monitor disease progression",desc:"Track how a condition is responding to treatment"}],departments:[{name:"Urinalysis",desc:"Physical, chemical & microscopic urine exam",color:"#E8853D"},{name:"Hematology",desc:"RBC, WBC, platelet counts",color:"#D94F4F"},{name:"Chemistry",desc:"Glucose, lipids, electrolytes, CSF",color:"#4A90D9"},{name:"Microbiology",desc:"Bacteria, fungi, parasites, viruses",color:"#3DAE8E"},{name:"Cytology",desc:"Microscopic cell examination",color:"#8B6FC0"},{name:"Blood Bank",desc:"Blood products for transfusion",color:"#B8860B"}]},
{id:3,type:"requisitions",title:"Lab Requisitions & Specimen Labeling",reqFields:["Patient demographics (name, DOB, address, phone)","Insurance information","Provider signature or electronic authentication","Specific tests ordered (organized by department)","Specimen source and type","Date and time of collection","Diagnosis code (ICD) — establishes medical necessity"],labelRules:[{icon:"🏷️",title:"Label the container — not the lid",desc:"Lids can be swapped between containers, causing dangerous mix-ups."},{icon:"📋",title:"Required label information",desc:"Patient name, DOB, date/time of collection, and MA initials."},{icon:"✅",title:"Verify against the health record",desc:"Check labels against the patient's EHR and the lab order."},{icon:"⚠️",title:"Most common source of lab error",desc:"Incorrect or missing labeling causes more errors than any other factor."},{icon:"🔗",title:"Match specimen to requisition",desc:"Every specimen must be paired with the correct lab order."}]},
{id:4,type:"clia",title:"CLIA-Waived Testing",levels:[{name:"CLIA-Waived",color:"#3DAE8E",items:["Ambulatory care / provider office","Simplest category of testing","Could be performed safely at home","Minimal risk if performed incorrectly","MAs are trained for these tests"]},{name:"Moderate Complexity",color:"#E8853D",items:["Non-waived — hospital/reference lab","Requires a CLIA certificate","Regular lab inspections required","Performed by certified lab personnel","Provider microscopy is a special exception"]},{name:"High Complexity",color:"#D94F4F",items:["Non-waived — reference/research lab","Most stringent requirements","Highest training standards required","Regular CLIA inspections & proficiency testing","Examples: molecular testing, genetics"]}],note:"CLIA was established in 1988 to ensure quality and consistency in diagnostic testing across all healthcare settings."},
{id:5,type:"poc1",title:"Common Point-of-Care Tests — Part 1",tests:[{name:"Urine Pregnancy",specimen:"Urine",desc:"Detects hCG antibodies; first morning urine preferred",color:"#8B6FC0"},{name:"Rapid Strep",specimen:"Throat swab",desc:"Swab posterior throat/tonsils both sides; tests Group A antigen",color:"#D94F4F"},{name:"Dipstick Urinalysis",specimen:"Urine",desc:"Reagent strip tests multiple analytes excreted in urine",color:"#E8853D"},{name:"Hemoglobin",specimen:"Capillary blood",desc:"Screens oxygen-carrying protein in whole blood",color:"#3DAE8E"},{name:"Spun Hematocrit",specimen:"Capillary blood",desc:"Microcapillary tubes centrifuged to find % of RBCs",color:"#4A90D9"},{name:"Blood Glucose",specimen:"Capillary blood",desc:"Glucometer provides quantitative glucose level; screens for diabetes",color:"#B8860B"}]},
{id:6,type:"poc2",title:"Common Point-of-Care Tests — Part 2",tests:[{name:"Hemoglobin A1C",specimen:"Capillary blood",desc:"Avg blood glucose control over ~3 months",color:"#D94F4F"},{name:"Cholesterol Panel",specimen:"Capillary blood",desc:"Total cholesterol, LDL, HDL, and triglycerides",color:"#E8853D"},{name:"H. pylori Antibodies",specimen:"Whole blood",desc:"Screens for Helicobacter pylori antibodies",color:"#3DAE8E"},{name:"Mononucleosis",specimen:"Capillary blood",desc:"Tests for Epstein-Barr virus — the cause of mono",color:"#8B6FC0"},{name:"Influenza A & B",specimen:"Nasopharyngeal swab",desc:"Qualitative test for multiple influenza antigens",color:"#4A90D9"},{name:"Fecal Occult Blood",specimen:"Stool specimen",desc:"Detects hidden blood in stool — screens for GI bleeding",color:"#B8860B"},{name:"Drug Testing",specimen:"Urine or blood",desc:"Detects recreational drugs/medications; chain of custody required",color:"#7B5EA7"}]},
{id:7,type:"urine",title:"Urine Specimen Collection Methods",methods:[{name:"Random Specimen",icon:"🫙",items:["Collected at any time of day","Clean, non-sterile container","Used for general screening purposes"]},{name:"First Morning",icon:"🌅",items:["Most concentrated sample","Collected upon waking before fluids","Preferred for pregnancy/protein/nitrite testing"]},{name:"Clean-Catch Midstream",icon:"🧼",items:["Cleanse genitalia with 3 antiseptic wipes","Begin in toilet, catch mid-stream in sterile container","Used for cultures and non-contaminated samples"]},{name:"24-Hour Collection",icon:"⏰",items:["Discard first void; collect all urine for 24 hours","Large container with preservatives required","Used for quantitative analysis — protein, kidney function"]},{name:"Catheterized",icon:"🏥",items:["Sterile catheter inserted into bladder via urethra","Used when patient cannot void or sterile sample essential","Performed by provider/nurse; MA preps and assists"]}]},
{id:8,type:"stool",title:"Stool Specimens, Cultures & Chain of Custody",fobt:{title:"Fecal Occult Blood Test (FOBT)",desc:"Screens for hidden blood in stool — can indicate GI bleeding or disease.",avoid:["Red meats","Dyes","Aspirin/NSAIDs","Vitamin C","Iron supplements"],note:"These substances can produce false-positive results. Provide written patient instructions."},cultures:{title:"Collecting Specimens for Cultures",items:["Always use sterile containers — never touch inside of lids, swabs, or containers","Contamination prevents identifying the causative agent","Collect from the suspected site of infection","Treat all specimens as potentially infectious — standard precautions"]},chain:{title:"Chain of Custody",items:[{label:"What it is",desc:"A legal document tracking who handled the specimen from collection to results."},{label:"Who signs",desc:"Everyone who handles the specimen — including the patient/donor."},{label:"Consent form",desc:"Explains test purpose; grants permission to collect, transport, and release results."},{label:"Donor disclosure",desc:"List all medications, drugs, and alcohol consumed in the last 30 days."},{label:"Copies to",desc:"Medical review officer, laboratory, patient, collector, and employer."}]}},
{id:9,type:"processing",title:"Processing, Handling & Transporting Specimens",steps:[{num:1,title:"Use Proper Containers",desc:"Choose the correct container for the test. Some require special tubes, preservatives, or light protection."},{num:2,title:"Process Before Transport",desc:"Some need centrifuging. Swab specimens may require breaking the fluid chamber. Follow lab manual."},{num:3,title:"Time Matters",desc:"Test urine within 1 hour. If delayed, refrigerate to prevent bacterial growth."},{num:4,title:"Package Correctly",desc:"Clear zip-close bag with dual pockets — specimen in one, requisition in the other."},{num:5,title:"Biohazard Labeling",desc:"Any specimen transported by mail must have biohazard ID on the outside."},{num:6,title:"Proper Disposal",desc:"Red biohazard bags for non-breakable items. Sharps containers for breakables. Follow OSHA."}]},
{id:10,type:"lab_values",title:"Key Lab Values & Reference Ranges",values:[{test:"Hemoglobin",specimen:"Blood",range:"M: 14–18 g/dL\nF: 12–16 g/dL",note:"Carries O₂ in RBCs"},{test:"Hematocrit",specimen:"Blood",range:"M: 42–50%\nF: 37–47%",note:"% blood volume = RBCs"},{test:"WBC Count",specimen:"Blood (CBC)",range:"4,000–11,000/mm³",note:"↑ = infection/inflammation"},{test:"RBC Count",specimen:"Blood (CBC)",range:"4.2–5.9 million/µL",note:"↓ = possible anemia"},{test:"Platelets",specimen:"Blood (CBC)",range:"150K–450K/mm³",note:"↓ = bleeding risk"},{test:"Fasting Glucose",specimen:"Blood",range:"70–99 mg/dL",note:"Fasting req; diabetes screen"},{test:"HbA1C",specimen:"Blood",range:"4.0–5.6%",note:"Avg glucose ~3 months"},{test:"Total Cholesterol",specimen:"Blood",range:"< 200 mg/dL",note:"Lipid panel"},{test:"LDL",specimen:"Blood",range:"< 100 mg/dL",note:'"Bad" cholesterol'},{test:"HDL",specimen:"Blood",range:"M: >40 F: >50 mg/dL",note:'"Good" cholesterol'},{test:"Triglycerides",specimen:"Blood",range:"< 150 mg/dL",note:"Type of fat in blood"}]},
{id:11,type:"qa",title:"Quality Control & Three-Phase QA",phases:[{name:"Pre-Analytical",color:"#4A90D9",steps:["Provider orders test","Requisition completed","Specimen collected, labeled, processed","Transported to the lab"],errors:["Wrong test ordered","Patient misidentification","Wrong container","Improper labeling","Inadequate sample volume"]},{name:"Analytical",color:"#3DAE8E",steps:["Instruments maintained & calibrated","Controls run and analyzed","Specimen tested vs reference ranges","Results logged in health record"],errors:["Equipment malfunction","Sample mix-up","QC failure not caught","Procedures not followed"]},{name:"Post-Analytical",color:"#8B6FC0",steps:["Specimens properly disposed","Control results analyzed over time","Outside lab reports logged","Provider interprets & signs reports","Patient notified of results"],errors:["Failure to report results","Incorrect data entry","Excessive turnaround time"]}]},
{id:12,type:"vision",title:"Vision Screening Tests",tests:[{name:"Distance Vision — Snellen Chart",color:"#4A90D9",items:["Screens for myopia (nearsightedness)","Adults: 20 ft from chart; Children: 10 ft","Each eye tested individually, then together","Misses 2 items on a line → use previous line as result","Recorded as fraction: 20/20 = normal"]},{name:"Near Vision — Jaeger Chart",color:"#3DAE8E",items:["Screens for presbyopia or hyperopia (farsightedness)","Cards held 14–16 inches from face — no corrective lenses","Each eye tested individually, then together","Smallest print read clearly = final result"]},{name:"Color Vision — Ishihara Plates",color:"#8B6FC0",items:["Most common deficiency: red-green color blindness","11 color plates shown to patient","Missing ≥ 4 plates suggests deficiency","Further testing warranted if positive"]}]},
{id:13,type:"hearing",title:"Hearing Screening Tests",terms:[{term:"Decibels (dB)",def:"Sound amplitude (loudness). Normal adult: < 25 dB. Children: < 15 dB."},{term:"Hertz (Hz)",def:"Sound frequency (pitch). Audiometer tests a range of frequencies."}],tympanometry:{title:"Tympanometry",items:["Measures tympanic membrane (eardrum) movement","Small earbud changes air pressure in ear canal","Detects fluid or infection in middle ear","Normal = peak on graph; Abnormal = flat line"]},audiometry:{title:"Audiometry (Tone Testing)",items:[{label:"Who performs",desc:"MAs can conduct when patients can follow directions."},{label:"How it works",desc:"Patient wears headphones; tones played at various frequencies/volumes."},{label:"Patient response",desc:"Press button or raise hand when tone is heard."},{label:"Normal thresholds",desc:"Adults: < 25 dB. Children: < 15 dB."},{label:"Documentation",desc:"Hearing level in dB; frequency in Hz."}]}},
{id:14,type:"allergy_pulm",title:"Allergy Testing & Pulmonary Function",allergy:[{label:"Patient prep",desc:"Stop antihistamines 3 days prior — they block histamine response (false negatives)."},{label:"Scratch test",desc:"Diluted allergen on scratched skin. Wheal size = reaction severity."},{label:"Intradermal test",desc:"Allergen injected under skin. Inflamed, raised area = allergic response."},{label:"Reading results",desc:"Read ≥ 15 minutes after application. Larger wheals = stronger allergies."},{label:"MA role",desc:"Allergy offices: perform testing. Other settings: schedule referrals, educate patients."}],spirometry:[{label:"What it measures",desc:"How fast and how much air moves in/out of lungs."},{label:"Demographics used",desc:"Age, gender, weight, height calculate predicted values."},{label:"Patient instructions",desc:'"Deepest breath possible. Seal lips. Blow hard until lungs empty."'},{label:"Pre-test prep",desc:"No large meals 2 hr. No smoking 1 hr. No inhalers 6 hr before."},{label:"Acceptable maneuvers",desc:"Repeat until 3 acceptable attempts. Proper coaching is essential."}]},
{id:15,type:"pulm_values",title:"Pulmonary Function: Expected Values & Peak Flow",spirometry:[{abbr:"FEV1",name:"Forced Expiratory Volume in 1 sec",range:"80–120%"},{abbr:"FVC",name:"Forced Vital Capacity",range:"80–120%"},{abbr:"FEV1/FVC",name:"Ratio of FEV1 to FVC",range:"Within 5% of predicted"},{abbr:"TLC",name:"Total Lung Capacity",range:"80–120%"},{abbr:"FRC",name:"Functional Residual Capacity",range:"75–120%"},{abbr:"RV",name:"Residual Volume",range:"75–120%"}],peakFlow:{threshold:"≥ 80% of personal best = well-controlled",steps:["Used at home to monitor asthma or COPD","Measures forced expiratory volume","Loose clothing; marker at bottom of scale","Stand/sit upright — deep breath, seal lips, blow hard","Record where marker stops; repeat 2–3×; use highest"],uses:["Asthma monitoring","COPD management","Tracking bronchodilator response","Early warning signs of exacerbation"]}},
{id:16,type:"errors",title:"Preventing Common Testing Errors",errors:[{icon:"🏷️",title:"Mislabeled Specimens",desc:"Most common error. Label the container (not lid), include name, DOB, date/time, initials.",color:"#D94F4F"},{icon:"🧼",title:"Improper Clean-Catch Instructions",desc:"Poor education leads to bacterial contamination. Provide written instructions.",color:"#E8853D"},{icon:"🚫",title:"Patient Non-Compliance",desc:"Non-fasting patient → reschedule. Never process a specimen collected incorrectly.",color:"#8B6FC0"},{icon:"⏳",title:"Expired Reagents or Supplies",desc:"Always check expiration dates. Expired reagents produce invalid results.",color:"#B8860B"},{icon:"🌡️",title:"Temperature & Timing Violations",desc:"Test urine within 1 hour or refrigerate. Room temp allows bacterial growth.",color:"#4A90D9"},{icon:"🧫",title:"Contaminated Cultures",desc:"Touching inside of swabs/lids introduces organisms. True pathogen may go unidentified.",color:"#3DAE8E"}]},
{id:17,type:"takeaways",title:"Week Two — Key Takeaways",items:["Accurate specimen labeling is the single most important step — label the container, not the lid.","Lab requisitions must be complete; missing info can delay diagnosis and care.","CLIA-waived testing is ambulatory care standard — follow all QC steps and check expiration dates.","Urine is the most common specimen; know all collection methods and when each applies.","Chain of custody is legally required for all drug and alcohol specimen collections.","Know reference ranges for common labs — recognize and immediately report critical values.","Vision, hearing, and pulmonary testing are routine MA responsibilities — coaching affects accuracy.","Errors occur at any phase — pre-, analytical, or post-analytical. Prevention requires attention at every step."]},
{id:18,type:"quiz",title:"Knowledge Check",questions:[{q:"What is the most common source of lab error?",options:["Equipment malfunction","Mislabeled specimens","Expired reagents","Patient non-compliance"],correct:1,explanation:"Incorrect or missing labeling causes more lab errors than any other single factor."},{q:"CLIA-waived tests are performed in which setting?",options:["Hospital lab only","Reference lab","Ambulatory care / provider office","Research lab"],correct:2,explanation:"CLIA-waived tests are the simplest category, designed for ambulatory care and provider offices."},{q:"How soon must urine be tested after collection?",options:["30 minutes","1 hour","2 hours","4 hours"],correct:1,explanation:"Urine must be tested within 1 hour or refrigerated to prevent bacterial growth."},{q:"What should a patient avoid 3 days before FOBT?",options:["Dairy products","Red meats, aspirin, vitamin C","Caffeine and alcohol","All fruits and vegetables"],correct:1,explanation:"Red meats, dyes, aspirin/NSAIDs, vitamin C, and iron can produce false-positive FOBT results."},{q:"Normal fasting glucose range is:",options:["50–80 mg/dL","70–99 mg/dL","100–125 mg/dL","80–120 mg/dL"],correct:1,explanation:"Normal fasting glucose is 70–99 mg/dL. Higher values may indicate prediabetes or diabetes."},{q:"What does a flat line on tympanometry indicate?",options:["Normal hearing","Fluid or infection in middle ear","Sensorineural hearing loss","Equipment malfunction"],correct:1,explanation:"A flat line on tympanometry indicates fluid or infection in the middle ear. Normal is a peak."}]},
{id:19,type:"end",title:"End of Week Two",subtitle:"Point of Care Testing & Lab Procedures",message:"Precision at every step — from specimen collection to result reporting — protects your patients and defines your competence as a medical assistant."}
];

function e(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function go(n){if(n<0||n>=total)return;cur=n;render()}
function toggleTOC(){document.getElementById('tocO').classList.toggle('hidden');document.getElementById('tB').classList.toggle('active')}

document.addEventListener('keydown',ev=>{if(ev.key==='ArrowRight'||ev.key===' '){ev.preventDefault();go(cur+1)}if(ev.key==='ArrowLeft'){ev.preventDefault();go(cur-1)}if(ev.key==='Escape')closeTOC()});

function render(){
  document.getElementById('W').innerHTML=rS(S[cur]);
  document.getElementById('dots').innerHTML=S.map((_,i)=>`<div class="dot ${i===cur?'cur':i<cur?'vis':'fut'}" onclick="go(${i})"></div>`).join('');
  document.getElementById('pB').disabled=cur===0;document.getElementById('nB').disabled=cur===total-1;
  document.getElementById('tocL').innerHTML=S.map((s,i)=>`<div class="toc-i ${i===cur?'act':''}" onclick="go(${i});closeTOC()" style="color:${i===cur?'var(--accent)':'var(--textMid)'}"><span class="ix">${String(i+1).padStart(2,'0')}</span>${e(s.title)}</div>`).join('');
}
function H(i,t){return `<div class="sh"><div class="n">${String(i+1).padStart(2,'0')}</div><div class="t">${e(t)}</div></div>`}
function F(i){return `<div class="sft"><span class="l">Medical Assistant Program • Week 2</span><span class="r">${i+1} / ${total}</span></div>`}

function rS(s){const m={title:rTitle,objectives:rObj,clinical_lab:rClinLab,requisitions:rReq,clia:rClia,poc1:rPoc,poc2:rPoc,urine:rUrine,stool:rStool,processing:rProc,lab_values:rLab,qa:rQA,vision:rVision,hearing:rHearing,allergy_pulm:rAllerPulm,pulm_values:rPulmVal,errors:rErrors,takeaways:rTake,quiz:rQuiz,end:rEnd};return m[s.type]?m[s.type](s,s.id):''}

function rTitle(s){return `<div class="sf dk"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px;position:relative"><div style="position:absolute;top:24px;left:32px;display:flex;align-items:center;gap:6px"><div style="width:24px;height:2px;background:var(--accent);border-radius:2px"></div><span style="font-size:9px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase">${e(s.subtitle)}</span></div><div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">${e(s.week)}</div><h1 style="font-family:var(--ff);font-size:34px;font-weight:700;color:#fff;margin:0;line-height:1.25;white-space:pre-line">${e(s.title)}</h1><div style="display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center">${s.tags.map(t=>`<span class="tag">${e(t)}</span>`).join('')}</div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

function rObj(s,i){const sh=st.objShown;return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:flex;flex-direction:column;gap:4px">${s.objectives.map((o,j)=>`<div class="obj-row ${sh.has(j)?'shown':''}" onclick="for(let x=0;x<=${j};x++)st.objShown.add(x);render()"><div class="obj-c ${sh.has(j)?'on':'off'}">${j+1}</div><div style="font-size:11px;color:var(--text);line-height:1.45;padding-top:2px">${e(o)}</div></div>`).join('')}</div>${sh.size<s.objectives.length?'<p style="font-size:9px;color:var(--textLight);margin-top:6px;font-style:italic">Click each objective to reveal</p>':''}</div>${F(i)}</div>`}

function rClinLab(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">What Lab Tests Tell Us</div>${s.purposes.map(p=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px"><span style="font-size:14px">${p.icon}</span><div><div style="font-size:10px;font-weight:700;color:var(--text)">${e(p.label)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.4">${e(p.desc)}</div></div></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Laboratory Departments</div><div class="g2" style="gap:5px">${s.departments.map(d=>`<div class="cd" style="padding:7px 10px;border-left:3px solid ${d.color}"><div style="font-size:10px;font-weight:700;color:${d.color}">${e(d.name)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.3">${e(d.desc)}</div></div>`).join('')}</div></div></div></div>${F(i)}</div>`}

function rReq(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Required Requisition Fields</div>${s.reqFields.map((f,j)=>`<div style="font-size:10px;color:var(--text);line-height:1.6;padding-left:12px;position:relative"><span style="position:absolute;left:0;color:var(--accent);font-weight:700">${j+1}.</span>${e(f)}</div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--warm);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Specimen Labeling Rules</div>${s.labelRules.map(r=>`<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:4px"><span style="font-size:13px">${r.icon}</span><div><div style="font-size:10px;font-weight:700;color:var(--text)">${e(r.title)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.4">${e(r.desc)}</div></div></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rClia(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="g3" style="gap:10px;margin-bottom:8px">${s.levels.map(l=>`<div style="background:var(--slideAlt);border-radius:6px;padding:10px 12px;border-top:3px solid ${l.color}"><div style="font-size:11px;font-weight:700;color:${l.color};margin-bottom:6px">${e(l.name)}</div>${l.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${l.color}">›</span>${e(it)}</div>`).join('')}</div>`).join('')}</div><div class="co co-a" style="font-size:9px;color:var(--text)">${e(s.note)}</div></div>${F(i)}</div>`}

function rPoc(s,i){const cols=s.tests.length>6?4:3;return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px">${s.tests.map(t=>`<div class="cd" style="padding:8px 10px;border-left:3px solid ${t.color}"><div style="font-size:10px;font-weight:700;color:${t.color};margin-bottom:2px">${e(t.name)}</div><div style="font-size:8px;font-weight:600;color:var(--accent);margin-bottom:3px">${e(t.specimen)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.4">${e(t.desc)}</div></div>`).join('')}</div></div>${F(i)}</div>`}

function rUrine(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">${s.methods.map(m=>`<div class="cd" style="padding:8px 10px"><div style="font-size:16px;margin-bottom:3px">${m.icon}</div><div style="font-size:10px;font-weight:700;color:var(--text);margin-bottom:4px">${e(m.name)}</div>${m.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.4;padding-left:8px;position:relative"><span style="position:absolute;left:0;color:var(--accent)">›</span>${e(it)}</div>`).join('')}</div>`).join('')}</div></div>${F(i)}</div>`}

function rStool(s,i){const t=st.stoolTab;const tabs=[{name:"FOBT",key:0},{name:"Cultures",key:1},{name:"Chain of Custody",key:2}];
  let content='';
  if(t===0)content=`<div style="font-family:var(--ff);font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">${e(s.fobt.title)}</div><div style="font-size:10px;color:var(--textMid);margin-bottom:8px">${e(s.fobt.desc)}</div><div class="co co-w" style="margin-bottom:8px"><div style="font-size:9px;font-weight:700;color:var(--warm);margin-bottom:3px">AVOID FOR 3 DAYS PRIOR</div><div style="display:flex;gap:8px;flex-wrap:wrap">${s.fobt.avoid.map(a=>`<span style="font-size:9px;background:rgba(217,79,79,.1);border-radius:3px;padding:2px 8px;color:var(--warm);font-weight:600">${e(a)}</span>`).join('')}</div></div><div style="font-size:9px;color:var(--textMid);font-style:italic">${e(s.fobt.note)}</div>`;
  else if(t===1)content=`<div style="font-family:var(--ff);font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">${e(s.cultures.title)}</div>${s.cultures.items.map(it=>`<div style="font-size:10px;color:var(--textMid);line-height:1.7;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:var(--accent);font-weight:700">›</span>${e(it)}</div>`).join('')}`;
  else content=`<div style="font-family:var(--ff);font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">${e(s.chain.title)}</div>${s.chain.items.map(it=>`<div style="margin-bottom:4px"><span style="font-size:10px;font-weight:700;color:var(--purple)">${e(it.label)}: </span><span style="font-size:10px;color:var(--textMid)">${e(it.desc)}</span></div>`).join('')}`;
  return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="tb">${tabs.map((tb,j)=>`<button class="tbtn ${t===j?'act':''}" onclick="st.stoolTab=${j};render()" style="${t===j?'font-weight:700;color:var(--accent);border-bottom-color:var(--accent)':''}">${tb.name}</button>`).join('')}</div><div style="background:var(--slideAlt);border-radius:8px;padding:14px 18px;min-height:160px">${content}</div></div>${F(i)}</div>`}

function rProc(s,i){const p=st.procStep;const c=s.steps[p];return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr"><div style="display:flex;flex-direction:column;gap:3px">${s.steps.map((step,j)=>`<button class="step-b ${p===j?'act':''}" onclick="st.procStep=${j};render()"><span style="font-weight:700;margin-right:4px">${step.num}.</span>${e(step.title)}</button>`).join('')}</div><div style="flex:1;background:var(--accentLight);border-radius:8px;padding:18px 22px;border-left:3px solid var(--accent)"><div style="font-family:var(--ff);font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px">Step ${c.num}</div><div style="font-family:var(--ff);font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">${e(c.title)}</div><div style="font-size:11px;color:var(--textMid);line-height:1.7">${e(c.desc)}</div></div></div></div>${F(i)}</div>`}

function rLab(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><table><thead><tr class="thd"><th>Test</th><th>Specimen</th><th>Reference Range</th><th>Notes</th></tr></thead><tbody>${s.values.map((v,j)=>`<tr ${j%2?'class="a"':''}><td style="font-weight:700;color:var(--accent)">${e(v.test)}</td><td>${e(v.specimen)}</td><td style="font-weight:600;white-space:pre-line">${e(v.range)}</td><td style="color:var(--textMid);font-size:9px">${e(v.note)}</td></tr>`).join('')}</tbody></table></div>${F(i)}</div>`}

function rQA(s,i){const t=st.qaTab;const p=s.phases[t];return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="tb">${s.phases.map((ph,j)=>`<button class="tbtn ${t===j?'act':''}" onclick="st.qaTab=${j};render()" style="${t===j?'font-weight:700;color:'+ph.color+';border-bottom-color:'+ph.color:''}">${ph.name}</button>`).join('')}</div><div class="fr" style="gap:12px"><div style="flex:1;background:var(--accentLight);border-radius:6px;padding:10px 14px"><div style="font-size:9px;font-weight:700;color:var(--accent);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Key Steps</div>${p.steps.map((s,j)=>`<div style="font-size:10px;color:var(--text);line-height:1.6"><span style="font-weight:700;color:${p.color}">${j+1}.</span> ${e(s)}</div>`).join('')}</div><div style="flex:1;background:var(--warmLight);border-radius:6px;padding:10px 14px"><div style="font-size:9px;font-weight:700;color:var(--warm);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Common Errors</div>${p.errors.map(er=>`<div style="font-size:10px;color:var(--text);line-height:1.6;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:var(--warm);font-weight:700">×</span>${e(er)}</div>`).join('')}</div></div></div>${F(i)}</div>`}

function rVision(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:flex;gap:10px">${s.tests.map(t=>`<div style="flex:1;background:var(--slideAlt);border-radius:6px;padding:10px 12px;border-top:3px solid ${t.color}"><div style="font-size:10px;font-weight:700;color:${t.color};margin-bottom:6px">${e(t.name)}</div>${t.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${t.color}">›</span>${e(it)}</div>`).join('')}</div>`).join('')}</div></div>${F(i)}</div>`}

function rHearing(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:flex;gap:8px;margin-bottom:8px">${s.terms.map(t=>`<div style="flex:1;background:var(--blueLight);border-radius:6px;padding:8px 12px"><span style="font-size:10px;font-weight:700;color:var(--blue)">${e(t.term)}: </span><span style="font-size:9px;color:var(--textMid)">${e(t.def)}</span></div>`).join('')}</div><div class="fr" style="gap:10px"><div style="flex:1;background:var(--slideAlt);border-radius:6px;padding:10px 14px;border-left:3px solid var(--amber)"><div style="font-size:10px;font-weight:700;color:var(--amber);margin-bottom:6px">${e(s.tympanometry.title)}</div>${s.tympanometry.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:var(--amber)">›</span>${e(it)}</div>`).join('')}</div><div style="flex:1;background:var(--slideAlt);border-radius:6px;padding:10px 14px;border-left:3px solid var(--accent)"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px">${e(s.audiometry.title)}</div>${s.audiometry.items.map(it=>`<div style="margin-bottom:3px"><span style="font-size:9px;font-weight:700;color:var(--accent)">${e(it.label)}: </span><span style="font-size:9px;color:var(--textMid)">${e(it.desc)}</span></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rAllerPulm(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:12px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--warm);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Allergy Testing</div>${s.allergy.map(a=>`<div style="margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:var(--warm)">${e(a.label)}: </span><span style="font-size:9px;color:var(--textMid)">${e(a.desc)}</span></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Spirometry / Peak Flow</div>${s.spirometry.map(a=>`<div style="margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:var(--accent)">${e(a.label)}: </span><span style="font-size:9px;color:var(--textMid)">${e(a.desc)}</span></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rPulmVal(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:12px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Spirometry Reference Values</div><table><thead><tr class="thd"><th>Abbr</th><th>Full Name</th><th>Expected</th></tr></thead><tbody>${s.spirometry.map((v,j)=>`<tr ${j%2?'class="a"':''}><td style="font-weight:700;color:var(--blue)">${e(v.abbr)}</td><td>${e(v.name)}</td><td style="font-weight:600">${e(v.range)}</td></tr>`).join('')}</tbody></table></div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Peak Flow Meter</div><div class="co co-a" style="margin-bottom:6px;font-size:10px;font-weight:700;color:var(--accent)">${e(s.peakFlow.threshold)}</div>${s.peakFlow.steps.map(st=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:var(--accent)">›</span>${e(st)}</div>`).join('')}<div style="font-size:9px;font-weight:700;color:var(--purple);margin-top:6px;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px">When Used</div><div style="display:flex;gap:4px;flex-wrap:wrap">${s.peakFlow.uses.map(u=>`<span style="font-size:8px;background:rgba(107,70,168,.1);border-radius:3px;padding:2px 8px;color:var(--purple);font-weight:600">${e(u)}</span>`).join('')}</div></div></div></div>${F(i)}</div>`}

function rErrors(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="g3" style="gap:8px">${s.errors.map(er=>`<div class="cd" style="border-left:3px solid ${er.color}"><div style="font-size:16px;margin-bottom:3px">${er.icon}</div><div style="font-size:10px;font-weight:700;color:var(--text);margin-bottom:2px">${e(er.title)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.4">${e(er.desc)}</div></div>`).join('')}</div></div>${F(i)}</div>`}

function rTake(s,i){const ch=st.takeaways;const dn=Object.values(ch).filter(Boolean).length;return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:8px">${dn}/${s.items.length} reviewed — check off each takeaway</div><div class="g2" style="gap:5px">${s.items.map((it,j)=>`<div class="tw ${ch[j]?'chk':''}" onclick="st.takeaways[${j}]=!st.takeaways[${j}];render()"><div class="bx">${ch[j]?'✓':''}</div><div class="lb">${e(it)}</div></div>`).join('')}</div></div>${F(i)}</div>`}

function rQuiz(s,i){const{qi,qs,qa:ans,qsc,qd}=st;if(qd){const pct=Math.round((qsc/s.questions.length)*100);return `<div class="sf">${H(i,'Quiz Results')}<div class="sb" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-family:var(--ff);font-size:60px;font-weight:700;color:${pct>=80?'var(--accent)':'var(--amber)'}">${pct}%</div><div style="font-size:16px;font-weight:600;color:var(--text)">${qsc}/${s.questions.length} Correct</div><div style="font-size:12px;color:var(--textMid);margin-top:6px">${pct>=80?"Excellent! You've mastered this material.":'Review the slides and try again.'}</div><button onclick="st.qi=0;st.qs=null;st.qa=false;st.qsc=0;st.qd=false;render()" style="font-size:12px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:6px;padding:10px 24px;cursor:pointer;margin-top:18px">Retake Quiz</button></div>${F(i)}</div>`}
const q=s.questions[qi];return `<div class="sf">${H(i,`Knowledge Check — Q${qi+1}/${s.questions.length}`)}<div class="sb"><div class="fr"><div style="flex:1"><div style="font-family:var(--ff);font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:12px">${e(q.q)}</div><div style="display:flex;flex-direction:column;gap:4px">${q.options.map((opt,j)=>{const r=ans&&j===q.correct;const w=ans&&j===qs&&j!==q.correct;let c='qo'+(ans?' ans':'')+(r?' cor':'')+(w?' wrg':'');return `<button class="${c}" onclick="pQ(${j})">${String.fromCharCode(65+j)}.  ${e(opt)}</button>`}).join('')}</div></div><div style="flex:1;display:flex;flex-direction:column;justify-content:center">${ans?`<div style="background:${qs===q.correct?'var(--accentLight)':'var(--warmLight)'};border-radius:8px;padding:16px 14px;border-left:3px solid ${qs===q.correct?'var(--accent)':'var(--warm)'}"><div style="font-size:11px;font-weight:700;color:${qs===q.correct?'var(--accent)':'var(--warm)'};margin-bottom:5px">${qs===q.correct?'✓ Correct!':'✗ Incorrect'}</div><div style="font-size:10px;color:var(--textMid);line-height:1.6">${e(q.explanation)}</div><button onclick="nQ()" style="font-size:10px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:5px;padding:7px 16px;cursor:pointer;margin-top:8px">${qi<s.questions.length-1?'Next Question →':'See Results →'}</button></div>`:`<div style="text-align:center;color:var(--textLight)"><div style="font-size:11px;font-style:italic">Select an answer to continue</div></div>`}</div></div></div>${F(i)}</div>`}

function pQ(j){if(st.qa)return;st.qs=j;st.qa=true;if(j===S[18].questions[st.qi].correct)st.qsc++;render()}
function nQ(){if(st.qi<S[18].questions.length-1){st.qi++;st.qs=null;st.qa=false}else st.qd=true;render()}

function rEnd(s){return `<div class="sf dk"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px"><div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">${e(s.title)}</div><h1 style="font-family:var(--ff);font-size:30px;font-weight:700;color:#fff;margin:0 0 16px">${e(s.subtitle)}</h1><p style="font-size:12px;color:rgba(255,255,255,0.6);max-width:480px;line-height:1.6">${e(s.message)}</p><div style="display:flex;gap:16px;margin-top:24px;font-size:11px;color:rgba(255,255,255,0.4)"><span>Questions?</span><span>•</span><span>Review</span><span>•</span><span>Practice</span></div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

render();
</script>
