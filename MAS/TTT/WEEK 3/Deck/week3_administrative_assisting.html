<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ff:"Libre Baskerville","Georgia",serif;--fs:"Source Sans 3","Segoe UI",sans-serif;--slideBg:#FFFFFF;--slideAlt:#F6F8FB;--dark:#0D2137;--darkSub:#1B3A57;--accent:#0F7B6C;--accentLight:#E6F5F2;--warm:#D94F4F;--warmLight:#FDF0F0;--amber:#D4880F;--amberLight:#FFF7E6;--blue:#2B6CB0;--blueLight:#EBF2FA;--purple:#6B46A8;--text:#1A202C;--textMid:#4A5568;--textLight:#8896A6;--border:#E2E8F0;--headerBg:#0D2137}
body{background:#E8ECF0;font-family:var(--fs);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px 24px}
button{cursor:pointer;font-family:var(--fs)}
.sw{width:100%;max-width:960px}
.sf{width:100%;aspect-ratio:16/9;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.08);overflow:hidden;position:relative;display:flex;flex-direction:column;animation:sF .35s ease-out}
.sf.dk{background:var(--headerBg)}.sf:not(.dk){background:var(--slideBg)}

.sb{flex:1;padding:12px 28px 8px;overflow:hidden}
.ft{display:flex;justify-content:space-between;align-items:center;padding:0 28px 6px;flex-shrink:0}

.ft .r{font-size:9px;font-weight:600;color:var(--textLight)}
.ctrls{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:960px;margin-top:14px}
.cb{font-size:12px;font-weight:600;color:#4A5568;background:rgba(0,0,0,.05);border:none;border-radius:8px;padding:8px 18px;transition:all .2s}

.to{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.tp{background:#fff;border-radius:12px;padding:24px 20px;max-height:70vh;overflow-y:auto;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.tt{font-family:var(--ff);font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px}
.ti{font-size:12px;padding:6px 10px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:all .15s}
.ti:hover{background:var(--slideAlt)}.ti.a{color:var(--accent);background:var(--accentLight);font-weight:700}
.ti .x{color:var(--textLight);margin-right:8px;font-weight:600;font-size:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.fr{display:flex;gap:16px}.cd{background:var(--slideAlt);border-radius:6px;padding:10px 12px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:5px 8px;text-align:left;font-weight:700;font-size:8px;letter-spacing:.5px;text-transform:uppercase}
td{padding:5px 8px;font-size:10px;color:var(--text)}
.thd th{background:var(--headerBg);color:#fff}tr.al{background:var(--slideAlt)}
.tb{display:flex;gap:0;margin-bottom:10px;border-bottom:2px solid var(--border)}
.tbtn{font-size:10px;font-weight:500;color:var(--textMid);background:none;border:none;border-bottom:3px solid transparent;padding:5px 10px;margin-bottom:-2px;transition:all .2s}
.tbtn.a{font-weight:700;color:var(--accent)}
.co{border-radius:6px;padding:8px 12px;border-left:3px solid}.co-a{background:var(--accentLight);border-color:var(--accent)}.co-w{background:var(--warmLight);border-color:var(--warm)}.co-am{background:var(--amberLight);border-color:var(--amber)}.co-b{background:var(--blueLight);border-color:var(--blue)}
.tag{font-size:10px;font-weight:600;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:4px 12px;letter-spacing:.5px}
@keyframes sF{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
.hidden{display:none!important}
.or{display:flex;gap:10px;align-items:flex-start;opacity:.25;cursor:pointer;transition:opacity .4s}.or.s{opacity:1}
.oc{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .3s}.oc.on{background:var(--accent);color:#fff}.oc.off{background:var(--border);color:var(--textLight)}
.qo{font-size:11px;text-align:left;padding:9px 12px;border-radius:6px;border:2px solid var(--border);background:var(--slideAlt);color:var(--text);font-weight:400;transition:all .25s;width:100%;display:block;margin-bottom:4px}
.qo:hover:not(.d){border-color:var(--accent)}.qo.cr{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}.qo.wr{background:var(--warm);color:#fff;font-weight:700;border-color:var(--warm)}
.tw{display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--slideAlt);cursor:pointer;transition:all .25s}
.tw.ck{background:var(--accentLight);border-color:var(--accent)}
.tw .bx{min-width:16px;height:16px;border-radius:3px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px}
.tw.ck .bx{border-color:var(--accent)}.tw .lb{font-size:10px;color:var(--text);line-height:1.45}.tw.ck .lb{color:var(--accent);text-decoration:line-through}
.sb-s{font-size:10px;text-align:left;border-radius:5px;padding:5px 9px;min-width:130px;transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--textMid);font-weight:500}
.sb-s.a{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
</style>

<script>
const S=[
{id:0,type:"title",title:"Administrative\nAssisting",subtitle:"MEDICAL ASSISTANT PROGRAM",week:"Week Three",tags:["Scheduling","Billing & Coding","Records","Revenue Cycle","Patient Communication"]},
{id:1,type:"objectives",title:"Learning Objectives",objectives:["Schedule and monitor patient appointments using electronic and paper-based systems","Determine the type and duration of appointment based on patient needs","Prioritize appointment requests based on urgency; distinguish emergencies from urgent visits","Verify insurance coverage and confirm patient financial eligibility","Check patients in and out; confirm identity and collect required documentation","Confirm accurate diagnostic (ICD-10-CM) and procedural (CPT/HCPCS) codes","Obtain prior authorizations and precertifications for procedures and prescriptions","Prepare documentation and billing requests following current coding guidelines","Perform charge reconciliation — post charges, payments, and adjustments","Resolve billing denials and submit appeals to third-party payers","Manage medical records (electronic and paper); process mail and faxes","Facilitate referrals, patient portal access, and telehealth visits"]},
{id:2,type:"pms_ehr",title:"Practice Management Systems & EHR",systems:[{name:"Practice Management System (PMS)",color:"#4A90D9",items:["Administrative side of the EHR","Handles scheduling, demographics, and billing","Processes insurance claims and payments","Tracks revenue cycle from start to finish"]},{name:"Electronic Medical Record (EMR)",color:"#3DAE8E",items:["Digital health record within one organization","Replaces the paper chart","Only accessible within the specific practice","Documents visits, orders, and patient history"]},{name:"Electronic Health Record (EHR)",color:"#0F7B6C",items:["Accessible to authorized providers regardless of location","Integrated with lab, imaging, and referral systems","Supports real-time results viewing","Improves care coordination and continuity"]},{name:"Paper Medical Records",color:"#8896A6",items:["Filed alphabetically — most recent on top","Only one user can access at a time","No real-time data sharing","Most practices have transitioned away"]}]},
{id:3,type:"scheduling",title:"Scheduling Methods & Visit Types",methods:[{name:"Specific Time",desc:"Each patient assigned their own individual slot — the most familiar approach."},{name:"Wave Scheduling",desc:"Multiple patients booked at top of hour, seen in arrival order — built-in flexibility."},{name:"Double-Booking",desc:"Two patients share same slot — useful when one has labs/tests running independently."},{name:"Cluster Scheduling",desc:"Similar needs grouped together — e.g., all new patients on Tuesdays."}],visits:[{type:"New Patient",time:"60 min"},{type:"Established / Follow-up / Sick",time:"15 min"},{type:"Comprehensive Visit",time:"45–60 min"},{type:"Preventive / Annual Wellness",time:"45–60 min"},{type:"Urgent Visit",time:"20 min"},{type:"Other (meetings, reps)",time:"30 min"}]},
{id:4,type:"priority",title:"Prioritizing Appointments & Patient Check-In",levels:[{name:"EMERGENCY",color:"#D94F4F",desc:"Life-threatening — direct to 911 or ER immediately. Stay on the line."},{name:"URGENT",color:"#E8853D",desc:"Needs to be seen within 24 hours. Fit into schedule ASAP."},{name:"SOON",color:"#E8C840",desc:"Non-urgent but timely — schedule within a few days."},{name:"ROUTINE",color:"#3DAE8E",desc:"Wellness exams, follow-ups, preventive care — next available slot."}],note:"The MA cannot diagnose or recommend treatments. Use screening protocols and decision trees.",checkSteps:[{num:"1",title:"Verify identity",desc:"Photo ID must match name and DOB on insurance card and health record."},{num:"2",title:"Confirm demographics",desc:"Ask if name, address, phone, or insurance has changed."},{num:"3",title:"Scan ID & insurance card",desc:"Some practices also photograph the patient."},{num:"4",title:"Verify eligibility & collect copay",desc:"Collect financial responsibility before the visit."},{num:"5",title:"Review required paperwork",desc:"New: NPP, Bill of Rights, Assignment of Benefits. Check-out: AVS, follow-ups, balance."}]},
{id:5,type:"insurance",title:"Insurance Verification & Patient Financial Responsibility",steps:[{num:"1",desc:"Verify when scheduling — confirm policy is active and covers the service."},{num:"2",desc:"Verify again on date of service — coverage can change."},{num:"3",desc:"Confirm the specific procedure or visit type is covered."},{num:"4",desc:"Determine copay, coinsurance, or deductible owed."},{num:"5",desc:"Complete preauthorization if required before appointment."}],terms:[{term:"Premium",def:"Monthly payment to maintain coverage."},{term:"Copayment",def:"Fixed amount paid at each visit."},{term:"Deductible",def:"Out-of-pocket amount before insurance kicks in."},{term:"Coinsurance",def:"Patient's share after deductible (e.g., 20%)."},{term:"Preauthorization",def:"Prior approval confirming medical necessity."},{term:"Precertification",def:"Verifies benefit exists; doesn't guarantee payment."},{term:"Eligibility",def:"Confirms insurance is active and benefits in effect."},{term:"Sliding Scale",def:"Fee schedule adjusted based on patient income."}]},
{id:6,type:"auth_ref",title:"Authorizations, Precertifications & Referrals",preauth:[{label:"When required",desc:"Specialist visits, elective surgery, hospitalizations, expensive imaging, therapies, some Rx."},{label:"What's included",desc:"Provider info, patient demographics, insurance, ICD-10 & CPT codes, clinical documentation."},{label:"How submitted",desc:"EHR, payer portal, or phone. Electronic is typically faster."},{label:"What approval means",desc:"Service is covered and medically necessary. Authorization number issued — document it."}],referrals:[{label:"What triggers it",desc:"Patient needs services outside PCP's scope — specialist, advanced procedures, second opinions."},{label:"How submitted",desc:"Phone, EHR, payer portal, or formal written request. Check payer-specific requirements."},{label:"HIPAA & referrals",desc:"Falls under TPO — separate signed release not typically required unless policy states otherwise."},{label:"Electronic referrals",desc:"Must use secure, encrypted platform. Documentation of necessity attached; copy in patient record."},{label:"MA role",desc:"Explain process, help schedule specialty appointment, follow up to confirm."}]},
{id:7,type:"codes",title:"Diagnostic & Procedural Codes",codes:[{name:"ICD-10-CM",subtitle:"Diagnosis Codes",color:"#4A90D9",items:["3–7 alphanumeric characters; begins with a letter","Answers: Why did the patient come in?","Describes condition, location, severity, cause","Must link to procedure to support medical necessity"]},{name:"CPT®",subtitle:"Procedure Codes",color:"#3DAE8E",items:["5-digit numeric codes; may have 2-digit modifier","Answers: What did the provider do?","Covers office visits, labs, surgeries, screenings","AMA trademark — updated annually"]},{name:"HCPCS",subtitle:"Supplies, Equipment & Other",color:"#8B6FC0",items:["Alphanumeric codes for items not covered by CPT","Covers DME, supplies, ambulance transport","Required for Medicare and Medicaid billing","Includes modifiers for additional detail"]}],rule:"Diagnosis code + Procedure code must together demonstrate medical necessity. A strep test needs a 'sore throat' diagnosis — not a routine wellness code."},
{id:8,type:"documentation",title:"Documentation, Superbill & Chart Review",docs:[{name:"Superbill / Encounter Form",icon:"📋",color:"#4A90D9",items:["Records diagnosis and procedures from current visit","Includes commonly used ICD-10 and CPT codes","Used to generate the claim for billing","Can be electronic or paper; customized to specialty"]},{name:"Patient Flow Sheet",icon:"📊",color:"#3DAE8E",items:["Tracks ongoing health data over time (vitals, labs)","Supports chronic disease management","Part of clinical section of the EHR","Used by providers and staff at each visit"]},{name:"Progress Notes (SOAP)",icon:"📝",color:"#E8853D",items:["Subjective, Objective, Assessment, and Plan","Documents the full provider encounter","Legal record — never delete; use addendum","Date, time, and name required on all entries"]},{name:"After-Visit Summary (AVS)",icon:"📄",color:"#8B6FC0",items:["Provided to patient at check-out","Summarizes visit, diagnoses, medications, follow-up","Ensures patients leave with clear next steps","Reviewed with patient before departure"]}]},
{id:9,type:"revenue",title:"The Revenue Cycle",steps:[{num:1,title:"Registration & Eligibility",desc:"Collect demographics, verify insurance, confirm financial responsibility.",color:"#4A90D9"},{num:2,title:"Clinical Encounter & Documentation",desc:"Provider sees patient, documents encounter, assigns diagnosis and procedure codes.",color:"#3DAE8E"},{num:3,title:"Charge Capture & Coding",desc:"Charges entered. Codes confirmed for accuracy, completeness, and medical necessity.",color:"#0F7B6C"},{num:4,title:"Claim Submission",desc:"Clean claims submitted electronically to payer or clearinghouse. Timely filing required.",color:"#E8853D"},{num:5,title:"Adjudication & Payment Posting",desc:"Payer processes claim, issues EOB. Payments and adjustments posted to account.",color:"#8B6FC0"},{num:6,title:"Follow-Up & Collections",desc:"Denied/underpaid claims reviewed and appealed. Patient balances billed promptly.",color:"#D94F4F"}]},
{id:10,type:"billing",title:"Billing, Claims & Resolving Denials",fundamentals:[{term:"Clearinghouse",desc:"Scrubs claims for errors before submitting to payers."},{term:"Timely filing",desc:"Claims must be submitted within payer-specified days from date of service."},{term:"Charge reconciliation",desc:"Ensures all services are billed; payments/adjustments/write-offs posted accurately."},{term:"ABN",desc:"Required for Medicare when service may not be covered. Must be signed before service."},{term:"Cycle billing",desc:"Large practices bill in alphabetical segments throughout the month."}],denials:[{denial:"Service not covered",fix:"Verify correct codes; confirm medical necessity documented; resubmit."},{denial:"Wrong diagnosis/procedure code",fix:"Audit documentation, correct codes, resubmit with supporting records."},{denial:"Patient eligibility issue",fix:"Attach proof of eligibility verification and resubmit."},{denial:"No medical necessity",fix:"Submit appeal with clinical documentation supporting the need."},{denial:"Missing preauthorization",fix:"Verify auth number obtained; request retroactive auth if applicable."}]},
{id:11,type:"records",title:"Medical Records Management",sections:[{name:"Administrative Section",color:"#4A90D9",items:["Patient demographics and insurance","Notice of Privacy Practices (NPP)","Advance directives and consent forms","Medical release authorization forms","Billing and appointment records"]},{name:"Clinical Section",color:"#3DAE8E",items:["Health history, physical exams, allergies","Medications list and problem list","Progress notes and lab results","Diagnostic reports (ECG, imaging, spirometry)","Continuity of care: consults, hospital records"]}],rules:[{title:"Paper corrections",desc:"Single line through error, correction above, date/time/initials. Never erase."},{title:"Electronic corrections",desc:"EHR logs who made changes and when. Use addendum feature."},{title:"Filing system",desc:"Paper filed alphabetically by last name. Most recent on top."},{title:"Storage & retention",desc:"Active: on-site. Archived: secure off-site. Retention varies by state."},{title:"Record security",desc:"Only authorized staff. HIPAA compliance at all times."}]},
{id:12,type:"communication",title:"Patient Communication & Portals",calls:[{label:"Common reasons",desc:"Confirmations, lab/imaging results, post-procedure follow-up, returning messages."},{label:"Before you dial",desc:"Open patient record, have all info ready, double-check phone number."},{label:"Identify yourself",desc:"State your name and practice name. Confirm it's a good time to talk."},{label:"Releasing results",desc:"Only to patient or authorized individual. Provider must review and sign off first."},{label:"Voicemail",desc:"Patient name, your name, practice name (if safe), callback number, hours. Never leave clinical details."}],portal:["Patients access notes, results, immunizations, and billing","Messaging, appointment scheduling, and Rx requests","MA activates access and provides login guidance","Sometimes called the 'digital front door' of the practice"],telehealth:["Conducted via secure video platform","Minimizes travel barriers and increases flexibility","MA verifies patient has device, internet, required info","Assist with app downloads, portal login, camera/mic setup","Not all services eligible — confirm with the payer"]},
{id:13,type:"inventory",title:"Inventory Management & Safety Evaluations",inventory:[{label:"Par level",desc:"Minimum quantity before reorder is triggered. Set by team based on daily usage."},{label:"Ordering",desc:"Review log, identify items at/below par level, order electronically. Match delivery to order."},{label:"Stocking rules",desc:"Remove from boxes before storing. Rotate stock — new to back. Proper body mechanics."},{label:"Refrigerated items",desc:"Check deliveries promptly. Vaccines must be refrigerated immediately."},{label:"Documentation",desc:"Record item, vendor, cost, reorder frequency. Audit routinely per policy."}],safety:[{label:"OSHA oversight",desc:"Federal agency enforcing workplace safety standards. All staff must know policies."},{label:"Equipment inspection",desc:"Admin and clinical equipment require routine preventive maintenance. Log all inspections."},{label:"Calibration",desc:"Clinical instruments need scheduled calibration for accuracy. Know the schedule."},{label:"Reporting concerns",desc:"All staff responsible for identifying and reporting hazards."},{label:"Emergency preparedness",desc:"Know evacuation plan, emergency equipment locations, and protocols."}]},
{id:14,type:"auditing",title:"Auditing, Compliance & Government Requirements",audits:[{name:"Prospective (Internal)",color:"#4A90D9",desc:"Before claims are billed. Catches coding/documentation errors, prevents denials."},{name:"Retrospective (Internal)",color:"#3DAE8E",desc:"After billing. Statistical review and quality improvement."},{name:"Retrospective (External)",color:"#E8853D",desc:"By third-party payer targeting specific codes. May require repayment."},{name:"Concurrent Review",color:"#8B6FC0",desc:"During inpatient stay. Ensures documentation completeness and appropriate care level."}],govt:[{label:"CMS guidelines",desc:"Documentation requirements, common errors, and corrective actions."},{label:"MACRA & value-based care",desc:"Shifts reimbursement toward quality metrics. Accurate documentation required."},{label:"Interoperability",desc:"Standards for secure health record sharing across systems."},{label:"Common doc errors",desc:"Incomplete notes, missing signatures, insufficient medical necessity, wrong E/M level."},{label:"MA documentation scope",desc:"Communication, vitals, chief complaint, HPI, preauth requests — varies by state/policy."}]},
{id:15,type:"takeaways",title:"Week Three — Key Takeaways",items:["Choosing the right appointment type and duration is essential — always ask the reason before scheduling.","Insurance eligibility must be verified at scheduling AND again on date of service.","Diagnosis codes explain why; procedure codes explain what. Both must link for medical necessity.","Complete, accurate documentation is the foundation of reimbursement — and a legal record of care.","The revenue cycle touches every step. Every team member's accuracy impacts the practice's finances.","When a claim is denied, investigate and correct it — don't just write it off. Most denials are resolvable.","Patient communication must always protect PHI. Only release info to authorized individuals after provider review.","Safety evaluations, supply management, and equipment checks keep the practice running safely."]},
{id:16,type:"quiz",title:"Knowledge Check",questions:[{q:"When must insurance eligibility be verified?",options:["Only at the first visit","At scheduling only","At scheduling AND on the date of service","Only when the patient requests it"],correct:2,explanation:"Coverage can change — always verify at scheduling AND again on the day of the appointment."},{q:"What does a CPT code describe?",options:["Why the patient came in","What the provider did","The patient's insurance plan","The medical necessity"],correct:1,explanation:"CPT codes describe what the provider did — the procedure or service performed."},{q:"What is the purpose of a clearinghouse?",options:["Store medical records","Scrub claims for errors before submitting to payers","Schedule patient appointments","Verify patient identity"],correct:1,explanation:"A clearinghouse acts as a go-between that checks claims for errors before they reach the payer."},{q:"Which document is provided to the patient at check-out?",options:["Superbill","SOAP note","After-Visit Summary (AVS)","Lab requisition"],correct:2,explanation:"The AVS summarizes the visit, diagnoses, medications, and follow-up needs for the patient."},{q:"What should you NEVER do when correcting a paper medical record?",options:["Draw a single line through the error","Add date and initials","Use correction fluid or erase","Write the correction above"],correct:2,explanation:"Never erase or use correction fluid — medical records are legal documents."},{q:"An ABN (Advance Beneficiary Notice) is required for which patients?",options:["All patients","Medicaid patients only","Medicare patients when service may not be covered","Uninsured patients"],correct:2,explanation:"An ABN must be signed by Medicare patients before a service that may not be covered."}]},
{id:17,type:"end",title:"End of Week Three",subtitle:"Administrative Assisting",message:"Administrative excellence is clinical excellence — every schedule, code, and claim you touch directly impacts patient care and practice sustainability."}
];

const total=S.length;let cur=0;let st={};

rs();
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function go(n){if(n<0||n>=total)return;cur=n;render()}
function toggleTOC(){document.getElementById('tocO').classList.toggle('hidden');document.getElementById('tB').classList.toggle('act')}
function closeTOC(){document.getElementById('tocO').classList.add('hidden');document.getElementById('tB').classList.remove('act')}
document.addEventListener('keydown',ev=>{if(ev.key==='ArrowRight'||ev.key===' '){ev.preventDefault();go(cur+1)}if(ev.key==='ArrowLeft'){ev.preventDefault();go(cur-1)}if(ev.key==='Escape')closeTOC()});

function render(){
  document.getElementById('W').innerHTML=rSlide(S[cur]);
  document.getElementById('dots').innerHTML=S.map((_,i)=>`<div class="dot ${i===cur?'c':i<cur?'v':'f'}" onclick="go(${i})"></div>`).join('');
  document.getElementById('pB').disabled=cur===0;document.getElementById('nB').disabled=cur===total-1;
  document.getElementById('tocL').innerHTML=S.map((s,i)=>`<div class="ti ${i===cur?'a':''}" onclick="go(${i});closeTOC()" style="color:${i===cur?'var(--accent)':'var(--textMid)'}"><span class="x">${String(i+1).padStart(2,'0')}</span>${esc(s.title)}</div>`).join('');
}
function H(i,t){return `<div class="sh"><div class="n">${String(i+1).padStart(2,'0')}</div><div class="t">${esc(t)}</div></div>`}
function F(i){return `<div class="ft"><span class="l">Medical Assistant Program • Week 3</span><span class="r">${i+1} / ${total}</span></div>`}

function rSlide(s){const m={title:rTitle,objectives:rObj,pms_ehr:rPMS,scheduling:rSched,priority:rPriority,insurance:rIns,auth_ref:rAuth,codes:rCodes,documentation:rDocs,revenue:rRev,billing:rBilling,records:rRecords,communication:rComm,inventory:rInv,auditing:rAudit,takeaways:rTake,quiz:rQuiz,end:rEnd};return m[s.type]?m[s.type](s,s.id):''}

function rTitle(s){return `<div class="sf dk"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px;position:relative"><div style="position:absolute;top:24px;left:32px;display:flex;align-items:center;gap:6px"><div style="width:24px;height:2px;background:var(--accent);border-radius:2px"></div><span style="font-size:9px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase">${esc(s.subtitle)}</span></div><div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">${esc(s.week)}</div><h1 style="font-family:var(--ff);font-size:36px;font-weight:700;color:#fff;margin:0;line-height:1.25;white-space:pre-line">${esc(s.title)}</h1><div style="display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center">${s.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

function rObj(s,i){const sh=st.objShown;return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="display:flex;flex-direction:column;gap:3px">${s.objectives.map((o,j)=>`<div class="or ${sh.has(j)?'s':''}" onclick="for(let x=0;x<=${j};x++)st.objShown.add(x);render()"><div class="oc ${sh.has(j)?'on':'off'}">${j+1}</div><div style="font-size:10px;color:var(--text);line-height:1.4;padding-top:2px">${esc(o)}</div></div>`).join('')}</div>${sh.size<s.objectives.length?'<p style="font-size:9px;color:var(--textLight);margin-top:4px;font-style:italic">Click each objective to reveal</p>':''}</div>${F(i)}</div>`}

function rPMS(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="g2" style="gap:10px">${s.systems.map(sys=>`<div class="cd" style="padding:10px 12px;border-top:3px solid ${sys.color}"><div style="font-size:11px;font-weight:700;color:${sys.color};margin-bottom:4px">${esc(sys.name)}</div>${sys.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${sys.color}">›</span>${esc(it)}</div>`).join('')}</div>`).join('')}</div></div>${F(i)}</div>`}

function rSched(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:14px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Scheduling Methods</div>${s.methods.map(m=>`<div style="margin-bottom:5px"><div style="font-size:10px;font-weight:700;color:var(--text)">${esc(m.name)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.4">${esc(m.desc)}</div></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Appointment Types & Time</div><table><thead><tr class="thd"><th>Type</th><th>Duration</th></tr></thead><tbody>${s.visits.map((v,j)=>`<tr ${j%2?'class="al"':''}><td style="font-weight:600">${esc(v.type)}</td><td style="font-weight:700;color:var(--blue)">${esc(v.time)}</td></tr>`).join('')}</tbody></table></div></div></div>${F(i)}</div>`}

function rPriority(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:14px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--warm);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Prioritizing Requests</div>${s.levels.map(l=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:#fff;background:${l.color};border-radius:3px;padding:2px 6px;min-width:60px;text-align:center">${esc(l.name)}</span><div style="font-size:9px;color:var(--textMid);line-height:1.4;flex:1">${esc(l.desc)}</div></div>`).join('')}<div style="font-size:8px;color:var(--textLight);font-style:italic;margin-top:6px">${esc(s.note)}</div></div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Check-In & Check-Out</div>${s.checkSteps.map(c=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center">${c.num}</span><div><div style="font-size:10px;font-weight:700;color:var(--text)">${esc(c.title)}</div><div style="font-size:9px;color:var(--textMid);line-height:1.3">${esc(c.desc)}</div></div></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rIns(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:14px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Verification Process</div>${s.steps.map(st=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center">${st.num}</span><div style="font-size:10px;color:var(--textMid);line-height:1.5">${esc(st.desc)}</div></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Key Insurance Terms</div><div style="display:flex;flex-direction:column;gap:2px">${s.terms.map(t=>`<div style="font-size:9px;line-height:1.4"><span style="font-weight:700;color:var(--blue)">${esc(t.term)}: </span><span style="color:var(--textMid)">${esc(t.def)}</span></div>`).join('')}</div></div></div></div>${F(i)}</div>`}

function rAuth(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:14px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--amber);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Preauthorization</div>${s.preauth.map(p=>`<div style="margin-bottom:3px"><span style="font-size:9px;font-weight:700;color:var(--amber)">${esc(p.label)}: </span><span style="font-size:9px;color:var(--textMid)">${esc(p.desc)}</span></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Referrals to Specialty Care</div>${s.referrals.map(r=>`<div style="margin-bottom:3px"><span style="font-size:9px;font-weight:700;color:var(--accent)">${esc(r.label)}: </span><span style="font-size:9px;color:var(--textMid)">${esc(r.desc)}</span></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rCodes(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="g3" style="gap:10px;margin-bottom:8px">${s.codes.map(c=>`<div class="cd" style="padding:10px 12px;border-top:3px solid ${c.color}"><div style="font-size:11px;font-weight:700;color:${c.color}">${esc(c.name)}</div><div style="font-size:8px;color:var(--textLight);margin-bottom:5px">${esc(c.subtitle)}</div>${c.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${c.color}">›</span>${esc(it)}</div>`).join('')}</div>`).join('')}</div><div class="co co-am" style="font-size:9px;color:var(--text);font-weight:600">${esc(s.rule)}</div></div>${F(i)}</div>`}

function rDocs(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="g2" style="gap:8px">${s.docs.map(d=>`<div class="cd" style="padding:8px 10px;border-left:3px solid ${d.color}"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:14px">${d.icon}</span><span style="font-size:10px;font-weight:700;color:${d.color}">${esc(d.name)}</span></div>${d.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.4;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${d.color}">›</span>${esc(it)}</div>`).join('')}</div>`).join('')}</div></div>${F(i)}</div>`}

function rRev(s,i){const p=st.revStep;const c=s.steps[p];return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr"><div style="display:flex;flex-direction:column;gap:3px">${s.steps.map((step,j)=>`<button class="sb-s ${p===j?'a':''}" onclick="st.revStep=${j};render()"><span style="font-weight:700;margin-right:4px">${step.num}.</span>${esc(step.title)}</button>`).join('')}</div><div style="flex:1;background:var(--accentLight);border-radius:8px;padding:18px 22px;border-left:3px solid ${c.color}"><div style="font-family:var(--ff);font-size:16px;font-weight:700;color:${c.color};margin-bottom:4px">Step ${c.num}</div><div style="font-family:var(--ff);font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">${esc(c.title)}</div><div style="font-size:11px;color:var(--textMid);line-height:1.7">${esc(c.desc)}</div></div></div></div>${F(i)}</div>`}

function rBilling(s,i){const t=st.billingTab;const tabs=['Fundamentals','Denials & Fixes'];
  let content='';
  if(t===0)content=s.fundamentals.map(f=>`<div style="margin-bottom:5px"><span style="font-size:10px;font-weight:700;color:var(--accent)">${esc(f.term)}: </span><span style="font-size:10px;color:var(--textMid)">${esc(f.desc)}</span></div>`).join('');
  else content=s.denials.map(d=>`<div style="display:flex;gap:10px;margin-bottom:5px;align-items:flex-start"><div style="flex:1"><span style="font-size:9px;font-weight:700;color:var(--warm)">Denial: </span><span style="font-size:9px;color:var(--text)">${esc(d.denial)}</span></div><div style="flex:1"><span style="font-size:9px;font-weight:700;color:var(--accent)">Fix: </span><span style="font-size:9px;color:var(--textMid)">${esc(d.fix)}</span></div></div>`).join('');
  return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="tb">${tabs.map((tb,j)=>`<button class="tbtn ${t===j?'a':''}" onclick="st.billingTab=${j};render()" style="${t===j?'font-weight:700;color:var(--accent);border-bottom-color:var(--accent)':''}">${tb}</button>`).join('')}</div><div style="background:var(--slideAlt);border-radius:8px;padding:14px 18px;min-height:160px">${content}</div></div>${F(i)}</div>`}

function rRecords(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:12px;margin-bottom:8px">${s.sections.map(sec=>`<div style="flex:1;background:var(--slideAlt);border-radius:6px;padding:10px 12px;border-top:3px solid ${sec.color}"><div style="font-size:10px;font-weight:700;color:${sec.color};margin-bottom:5px">${esc(sec.name)}</div>${sec.items.map(it=>`<div style="font-size:9px;color:var(--textMid);line-height:1.5;padding-left:10px;position:relative"><span style="position:absolute;left:0;color:${sec.color}">›</span>${esc(it)}</div>`).join('')}</div>`).join('')}</div><div style="font-size:9px;font-weight:700;color:var(--amber);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Rules & Best Practices</div><div class="g3" style="gap:5px">${s.rules.map(r=>`<div style="font-size:9px"><span style="font-weight:700;color:var(--text)">${esc(r.title)}: </span><span style="color:var(--textMid)">${esc(r.desc)}</span></div>`).join('')}</div></div>${F(i)}</div>`}

function rComm(s,i){const t=st.commTab;const tabs=['Outgoing Calls','Patient Portal','Telehealth'];
  let content='';
  if(t===0)content=s.calls.map(c=>`<div style="margin-bottom:4px"><span style="font-size:10px;font-weight:700;color:var(--accent)">${esc(c.label)}: </span><span style="font-size:9px;color:var(--textMid)">${esc(c.desc)}</span></div>`).join('');
  else if(t===1)content=s.portal.map(p=>`<div style="font-size:10px;color:var(--textMid);line-height:1.7;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:var(--accent);font-weight:700">›</span>${esc(p)}</div>`).join('');
  else content=s.telehealth.map(t=>`<div style="font-size:10px;color:var(--textMid);line-height:1.7;padding-left:14px;position:relative"><span style="position:absolute;left:0;color:var(--purple);font-weight:700">›</span>${esc(t)}</div>`).join('');
  return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="tb">${tabs.map((tb,j)=>`<button class="tbtn ${t===j?'a':''}" onclick="st.commTab=${j};render()" style="${t===j?'font-weight:700;color:var(--accent);border-bottom-color:var(--accent)':''}">${tb}</button>`).join('')}</div><div style="background:var(--slideAlt);border-radius:8px;padding:14px 18px;min-height:160px">${content}</div></div>${F(i)}</div>`}

function rInv(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div class="fr" style="gap:14px"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Maintaining Inventory</div>${s.inventory.map(v=>`<div style="margin-bottom:3px"><span style="font-size:9px;font-weight:700;color:var(--accent)">${esc(v.label)}: </span><span style="font-size:9px;color:var(--textMid)">${esc(v.desc)}</span></div>`).join('')}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:var(--warm);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Safety & Compliance</div>${s.safety.map(v=>`<div style="margin-bottom:3px"><span style="font-size:9px;font-weight:700;color:var(--warm)">${esc(v.label)}: </span><span style="font-size:9px;color:var(--textMid)">${esc(v.desc)}</span></div>`).join('')}</div></div></div>${F(i)}</div>`}

function rAudit(s,i){return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Types of Audits</div><div class="g4" style="margin-bottom:8px">${s.audits.map(a=>`<div class="cd" style="padding:8px 10px;border-top:3px solid ${a.color}"><div style="font-size:9px;font-weight:700;color:${a.color};margin-bottom:3px">${esc(a.name)}</div><div style="font-size:8px;color:var(--textMid);line-height:1.4">${esc(a.desc)}</div></div>`).join('')}</div><div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Government Regulations & CMS</div><div class="g3" style="gap:5px">${s.govt.map(g=>`<div style="font-size:9px"><span style="font-weight:700;color:var(--accent)">${esc(g.label)}: </span><span style="color:var(--textMid)">${esc(g.desc)}</span></div>`).join('')}</div></div>${F(i)}</div>`}

function rTake(s,i){const ch=st.takeaways;const dn=Object.values(ch).filter(Boolean).length;return `<div class="sf">${H(i,s.title)}<div class="sb"><div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:8px">${dn}/${s.items.length} reviewed — check off each takeaway</div><div class="g2" style="gap:5px">${s.items.map((it,j)=>`<div class="tw ${ch[j]?'ck':''}" onclick="st.takeaways[${j}]=!st.takeaways[${j}];render()"><div class="bx">${ch[j]?'✓':''}</div><div class="lb">${esc(it)}</div></div>`).join('')}</div></div>${F(i)}</div>`}

function rQuiz(s,i){const{qi,qs,qa:ans,qsc,qd}=st;if(qd){const pct=Math.round((qsc/s.questions.length)*100);return `<div class="sf">${H(i,'Quiz Results')}<div class="sb" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-family:var(--ff);font-size:60px;font-weight:700;color:${pct>=80?'var(--accent)':'var(--amber)'}">${pct}%</div><div style="font-size:16px;font-weight:600;color:var(--text)">${qsc}/${s.questions.length} Correct</div><div style="font-size:12px;color:var(--textMid);margin-top:6px">${pct>=80?"Excellent! You've mastered this material.":'Review the slides and try again.'}</div><button onclick="st.qi=0;st.qs=null;st.qa=false;st.qsc=0;st.qd=false;render()" style="font-size:12px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:6px;padding:10px 24px;cursor:pointer;margin-top:18px">Retake Quiz</button></div>${F(i)}</div>`}
const q=s.questions[qi];return `<div class="sf">${H(i,`Knowledge Check — Q${qi+1}/${s.questions.length}`)}<div class="sb"><div class="fr"><div style="flex:1"><div style="font-family:var(--ff);font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:12px">${esc(q.q)}</div><div style="display:flex;flex-direction:column;gap:4px">${q.options.map((opt,j)=>{const r=ans&&j===q.correct;const w=ans&&j===qs&&j!==q.correct;return `<button class="qo${ans?' d':''}${r?' cr':''}${w?' wr':''}" onclick="pQ(${j})">${String.fromCharCode(65+j)}.  ${esc(opt)}</button>`}).join('')}</div></div><div style="flex:1;display:flex;flex-direction:column;justify-content:center">${ans?`<div style="background:${qs===q.correct?'var(--accentLight)':'var(--warmLight)'};border-radius:8px;padding:16px 14px;border-left:3px solid ${qs===q.correct?'var(--accent)':'var(--warm)'}"><div style="font-size:11px;font-weight:700;color:${qs===q.correct?'var(--accent)':'var(--warm)'};margin-bottom:5px">${qs===q.correct?'✓ Correct!':'✗ Incorrect'}</div><div style="font-size:10px;color:var(--textMid);line-height:1.6">${esc(q.explanation)}</div><button onclick="nQ()" style="font-size:10px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:5px;padding:7px 16px;cursor:pointer;margin-top:8px">${qi<s.questions.length-1?'Next Question →':'See Results →'}</button></div>`:`<div style="text-align:center;color:var(--textLight)"><div style="font-size:11px;font-style:italic">Select an answer to continue</div></div>`}</div></div></div>${F(i)}</div>`}

function pQ(j){if(st.qa)return;st.qs=j;st.qa=true;if(j===S[16].questions[st.qi].correct)st.qsc++;render()}
function nQ(){if(st.qi<S[16].questions.length-1){st.qi++;st.qs=null;st.qa=false}else st.qd=true;render()}

function rEnd(s){return `<div class="sf dk"><div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px 50px"><div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">${esc(s.title)}</div><h1 style="font-family:var(--ff);font-size:30px;font-weight:700;color:#fff;margin:0 0 16px">${esc(s.subtitle)}</h1><p style="font-size:12px;color:rgba(255,255,255,0.6);max-width:480px;line-height:1.6">${esc(s.message)}</p><div style="display:flex;gap:16px;margin-top:24px;font-size:11px;color:rgba(255,255,255,0.4)"><span>Questions?</span><span>•</span><span>Review</span><span>•</span><span>Practice</span></div><div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue),var(--purple))"></div></div></div>`}

render();
</script>
</body>
</html>
