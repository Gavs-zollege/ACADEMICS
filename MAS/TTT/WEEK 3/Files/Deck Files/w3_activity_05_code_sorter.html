<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Type Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(160deg,#0a0f20,#101830,#080e1a);font-family:'Outfit',sans-serif;padding:24px 16px;color:#e4ecff}
.wrap{max-width:720px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.icon{font-size:44px}
h1{font-weight:800;font-size:30px;margin:8px 0 4px}
.sub{color:#7888b8;font-weight:600;font-size:15px}
.score{color:#fb923c;font-weight:700;font-size:14px;margin-top:8px}
.prompt{background:linear-gradient(135deg,rgba(129,140,248,.12),rgba(251,146,60,.12));padding:22px 28px;border-radius:18px;text-align:center;margin-bottom:20px;border:2px solid rgba(129,140,248,.22)}
.prompt .label{color:#7888b8;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.prompt .item{color:#e4ecff;font-size:20px;font-weight:700}
.prompt .rem{color:#7888b8;font-size:13px;margin-top:8px}
.fb{text-align:center;padding:12px;margin-bottom:14px;border-radius:12px;font-weight:700;font-size:17px}
.fb.ok{background:rgba(74,222,128,.13);color:#4ade80}
.fb.no{background:rgba(251,113,133,.13);color:#fb7185}
.buckets{display:flex;gap:12px;flex-wrap:wrap}
.bucket{flex:1 1 180px;min-width:160px;background:#121e38;border-radius:18px;padding:18px;cursor:pointer;transition:all .2s;min-height:140px}
.bucket:hover{filter:brightness(1.12)}
.bucket h3{font-weight:700;font-size:15px;text-align:center;margin-bottom:4px}
.bucket .hint{color:#7888b8;font-size:11px;text-align:center;margin-bottom:12px;font-weight:500}
.bucket .placed{padding:7px 11px;border-radius:10px;margin-bottom:5px;font-size:12px;font-weight:600}
.b0{border:2px solid rgba(129,140,248,.25)}.b0 h3{color:#818cf8}.b0 .placed{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.12)}
.b1{border:2px solid rgba(251,146,60,.25)}.b1 h3{color:#fb923c}.b1 .placed{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.12)}
.b2{border:2px solid rgba(52,211,153,.25)}.b2 h3{color:#34d399}.b2 .placed{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.12)}
.done{text-align:center;background:#121e38;border-radius:24px;padding:40px;border:2px solid rgba(74,222,128,.25)}
.done .big{font-size:56px}
.done h2{font-weight:800;font-size:28px;margin:12px 0 8px}
.done .tip{color:#7888b8;font-weight:500;font-size:15px;margin-bottom:20px}
.btn{padding:14px 36px;border:none;border-radius:14px;background:#818cf8;color:#0a0f20;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><div class="icon">🔢</div><h1>Code Type Sorter</h1><p class="sub">Sort each description into ICD-10-CM, CPT, or HCPCS</p><p class="score" id="scoreDisplay">Score: 0 / 12</p></div>
  <div id="game"><div class="prompt" id="promptBox"></div><div class="fb" id="feedback" style="display:none"></div><div class="buckets" id="bucketsRow"></div></div>
  <div id="doneBox" class="done" style="display:none"></div>
</div>
<script>
const BNAMES=["ICD-10-CM","CPT®","HCPCS"];
const BICONS=["🏥","🩺","📦"];
const BHINTS=["WHY — Diagnosis","WHAT — Procedure","Supplies & Equipment"];
const ALL=[
  {text:"3–7 alphanumeric characters, always starts with a letter",b:0},
  {text:"Answers: Why did the patient come in?",b:0},
  {text:"Describes condition, location, severity, and cause",b:0},
  {text:"Must link to the procedure code to support medical necessity",b:0},
  {text:"5-digit numeric code, may have a 2-digit modifier",b:1},
  {text:"Answers: What did the provider do?",b:1},
  {text:"Covers office visits, lab tests, and surgical procedures",b:1},
  {text:"Registered trademark of the AMA, updated annually",b:1},
  {text:"Alphanumeric codes for items not covered by CPT",b:2},
  {text:"Covers durable medical equipment and ambulance transport",b:2},
  {text:"Required for Medicare and Medicaid billing",b:2},
  {text:"Includes modifiers for additional billing detail",b:2},
];
let remaining,bContents,score;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function init(){remaining=shuffle(ALL);bContents=BNAMES.map(()=>[]);score=0;document.getElementById('game').style.display='block';document.getElementById('doneBox').style.display='none';render()}
function render(){document.getElementById('scoreDisplay').textContent='Score: '+score+' / '+ALL.length;const pb=document.getElementById('promptBox');if(remaining.length>0){pb.style.display='block';pb.innerHTML='<div class="label">Which code system?</div><div class="item">'+remaining[0].text+'</div><div class="rem">'+remaining.length+' remaining</div>'}else pb.style.display='none';const br=document.getElementById('bucketsRow');br.innerHTML='';BNAMES.forEach((name,i)=>{const d=document.createElement('div');d.className='bucket b'+i;d.onclick=()=>drop(i);let h='<h3>'+BICONS[i]+' '+name+'</h3><div class="hint">'+BHINTS[i]+'</div>';bContents[i].forEach(t=>{h+='<div class="placed">✅ '+t+'</div>'});d.innerHTML=h;br.appendChild(d)})}
function drop(bi){if(remaining.length===0)return;const cur=remaining[0];const ok=cur.b===bi;if(ok){bContents[bi].push(cur.text);score++}const fb=document.getElementById('feedback');fb.style.display='block';fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✅ Correct!':'❌ That belongs in '+BNAMES[cur.b];remaining=remaining.slice(1);render();if(remaining.length===0)setTimeout(showDone,900);setTimeout(()=>{fb.style.display='none'},900)}
function showDone(){document.getElementById('game').style.display='none';const d=document.getElementById('doneBox');d.style.display='block';d.innerHTML='<div class="big">'+(score>=10?'🏆':'💪')+'</div><h2>'+score+'/'+ALL.length+' Correct!</h2><p class="tip">Diagnosis + Procedure codes must link together to demonstrate medical necessity.</p><button class="btn" onclick="init()">🔄 Play Again</button>'}
init();
</script>
</body>
</html>
