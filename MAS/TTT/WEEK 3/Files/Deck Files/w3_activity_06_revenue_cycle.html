<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Cycle Steps</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(155deg,#0a1a0f,#102818,#08150a);font-family:'Sora',sans-serif;padding:24px 16px;color:#e0f5e8}
.wrap{max-width:640px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.icon{font-size:44px}
h1{font-weight:800;font-size:30px;margin:8px 0 4px}
.sub{color:#6aaa80;font-weight:600;font-size:15px}
.badge{display:inline-block;margin-top:12px;background:#102818;padding:6px 20px;border-radius:20px;border:1px solid rgba(251,191,36,.2);color:#fbbf24;font-weight:800;font-size:15px}
.fb{text-align:center;padding:12px 18px;margin-bottom:14px;border-radius:14px}
.fb.ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
.fb.no{background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.2)}
.fb strong{font-weight:800;font-size:17px}
.fb strong.ok{color:#4ade80}
.fb strong.no{color:#fb7185}
.fb .tip{color:#6aaa80;font-weight:600;font-size:13px;margin-top:6px}
.section-label{font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.section-label.done-l{color:#4ade80}
.section-label.pick{color:#fbbf24}
.placed-item{display:flex;align-items:center;gap:14px;padding:12px 18px;background:rgba(74,222,128,.06);border-radius:12px;margin-bottom:6px;border:1px solid rgba(74,222,128,.13)}
.placed-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,.13);color:#4ade80;font-weight:800;font-size:18px;flex-shrink:0}
.placed-text{font-weight:700;font-size:15px}
.pool{display:grid;gap:8px}
.pool-item{padding:15px 20px;border-radius:14px;background:#1a3820;border:2px solid rgba(251,191,36,.12);font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
.pool-item:hover{filter:brightness(1.15);border-color:rgba(251,191,36,.3)}
.done-box{text-align:center;background:#102818;border-radius:24px;padding:40px;border:2px solid rgba(74,222,128,.25)}
.done-box .big{font-size:56px}
.done-box h2{font-weight:800;font-size:28px;margin:12px 0 8px}
.done-box p{color:#6aaa80;font-weight:600;font-size:15px;margin-bottom:24px}
.btn{padding:14px 36px;border:none;border-radius:14px;background:#fbbf24;color:#0a1a0f;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><div class="icon">💰</div><h1>Revenue Cycle Steps</h1><p class="sub">Put the revenue cycle in the correct order — start to finish</p><div class="badge" id="counter">0 / 6 placed</div></div>
  <div id="game"></div>
  <div id="doneBox" class="done-box" style="display:none"><div class="big">🎉</div><h2>Perfect Sequence!</h2><p>Every team member's accuracy impacts the practice's financial health.</p><button class="btn" onclick="resetGame()">🔄 Play Again</button></div>
</div>
<script>
const ORDER=["Patient Registration & Eligibility Verification","Clinical Encounter & Documentation","Charge Capture & Coding","Claim Submission (to payer or clearinghouse)","Adjudication & Payment Posting (EOB)","Follow-Up, Denials & Collections"];
const TIPS=["Collect demographics, verify insurance, confirm financial responsibility.","Provider sees patient, documents encounter, assigns codes.","Charges entered, codes confirmed for accuracy and medical necessity.","Clean claims submitted electronically — timely filing deadlines must be met.","Payer processes claim, issues EOB, payments and adjustments posted.","Denied claims reviewed and appealed. Patient balances billed promptly."];
let pool,placed,fbData;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function init(){pool=shuffle(ORDER);placed=[];fbData=null;document.getElementById('game').style.display='block';document.getElementById('doneBox').style.display='none';render()}
function render(){document.getElementById('counter').textContent=placed.length+' / '+ORDER.length+' placed';const g=document.getElementById('game');let h='';if(fbData){h+='<div class="fb '+(fbData.ok?'ok':'no')+'"><strong class="'+(fbData.ok?'ok':'no')+'">'+(fbData.ok?'✅ Correct!':'❌ Not the next step!')+'</strong>';if(fbData.tip)h+='<div class="tip">'+fbData.tip+'</div>';h+='</div>'}if(placed.length>0){h+='<div style="margin-bottom:20px"><div class="section-label done-l">✅ Revenue Cycle</div>';placed.forEach((s,i)=>{h+='<div class="placed-item"><div class="placed-num">'+(i+1)+'</div><div class="placed-text">'+s+'</div></div>'});h+='</div>'}if(pool.length>0){h+='<div class="section-label pick">💰 Tap step #'+(placed.length+1)+'</div><div class="pool">';pool.forEach((s,i)=>{h+='<div class="pool-item" onclick="pick('+i+')">'+s+'</div>'});h+='</div>'}g.innerHTML=h}
function pick(idx){const step=pool[idx];const ni=placed.length;if(step===ORDER[ni]){placed.push(step);pool=pool.filter((_,i)=>i!==idx);fbData={ok:true,tip:TIPS[ni]};render();if(placed.length===ORDER.length)setTimeout(()=>{document.getElementById('game').style.display='none';document.getElementById('doneBox').style.display='block'},1000);else setTimeout(()=>{fbData=null;render()},1500)}else{fbData={ok:false};render();setTimeout(()=>{fbData=null;render()},1200)}}
function resetGame(){init()}
init();
</script>
</body>
</html>
