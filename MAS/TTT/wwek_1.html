<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completing Patient Intake and Recording Vital Signs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: rgba(255,255,255,0.025);
    --border: rgba(255,255,255,0.07);
    --text: #c4cedf;
    --text-bright: #e2e8f4;
    --text-muted: #6b7a96;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    flex-shrink: 0;
    text-align: center;
    padding: 16px 24px 12px;
  }
  .header h1 {
    font-size: 26px; font-weight: 800;
    color: var(--text-bright); line-height: 1.1; margin-top: 2px;
  }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .main {
    flex: 1; overflow: hidden;
    display: flex; gap: 16px;
    padding: 0 24px 16px;
  }
  .sidebar {
    width: 250px; flex-shrink: 0;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    padding-right: 6px;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  .topic-btn {
    display: flex; align-items: center; gap: 9px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 11px;
    cursor: pointer; transition: all 0.2s ease;
    width: 100%; text-align: left;
    font-family: 'DM Sans', sans-serif; color: var(--text);
  }
  .topic-btn:hover { transform: translateX(2px); }
  .topic-btn .icon { font-size: 18px; flex-shrink: 0; line-height: 1; }
  .topic-btn .label {
    font-size: 13px; font-weight: 500; flex: 1;
    line-height: 1.3; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .topic-btn.active .label { color: var(--text-bright); font-weight: 600; }
  .sidebar-divider {
    height: 1px; background: var(--border);
    margin: 4px 0; flex-shrink: 0;
  }
  .content {
    flex: 1; overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    display: flex; flex-direction: column;
  }
  .content-header {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .content-header .icon { font-size: 30px; }
  .content-header .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 700;
  }
  .content-header .title {
    font-size: 18px; font-weight: 700;
    color: var(--text-bright); line-height: 1.2;
  }
  .content-scroll {
    flex: 1; overflow-y: auto; padding-right: 6px;
  }
  .content-scroll::-webkit-scrollbar { width: 3px; }
  .content-scroll::-webkit-scrollbar-track { background: transparent; }
  .content-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  .point {
    display: flex; gap: 10px; align-items: flex-start;
    background: rgba(255,255,255,0.025);
    border-radius: 10px; padding: 10px 13px;
    margin-bottom: 7px; border: 1px solid transparent;
    animation: pointIn 0.3s ease both;
  }
  .point .num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .point p { font-size: 14px; line-height: 1.55; color: var(--text); }
  .takeaway-item {
    display: flex; gap: 10px; align-items: flex-start;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 13px;
    margin-bottom: 7px;
    animation: pointIn 0.3s ease both;
  }
  .takeaway-item .num {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #E63946, #FF6B35);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .takeaway-item p { font-size: 14px; line-height: 1.55; color: var(--text); }
  .welcome {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .welcome .big-icon { font-size: 52px; margin-bottom: 14px; }
  .welcome p { font-size: 15px; color: var(--text-muted); line-height: 1.6; max-width: 260px; }
  @keyframes pointIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Completing Patient Intake and Recording Vital Signs</h1>
    <p>Patient Intake and Vital Signs</p>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="welcome">
        <div class="big-icon">📚</div>
        <p>Select a topic from the left to explore its key learning points</p>
      </div>
    </div>
  </div>
</div>
<script>
var TOPICS = [
  { id:1, num:"01", icon:"🔍", title:"Identifying Your Patient", color:"#E63946",
    points:["Use at least two identifiers at every visit","Full name + date of birth (most common)","Medical record number","Last 4 digits of Social Security number","Never read the name aloud and ask the patient to confirm it"] },
  { id:2, num:"02", icon:"🧰", title:"Patient Health Background", color:"#457B9D",
    points:["Medical history — past illnesses, surgeries, diagnoses","Surgical history — procedures the patient has had","Family history — conditions that run in the family","Social history — lifestyle, tobacco, alcohol, drug use, occupation","Chief complaint — the reason for today\'s visit, in the patient\'s own words"] },
  { id:3, num:"03", icon:"🌈", title:"Menstrual History (LMP)", color:"#2A9D8F",
    points:["Ask at every visit for patients who menstruate","LMP = Last Menstrual Period — the first day of their most recent period","Determines potential for pregnancy before ordering tests","Used to calculate an estimated due date if pregnant","Document whether the patient is currently menstruating"] },
  { id:4, num:"04", icon:"🧪", title:"Vital Signs — The Basics", color:"#8338EC",
    points:["Taken at every patient encounter","Key indicators of overall health (homeostasis)","Five main vital signs: blood pressure, pulse, temperature, respiration, pulse oximetry","Age, medications, stress, and activity can all affect readings","Always report abnormal values to the provider"] },
  { id:5, num:"05", icon:"📏", title:"Blood Pressure", color:"#FF6B35",
    points:["Manual method: sphygmomanometer + stethoscope","Electronic method: machine reads without auscultation","Palpatory method: used in emergencies — feel the radial pulse instead","Normal adult: systolic < 120, diastolic < 80 mmHg","Common errors: wrong cuff size, arm position, legs crossed, recent caffeine/smoking"] },
  { id:6, num:"06", icon:"💉", title:"Orthostatic Blood Pressure", color:"#E63946",
    points:["Tests for a significant drop in BP when changing positions","Lie down 5 min → stand → measure at 1 min and 3 min","Positive finding: BP drops ≥ 20 mmHg OR pulse rises ≥ 10 bpm","Keep arm supported — a hanging arm gives a falsely high reading","Watch for dizziness; stop and assist patient if unsafe"] },
  { id:7, num:"07", icon:"🩸", title:"Pulse", color:"#457B9D",
    points:["Normal adult range: 60–100 beats per minute","Most common site: radial pulse (thumb side of wrist)","Brachial: used for children and blood pressure","Apical: stethoscope over the heart — used for irregular rhythms","Assess rate, rhythm, and strength; report any irregularities"] },
  { id:8, num:"08", icon:"📋", title:"Body Temperature", color:"#2A9D8F",
    points:["Oral: 98.6°F / 37°C — standard baseline","Axillary (Ax): ~1°F lower than oral","Rectal (R), Tympanic (T), Temporal (TA): ~1°F higher than oral","No hot/cold drinks, gum, or smoking 15 min before oral temp","Document site if not oral: Ax, R, T/AU, or TA"] },
  { id:9, num:"09", icon:"🩹", title:"Respiratory Rate", color:"#8338EC",
    points:["Normal adult range: 12–20 breaths per minute","One breath = one full inhale + one full exhale","Count without telling the patient — they may alter their breathing","Abnormal patterns: apnea, tachypnea, bradypnea, dyspnea, wheezing","Note rate, rhythm, and depth"] },
  { id:10, num:"10", icon:"🏷️", title:"Pulse Oximetry", color:"#FF6B35",
    points:["Measures oxygen saturation in the blood (SpO₂)","Normal result: 95% or higher","Report to provider if below 90%","Clip goes on the fingertip; earlobe is an alternate site","Nail polish, artificial nails, and dark skin at low O₂ can affect accuracy"] },
  { id:11, num:"11", icon:"⚙️", title:"Pain Assessment", color:"#E63946",
    points:["Use the 0–10 numeric scale (0 = no pain, 10 = worst pain)","Wong-Baker Faces Scale for children or those who can\'t use numbers","Also observe nonverbal cues: grimacing, guarding, posture","Ask about location, onset, duration, and what makes it better or worse","Document all verbal and nonverbal pain responses"] },
  { id:12, num:"12", icon:"🔬", title:"Height, Weight, BMI & Waist Circumference", color:"#457B9D",
    points:["Remove shoes and heavy outerwear before measuring","Weight may vary by age and mobility — use appropriate equipment","BMI = weight (kg) ÷ height² (m²) — or use the lb/in² × 703 formula","BMI 18.5–24.9 = normal; ≥ 30 = obese","Waist circumference assesses metabolic and cardiovascular risk"] },
  { id:13, num:"13", icon:"⭐", title:"Unit Conversions", color:"#2A9D8F",
    points:["°F to °C: (°F − 32) ÷ 1.8","°C to °F: (°C × 1.8) + 32","Pounds to kilograms: lb ÷ 2.2","Kilograms to pounds: kg × 2.2","Inches to feet: divide by 12 (remainder = inches)"] },
  { id:14, num:"14", icon:"📦", title:"Factors That Affect Vital Signs", color:"#8338EC",
    points:["Age: infants fluctuate more; older adults run cooler","Medications: beta-blockers lower BP and heart rate","Stress and anxiety: raise BP and pulse","Smoking or caffeine within 30 min: raise BP","Always note any relevant factors when reporting results"] },
  { id:15, num:"15", icon:"💊", title:"Routine Health Screenings", color:"#FF6B35",
    points:["Tobacco use — assess for cessation support","Alcohol use — frequency and quantity","HIV screening — recommended for all adults ages 15–65","Document \'patient declined to answer\' if they refuse","These screenings are part of every complete patient intake"] },
  { id:16, num:"16", icon:"🫀", title:"Mental Health Screening Tools", color:"#E63946",
    points:["PHQ-2: quick 2-question depression screen","PHQ-9: full depression assessment if PHQ-2 is positive","GAD-7: screens for generalized anxiety","Mini-Mental State Exam (MMSE): cognitive screening for older adults","Report all positive screens to the provider"] },
  { id:17, num:"17", icon:"📡", title:"Pediatric Measurements & Growth Charts", color:"#457B9D",
    points:["Measure height, weight, and head circumference at well-child visits","Plot on CDC growth charts — sex-specific, birth through age 20","Results reported as a percentile compared to same-age peers","< 5th percentile = underweight; ≥ 95th percentile = obese","Head circumference tracked from birth to 36 months"] },
];

var TAKEAWAYS = [
  "Always use two identifiers before providing any care",
  "Vital signs are taken every visit — accuracy and consistency matter",
  "Know normal ranges for every age group, not just adults",
  "Factors like age, medications, and recent activity affect readings",
  "Document everything — the health record is a legal document",
  "Report abnormal findings to the provider immediately"
];

var activeId = null;
var sidebar = document.getElementById('sidebar');
var content = document.getElementById('content');

function buildSidebar() {
  TOPICS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.dataset.id = t.id;
    btn.innerHTML = '<span class="icon">' + t.icon + '</span><span class="label">' + t.title + '</span>';
    btn.addEventListener('click', function() { selectTopic(t.id); });
    btn.addEventListener('mouseenter', function() {
      if (activeId !== t.id) { this.style.background = t.color + '10'; this.style.borderColor = t.color + '55'; }
    });
    btn.addEventListener('mouseleave', function() {
      if (activeId !== t.id) { this.style.background = 'var(--surface)'; this.style.borderColor = 'var(--border)'; }
    });
    sidebar.appendChild(btn);
  });
  var divider = document.createElement('div');
  divider.className = 'sidebar-divider';
  sidebar.appendChild(divider);
  var tkBtn = document.createElement('button');
  tkBtn.className = 'topic-btn';
  tkBtn.dataset.id = 'takeaways';
  tkBtn.innerHTML = '<span class="icon">🎯</span><span class="label">Key Takeaways</span>';
  tkBtn.addEventListener('click', function() { selectTopic('takeaways'); });
  tkBtn.addEventListener('mouseenter', function() {
    if (activeId !== 'takeaways') { this.style.background = 'rgba(255,255,255,0.06)'; this.style.borderColor = 'rgba(255,255,255,0.15)'; }
  });
  tkBtn.addEventListener('mouseleave', function() {
    if (activeId !== 'takeaways') { this.style.background = 'var(--surface)'; this.style.borderColor = 'var(--border)'; }
  });
  sidebar.appendChild(tkBtn);
}

function updateSidebarActive() {
  var btns = sidebar.querySelectorAll('.topic-btn');
  btns.forEach(function(btn) {
    var id = btn.dataset.id;
    var topic = TOPICS.find(function(t) { return t.id == id; });
    var isActive = (id == activeId) || (id === 'takeaways' && activeId === 'takeaways');
    if (isActive) btn.classList.add('active'); else btn.classList.remove('active');
    if (isActive && topic) {
      btn.style.background = topic.color + '20';
      btn.style.borderColor = topic.color;
    } else if (isActive && id === 'takeaways') {
      btn.style.background = 'rgba(255,255,255,0.08)';
      btn.style.borderColor = 'rgba(255,255,255,0.2)';
    } else {
      btn.style.background = 'var(--surface)';
      btn.style.borderColor = 'var(--border)';
    }
  });
}

function renderTopic(t) {
  var html = '<div class="content-header">' +
    '<span class="icon">' + t.icon + '</span>' +
    '<div><div class="tag" style="color:' + t.color + '">TOPIC ' + t.num + '</div>' +
    '<div class="title">' + t.title + '</div></div></div>' +
    '<div class="content-scroll">';
  t.points.forEach(function(p, i) {
    html += '<div class="point" style="border-color:' + t.color + '22;animation-delay:' + (i * 50) + 'ms">' +
      '<div class="num" style="background:' + t.color + '">' + (i + 1) + '</div>' +
      '<p>' + p + '</p></div>';
  });
  html += '</div>';
  return html;
}

function renderTakeaways() {
  var html = '<div class="content-header">' +
    '<span class="icon" style="font-size:30px">🎯</span>' +
    '<div><div class="title">Key Takeaways</div></div></div>' +
    '<div class="content-scroll">';
  TAKEAWAYS.forEach(function(t, i) {
    html += '<div class="takeaway-item" style="animation-delay:' + (i * 50) + 'ms">' +
      '<div class="num">' + (i + 1) + '</div><p>' + t + '</p></div>';
  });
  html += '</div>';
  return html;
}

function selectTopic(id) {
  activeId = id;
  updateSidebarActive();
  if (id === 'takeaways') {
    content.innerHTML = renderTakeaways();
  } else {
    var topic = TOPICS.find(function(t) { return t.id === id; });
    if (topic) content.innerHTML = renderTopic(topic);
  }
  content.style.animation = 'none';
  void content.offsetHeight;
  content.style.animation = 'fadeIn 0.25s ease';
}

buildSidebar();
</script>
</body>
</html>
