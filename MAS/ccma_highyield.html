<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCMA High-Yield Recall</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#1a1a2e;min-height:100vh;}
  .app{background:#1a1a2e;min-height:100vh;padding:1.5rem 1rem 2rem;max-width:640px;margin:0 auto;}
  .header{text-align:center;margin-bottom:1.25rem}
  .header h1{font-size:20px;font-weight:500;color:#e8e6f0;margin-bottom:4px}
  .header p{font-size:13px;color:#9b97b2}
  .score-row{display:flex;justify-content:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap}
  .score-pill{background:#252540;border-radius:99px;padding:6px 16px;font-size:13px;font-weight:500}
  .score-pill.correct{color:#5DCAA5}
  .score-pill.wrong{color:#F0997B}
  .score-pill.left{color:#9b97b2}
  .cat-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:#9b97b2;text-transform:uppercase;margin:1rem 0 0.5rem;padding-left:2px}
  .card{background:#252540;border:1px solid #333360;border-radius:14px;padding:1.25rem;margin-bottom:0.6rem}
  .card.revealed.correct{background:#0d3326;border-color:#1D9E75}
  .card.revealed.wrong{background:#3a1a1a;border-color:#D85A30}
  .prompt{font-size:15px;color:#e8e6f0;margin-bottom:12px;line-height:1.5}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .choice{background:#1a1a2e;border:1px solid #333360;border-radius:8px;padding:9px 12px;font-size:13px;color:#c8c5e0;cursor:pointer;text-align:center;transition:all 0.15s;line-height:1.4}
  .choice:hover:not(.locked){background:#2d2d55;border-color:#534AB7;color:#e8e6f0}
  .choice.picked.correct{background:#0d3326;border-color:#1D9E75;color:#5DCAA5;font-weight:500}
  .choice.picked.wrong{background:#3a1a1a;border-color:#D85A30;color:#F0997B}
  .choice.reveal-right{background:#0d3326;border-color:#1D9E75;color:#5DCAA5}
  .feedback{font-size:12px;margin-top:10px;padding:7px 10px;border-radius:6px;font-weight:500;line-height:1.5}
  .feedback.correct{background:#0d3326;color:#5DCAA5}
  .feedback.wrong{background:#3a1a1a;color:#F0997B}
  .win{padding:2.5rem 1rem;text-align:center}
  .win .big{font-size:44px;margin-bottom:12px}
  .win .score-final{font-size:36px;font-weight:500;color:#5DCAA5;margin-bottom:6px}
  .win h2{font-size:20px;font-weight:500;color:#e8e6f0;margin-bottom:8px}
  .win p{font-size:14px;color:#9b97b2;margin-bottom:1.5rem}
  .restart{background:#534AB7;color:#CECBF6;border:none;border-radius:10px;padding:10px 28px;font-size:14px;cursor:pointer;font-weight:500}
  .restart:hover{background:#7F77DD}
</style>
</head>
<body>
<div class="app" id="appRoot">
  <div class="header">
    <h1>CCMA High-Yield Recall</h1>
    <p>Pick the best answer — no peeking at your notes!</p>
  </div>
  <div class="score-row">
    <div class="score-pill correct" id="sc">0 correct</div>
    <div class="score-pill wrong" id="sw">0 wrong</div>
    <div class="score-pill left" id="sl">14 left</div>
  </div>
  <div id="board"></div>
</div>

<script>
const qs=[
  {cat:"General patient care",prompt:"What is the normal adult blood pressure?",choices:["100/60","120/80","140/90","160/100"],ans:1,hint:"120/80 mmHg is the classic normal. Memorize it!"},
  {cat:"General patient care",prompt:"Normal adult pulse rate is:",choices:["40–60 bpm","60–100 bpm","100–120 bpm","50–90 bpm"],ans:1,hint:"60–100 bpm. Below = bradycardia, above = tachycardia."},
  {cat:"General patient care",prompt:"Normal adult respiratory rate is:",choices:["6–10 breaths/min","20–30 breaths/min","12–20 breaths/min","25–35 breaths/min"],ans:2,hint:"12–20 breaths/min. Count for a full minute!"},
  {cat:"General patient care",prompt:"Normal body temperature in Fahrenheit is:",choices:["96.8°F","99.6°F","101°F","98.6°F"],ans:3,hint:"98.6°F = 37°C. Classic normal temp!"},
  {cat:"Infection control & safety",prompt:"What is the FIRST item removed when doffing PPE?",choices:["Mask","Gown","Gloves","Goggles"],ans:2,hint:"Gloves first — they are the most contaminated item!"},
  {cat:"Infection control & safety",prompt:"What is the LAST item removed when doffing PPE?",choices:["Gown","Goggles","Gloves","Mask"],ans:3,hint:"Mask is last — it protects your face until everything else is off."},
  {cat:"Infection control & safety",prompt:"Sharps should be disposed of in a:",choices:["Regular trash","Red biohazard bag","Sharps container","Paper bag"],ans:2,hint:"Always a puncture-resistant sharps container — never recap!"},
  {cat:"Phlebotomy & lab",prompt:"What is the correct needle angle for a Vacutainer draw?",choices:["10–15°","45°","15–30°","90°"],ans:2,hint:"15–30° for Vacutainer. Butterfly is shallower at 10–15°."},
  {cat:"Phlebotomy & lab",prompt:"What is the maximum tourniquet time during venipuncture?",choices:["30 seconds","1 minute","2 minutes","5 minutes"],ans:1,hint:"1 minute max — longer causes hemoconcentration!"},
  {cat:"Phlebotomy & lab",prompt:"Which tube comes FIRST in the order of draw?",choices:["Lavender","Gold (SST)","Light Blue","Blood culture"],ans:3,hint:"Blood culture bottles always go first to prevent contamination."},
  {cat:"Phlebotomy & lab",prompt:"Which tube comes LAST in the order of draw?",choices:["Gray","Green","Red","Light Blue"],ans:0,hint:"Gray (glucose/fluoride) is last. Remember: Blood, Blue, Red, Gold, Green, Lavender, Gray!"},
  {cat:"Pharmacology & medication",prompt:"The 5 Rights of medication administration include all EXCEPT:",choices:["Right patient","Right dose","Right diagnosis","Right route"],ans:2,hint:"Diagnosis is not one of the 5 Rights. They are: Patient, Drug, Dose, Route, Time."},
  {cat:"Pharmacology & medication",prompt:"What angle is used for an intramuscular (IM) injection?",choices:["10–15°","45°","45–90°","90°"],ans:3,hint:"IM = 90°. SubQ = 45–90°. ID = 10–15°."},
  {cat:"Pharmacology & medication",prompt:"When reading a TB skin test, you measure the:",choices:["Redness","Induration (raised bump)","Bruising","Warmth"],ans:1,hint:"Always measure induration (firmness), NOT redness. 10mm+ = positive in most populations."},
];

let state=qs.map(()=>({picked:null,revealed:false}));
let correct=0, wrong=0;

function pick(qi,ci){
  if(state[qi].revealed) return;
  state[qi].picked=ci; state[qi].revealed=true;
  if(ci===qs[qi].ans) correct++; else wrong++;
  updateScore(); renderCard(qi);
  if(correct+wrong===qs.length) setTimeout(showWin,700);
}

function updateScore(){
  document.getElementById('sc').textContent=correct+' correct';
  document.getElementById('sw').textContent=wrong+' wrong';
  document.getElementById('sl').textContent=(qs.length-correct-wrong)+' left';
}

function renderCard(qi){
  const q=qs[qi], s=state[qi];
  const card=document.getElementById('card-'+qi); if(!card) return;
  const ok=s.picked===q.ans;
  card.className='card'+(s.revealed?' revealed '+(ok?'correct':'wrong'):'');
  const choicesHtml=q.choices.map((c,ci)=>{
    let cls='choice';
    if(s.revealed){
      cls+=' locked';
      if(ci===s.picked&&ok) cls+=' picked correct';
      else if(ci===s.picked&&!ok) cls+=' picked wrong';
      else if(ci===q.ans) cls+=' reveal-right';
    }
    return`<div class="${cls}" onclick="pick(${qi},${ci})">${c}</div>`;
  }).join('');
  const feedback=s.revealed?`<div class="feedback ${ok?'correct':'wrong'}">${ok?'Correct! ':'Wrong. '}${q.hint}</div>`:'';
  card.innerHTML=`<div class="prompt">${q.prompt}</div><div class="choices">${choicesHtml}</div>${feedback}`;
}

function renderAll(){
  const board=document.getElementById('board'); board.innerHTML='';
  let lastCat='';
  qs.forEach((q,qi)=>{
    if(q.cat!==lastCat){
      const d=document.createElement('div'); d.className='cat-label'; d.textContent=q.cat;
      board.appendChild(d); lastCat=q.cat;
    }
    const card=document.createElement('div'); card.className='card'; card.id='card-'+qi;
    board.appendChild(card); renderCard(qi);
  });
}

function showWin(){
  const pct=Math.round(correct/qs.length*100);
  const emoji=pct===100?'🎉':pct>=80?'⭐':pct>=60?'💪':'📚';
  const msg=pct===100?'Perfect! You crushed it!':pct>=80?'Great work — almost exam ready!':pct>=60?'Good effort — review the missed ones.':'Keep studying — you\'ve got this!';
  document.getElementById('appRoot').innerHTML=`<div class="win">
    <div class="big">${emoji}</div>
    <div class="score-final">${pct}%</div>
    <h2>${msg}</h2>
    <p>${correct} of ${qs.length} correct</p>
    <button class="restart" onclick="restart()">Try again</button>
  </div>`;
}

function restart(){
  state=qs.map(()=>({picked:null,revealed:false}));
  correct=0; wrong=0;
  document.getElementById('appRoot').innerHTML=`
    <div class="header"><h1>CCMA High-Yield Recall</h1><p>Pick the best answer — no peeking at your notes!</p></div>
    <div class="score-row">
      <div class="score-pill correct" id="sc">0 correct</div>
      <div class="score-pill wrong" id="sw">0 wrong</div>
      <div class="score-pill left" id="sl">14 left</div>
    </div>
    <div id="board"></div>`;
  renderAll();
}

renderAll();
</script>
</body>
</html>
