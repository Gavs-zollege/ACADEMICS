<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #0f3460;
    --bg-option: #1a1a2e;
    --bg-option-hover: #1e2a4a;
    --text-primary: #f0f0f0;
    --text-secondary: #b0b8d1;
    --border: #2a3a5c;
    --success-bg: #0d3b2e;
    --success-border: #1a7a54;
    --success-text: #4ecca3;
    --danger-bg: #3b0d0d;
    --danger-border: #7a1a1a;
    --danger-text: #ff6b6b;
    --accent: #7F77DD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-primary); font-family: system-ui, sans-serif; color: var(--text-primary); }
  .wrap { max-width: 620px; margin: 0 auto; padding: 1.25rem 1rem; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
  .header-text p { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .header-text h2 { font-size: 17px; font-weight: 800; color: var(--text-primary); line-height: 1.3; }
  .score-badge { display: inline-block; font-size: 13px; font-weight: 700; padding: 5px 14px; border-radius: 20px; background: #2a2060; color: #a89fff; border: 1px solid #4a4aaa; white-space: nowrap; flex-shrink: 0; }

  /* Progress bar */
  .progress-bar { width: 100%; height: 6px; background: var(--bg-secondary); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 6px; background: var(--accent); border-radius: 99px; transition: width 0.35s ease; }

  /* Phase tag */
  .phase-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; margin-bottom: 12px; }
  .phase-lead { background: #1a2060; color: #8899ff; border: 1px solid #2a3aaa; }
  .phase-during { background: #2a1a40; color: #cc88ff; border: 1px solid #6a3aaa; }
  .phase-after { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }

  /* Card */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .q-text { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.5; margin-bottom: 1.1rem; }

  /* Options */
  .opt-btn { width: 100%; text-align: left; background: var(--bg-option); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; color: var(--text-primary); transition: background 0.15s, border-color 0.15s; display: flex; gap: 10px; align-items: flex-start; }
  .opt-btn:hover:not(:disabled) { background: var(--bg-option-hover); border-color: #4a5a8c; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--success-bg) !important; border-color: var(--success-border) !important; color: var(--success-text) !important; }
  .opt-btn.wrong { background: var(--danger-bg) !important; border-color: var(--danger-border) !important; color: var(--danger-text) !important; }
  .opt-btn.reveal { background: var(--success-bg) !important; border-color: var(--success-border) !important; color: var(--success-text) !important; opacity: 0.75; }
  .opt-letter { font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 50%; background: #2a3a5c; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .opt-btn.correct .opt-letter { background: #1a5a3a; }
  .opt-btn.wrong .opt-letter { background: #5a1a1a; }
  .opt-btn.reveal .opt-letter { background: #1a5a3a; }

  /* Feedback */
  .feedback { font-size: 13px; font-weight: 600; margin-top: 12px; padding: 10px 14px; border-radius: 8px; line-height: 1.55; display: none; }
  .feedback.ok { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
  .feedback.no { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }
  .feedback strong { color: #fff; }

  /* Bottom bar */
  .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .counter { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .next-btn { background: #2a2a6e; color: #d0cfff; border: 1px solid #4a4aaa; border-radius: 8px; font-weight: 700; cursor: pointer; padding: 9px 20px; font-size: 14px; display: none; transition: background 0.15s; }
  .next-btn:hover { background: #3a3a8e; }

  /* Results */
  .result-card { display: none; margin-top: 1rem; text-align: center; padding: 2rem 1.25rem; }
  .result-score { font-size: 40px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
  .result-emoji { font-size: 36px; margin-bottom: 10px; }
  .result-msg { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5; }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .result-btns button { background: #2a2a6e; color: #d0cfff; border: 1px solid #4a4aaa; border-radius: 8px; font-weight: 700; cursor: pointer; padding: 10px 22px; font-size: 14px; transition: background 0.15s; }
  .result-btns button:hover { background: #3a3a8e; }

  /* Phase legend */
  .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .legend-item { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-text">
      <p>Medical Assistant Program</p>
      <h2>Exam Stress Strategies — Match the Moment</h2>
    </div>
    <span class="score-badge" id="score-badge">0 / 8</span>
  </div>

  <div class="legend">
    <span class="legend-item phase-lead">📚 Lead-up</span>
    <span class="legend-item phase-during">⏱ During exams</span>
    <span class="legend-item phase-after">✅ After exams</span>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div id="quiz-area" class="card">
    <span class="phase-tag" id="phase-tag"></span>
    <p class="q-text" id="question"></p>
    <div id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="bottom-bar">
    <span class="counter" id="counter"></span>
    <button class="next-btn" id="next-btn" onclick="next()">Next →</button>
  </div>

  <div class="result-card card" id="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-score" id="final-score"></div>
    <div class="result-msg" id="final-msg"></div>
    <div class="result-btns">
      <button onclick="restart()">↺ Try again</button>
    </div>
  </div>
</div>

<script>
const LETTERS = ["A","B","C","D"];

const qs = [
  {
    phase: "Lead up to exams",
    q: "A classmate says they have no idea where to start studying. What's the best first step?",
    opts: ["Pull an all-nighter to cover everything", "Work on a study plan together", "Tell them to figure it out on their own", "Skip straight to practice exams"],
    ans: 1,
    explain: "Building a study plan together reduces overwhelm and gives structure — a core lead-up strategy."
  },
  {
    phase: "Lead up to exams",
    q: "Your study buddy keeps getting distracted at home. What should you help them set up?",
    opts: ["A dedicated, organized study space", "More social media breaks", "A louder playlist", "An extra cup of coffee"],
    ans: 0,
    explain: "A proper study space removes distractions and signals the brain it's time to focus."
  },
  {
    phase: "Lead up to exams",
    q: "A student says, 'I stress-eat and zone out when things get hard.' What's the ideal response?",
    opts: ["Tell them to just push through", "Help identify their stressors, coping habits, and supports", "Suggest they drop the course", "Ignore it — it's not your problem"],
    ans: 1,
    explain: "Identifying stressors and coping mechanisms early builds a personalized stress-management toolkit."
  },
  {
    phase: "Lead up to exams",
    q: "A friend is anxious about what grade they need to pass the clinical rotation. What helps most?",
    opts: ["Tell them grades don't matter", "Avoid the topic", "Chat openly about expectations and goals", "Tell them to just wing it"],
    ans: 2,
    explain: "Open conversations about expectations and goals lower anxiety and set realistic targets."
  },
  {
    phase: "During exams",
    q: "A student is burning the midnight oil every night during exam week. What should you encourage?",
    opts: ["Even more late-night study sessions", "Quality sleep, exercise, and movement", "Energy drinks around the clock", "Skipping meals to save time"],
    ans: 1,
    explain: "Sleep, exercise, and movement are essential — they improve memory consolidation and reduce cortisol."
  },
  {
    phase: "During exams",
    q: "Your classmate has been locked in the library for days with no breaks. What's missing?",
    opts: ["More flashcards", "Time for fun, socializing, and self-care", "A harder chair", "Longer study hours"],
    ans: 1,
    explain: "Rest and social connection during exams protect mental health and prevent burnout."
  },
  {
    phase: "After exams",
    q: "A student got a lower mark than expected but worked incredibly hard. What's the right response?",
    opts: ["Focus only on the low mark", "Celebrate the effort, not just the outcome", "Tell them they should have studied harder", "Say nothing"],
    ans: 1,
    explain: "Celebrating effort over outcome builds resilience and growth mindset — key in healthcare careers."
  },
  {
    phase: "After exams",
    q: "A classmate passed but feels lost about what comes next in their Medical Assistant program. What helps?",
    opts: ["Tell them to coast for a while", "Provide reassurance and perspective, then help set new goals and explore pathways", "Suggest they quit", "Let them figure it out alone"],
    ans: 1,
    explain: "Post-exam reflection, reassurance, and goal-setting keeps students motivated and forward-focused."
  }
];

function phaseClass(phase) {
  if (phase.toLowerCase().includes("lead")) return "phase-lead";
  if (phase.toLowerCase().includes("during")) return "phase-during";
  return "phase-after";
}

function shuffle(arr) {
  let a = [...arr];
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let idx = 0, score = 0, answered = false;
let order = shuffle([...Array(qs.length).keys()]);

function render() {
  const q = qs[order[idx]];
  answered = false;

  const tag = document.getElementById('phase-tag');
  tag.textContent = q.phase;
  tag.className = 'phase-tag ' + phaseClass(q.phase);

  document.getElementById('question').textContent = q.q;
  document.getElementById('counter').textContent = `Question ${idx+1} of ${qs.length}`;
  document.getElementById('progress').style.width = `${((idx+1)/qs.length)*100}%`;

  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  const el = document.getElementById('options');
  el.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span>${o}`;
    b.onclick = () => answer(i, q);
    el.appendChild(b);
  });
}

function answer(i, q) {
  if(answered) return;
  answered = true;
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  const correct = i === q.ans;
  btns[i].classList.add(correct ? 'correct' : 'wrong');
  if(!correct) btns[q.ans].classList.add('reveal');
  if(correct) score++;

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'ok' : 'no');
  fb.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Not quite.'}</strong> ${q.explain}`;

  document.getElementById('score-badge').textContent = `${score} / ${qs.length}`;
  document.getElementById('next-btn').style.display = 'inline-block';
}

function next() {
  idx++;
  if(idx >= qs.length) { finish(); return; }
  render();
}

function finish() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('counter').style.display = 'none';

  const pct = score / qs.length;
  const r = document.getElementById('result-card');
  r.style.display = 'block';
  document.getElementById('result-emoji').textContent = pct === 1 ? '🏆' : pct >= 0.75 ? '👍' : pct >= 0.5 ? '📖' : '💪';
  document.getElementById('final-score').textContent = `${score} / ${qs.length}`;
  document.getElementById('final-msg').textContent =
    pct === 1    ? 'Perfect score! You nailed every strategy.' :
    pct >= 0.75  ? 'Great work! You have a solid handle on these strategies.' :
    pct >= 0.5   ? 'Good effort — review the phases you found tricky.' :
                   'Keep practicing — these strategies are worth knowing well!';
}

function restart() {
  idx = 0; score = 0; answered = false;
  order = shuffle([...Array(qs.length).keys()]);
  document.getElementById('score-badge').textContent = `0 / ${qs.length}`;
  document.getElementById('progress').style.width = '0%';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('counter').style.display = 'block';
  document.getElementById('next-btn').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
