<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Six Essential Nutrients</title>
<style>
  :root { --bg:#2b3147; --card:#343c58; --card2:#3c4668; --text:#f0f4ff; --muted:#b0bbd8; --accent:#9b94f0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; }
  .wrap { padding:1.5rem 1rem; max-width:720px; margin:0 auto; }
  h1 { font-size:22px; font-weight:500; color:var(--text); text-align:center; margin-bottom:4px; }
  .sub { text-align:center; font-size:15px; color:var(--muted); margin-bottom:1.5rem; }
  .tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:1.5rem; }
  .tab { padding:8px 16px; border-radius:20px; border:2px solid #6b6fc4; background:#3e4570; color:#d0d5ff; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .tab.active, .tab:hover { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 10px rgba(155,148,240,0.5); }
  .section { display:none; }
  .section.active { display:block; }
  .fc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; }
  .fc { background:var(--card); border-radius:14px; padding:1.2rem 1rem; text-align:center; cursor:pointer; border:1.5px solid #505880; transition:transform .15s,border-color .2s; position:relative; min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .fc:hover { transform:translateY(-3px); border-color:var(--accent); }
  .fc .icon { font-size:36px; margin-bottom:10px; }
  .fc .name { font-size:15px; font-weight:500; color:var(--text); }
  .fc .desc { font-size:13px; color:var(--muted); margin-top:6px; display:none; line-height:1.5; }
  .fc.flipped .icon { display:none; }
  .fc.flipped .name { font-size:13px; color:var(--accent); }
  .fc.flipped .desc { display:block; color:var(--text); font-size:14px; }
  .fc-hint { text-align:center; color:var(--muted); font-size:13px; margin-bottom:1rem; }
  .quiz-box { background:var(--card); border-radius:14px; padding:1.5rem; border:1.5px solid #505880; }
  .q-counter { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .q-text { font-size:17px; font-weight:500; color:var(--text); margin-bottom:1.2rem; line-height:1.5; }
  .q-icon { font-size:40px; text-align:center; margin-bottom:12px; }
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .opt { background:#404a6e; border:2px solid #606898; border-radius:10px; padding:12px 14px; font-size:14px; font-weight:600; color:#e0e6ff; cursor:pointer; transition:all .18s; text-align:left; }
  .opt:hover:not(.locked) { border-color:var(--accent); background:#4a5480; color:#fff; }
  .opt.correct { background:#1a3a28; border-color:#3ebd7a; color:#3ebd7a; }
  .opt.wrong { background:#3a1a1a; border-color:#e24b4a; color:#e24b4a; }
  .opt.locked { cursor:default; }
  .feedback { margin-top:1rem; font-size:14px; min-height:20px; font-weight:500; }
  .feedback.ok { color:#3ebd7a; }
  .feedback.no { color:#e24b4a; }
  .q-nav { display:flex; justify-content:space-between; align-items:center; margin-top:1.2rem; }
  .q-btn { padding:9px 22px; border-radius:20px; border:2px solid var(--accent); background:#4a4898; color:#e0dcff; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
  .q-btn:hover { background:var(--accent); color:#fff; }
  .score-box { text-align:center; padding:2rem; }
  .score-num { font-size:52px; font-weight:500; color:var(--accent); }
  .score-msg { font-size:16px; color:var(--muted); margin-top:8px; }
  .restart-btn { margin-top:1.2rem; padding:10px 28px; border-radius:20px; border:2px solid var(--accent); background:#4a4898; color:#e0dcff; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; }
  .restart-btn:hover { background:var(--accent); color:#fff; }
  .match-wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .match-col h3 { font-size:14px; font-weight:500; color:var(--muted); margin-bottom:10px; text-align:center; }
  .match-item { background:var(--card); border:2px solid #505880; border-radius:10px; padding:11px 14px; font-size:14px; font-weight:500; color:#e0e6ff; cursor:pointer; margin-bottom:8px; transition:all .18s; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px; }
  .match-item:hover:not(.matched):not(.locked) { border-color:var(--accent); background:#404a6e; }
  .match-item.selected { border-color:#fac775; background:#2a2515; color:#fac775; }
  .match-item.matched { border-color:#3ebd7a; background:#1a3a28; color:#3ebd7a; cursor:default; }
  .match-status { text-align:center; margin-top:1rem; font-size:14px; color:var(--muted); min-height:20px; }
  .match-score { text-align:center; margin-top:8px; font-size:15px; font-weight:500; color:var(--accent); }
  .match-reset { display:block; margin:1rem auto 0; padding:8px 22px; border-radius:20px; border:2px solid var(--accent); background:#4a4898; color:#e0dcff; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .match-reset:hover { background:var(--accent); color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🥗 The Six Essential Nutrients</h1>
  <p class="sub">Tap a mode below to start learning!</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('flashcard',this)">🃏 Flashcards</button>
    <button class="tab" onclick="switchTab('quiz',this)">🧠 Quiz Me</button>
    <button class="tab" onclick="switchTab('match',this)">🔗 Match Up</button>
  </div>

  <div class="section active" id="sec-flashcard">
    <p class="fc-hint">Tap each card to reveal its role in the body!</p>
    <div class="fc-grid" id="fc-grid"></div>
  </div>

  <div class="section" id="sec-quiz">
    <div class="quiz-box" id="quiz-box"></div>
  </div>

  <div class="section" id="sec-match">
    <div class="match-wrap">
      <div><h3>Nutrient</h3><div id="match-left"></div></div>
      <div><h3>Role</h3><div id="match-right"></div></div>
    </div>
    <div class="match-status" id="match-status">Tap a nutrient, then tap its matching role!</div>
    <div class="match-score" id="match-score"></div>
    <button class="match-reset" onclick="initMatch()">Reset</button>
  </div>
</div>

<script>
const nutrients=[
  {name:'Carbohydrates',icon:'🍞',desc:'Primary energy source — fuels the brain, muscles, and body.'},
  {name:'Proteins',icon:'🥩',desc:'Essential for building and repairing tissues, enzymes, and hormones.'},
  {name:'Fats',icon:'🥑',desc:'Energy storage, cell structure, and absorption of fat-soluble vitamins.'},
  {name:'Vitamins',icon:'🍊',desc:'Regulate body processes — support immunity, vision, and metabolism.'},
  {name:'Water',icon:'💧',desc:'Regulates temperature, transports nutrients, and removes waste.'},
  {name:'Minerals',icon:'🦴',desc:'Build strong bones and teeth, and aid enzyme and metabolic functions.'},
];

const quizQs=[
  {icon:'🍞',q:"Which nutrient is the body's primary energy source?",opts:['Proteins','Fats','Carbohydrates','Vitamins'],ans:2},
  {icon:'💧',q:'Which nutrient regulates body temperature and removes waste?',opts:['Minerals','Water','Fats','Carbohydrates'],ans:1},
  {icon:'🥩',q:'Which nutrient is essential for building and repairing tissues?',opts:['Vitamins','Minerals','Water','Proteins'],ans:3},
  {icon:'🦴',q:'Which nutrient helps build bones and aids metabolism?',opts:['Fats','Carbohydrates','Minerals','Water'],ans:2},
  {icon:'🍊',q:'Which nutrient regulates body processes like immunity and vision?',opts:['Vitamins','Proteins','Carbohydrates','Minerals'],ans:0},
  {icon:'🥑',q:'Which nutrient is responsible for energy storage and cell structure?',opts:['Water','Vitamins','Proteins','Fats'],ans:3},
];

const roles=['Primary energy source','Builds & repairs tissues','Energy storage, cell structure','Regulates body processes','Regulates temperature, removes waste','Builds bones, aids metabolism'];

function switchTab(t, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='quiz') initQuiz();
  if(t==='match') initMatch();
}

// FLASHCARDS
const fcGrid=document.getElementById('fc-grid');
nutrients.forEach(n=>{
  const d=document.createElement('div'); d.className='fc';
  d.innerHTML=`<div class="icon">${n.icon}</div><div class="name">${n.name}</div><div class="desc">${n.desc}</div>`;
  d.onclick=()=>d.classList.toggle('flipped');
  fcGrid.appendChild(d);
});

// QUIZ
let qIdx=0, score=0, answered=false;
function initQuiz(){qIdx=0;score=0;renderQ();}
function renderQ(){
  const box=document.getElementById('quiz-box');
  if(qIdx>=quizQs.length){
    const pct=Math.round(score/quizQs.length*100);
    const msg=pct===100?"Perfect score! You're a nutrition expert! 🌟":pct>=66?'Great job! Keep it up! 💪':'Keep studying — you\'ve got this! 📚';
    box.innerHTML=`<div class="score-box"><div style="font-size:48px">${pct===100?'🏆':pct>=66?'🎉':'📖'}</div><div class="score-num">${score}/${quizQs.length}</div><div class="score-msg">${msg}</div><button class="restart-btn" onclick="initQuiz()">Try Again</button></div>`;
    return;
  }
  answered=false;
  const q=quizQs[qIdx];
  box.innerHTML=`<div class="q-counter">Question ${qIdx+1} of ${quizQs.length}</div><div class="q-icon">${q.icon}</div><div class="q-text">${q.q}</div><div class="opts" id="opts"></div><div class="feedback" id="fb"></div><div class="q-nav"><span style="color:var(--muted);font-size:14px">Score: <b style="color:var(--accent)">${score}</b></span><button class="q-btn" id="nxt" onclick="nextQ()" style="display:none">Next →</button></div>`;
  const opts=document.getElementById('opts');
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick=()=>pickAns(i,q.ans); opts.appendChild(b);
  });
}
function pickAns(i,ans){
  if(answered) return; answered=true;
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,j)=>{b.classList.add('locked');if(j===ans)b.classList.add('correct');else if(j===i)b.classList.add('wrong');});
  const fb=document.getElementById('fb');
  if(i===ans){score++;fb.textContent='✅ Correct!';fb.className='feedback ok';}
  else{fb.textContent='❌ Not quite — check the correct answer above!';fb.className='feedback no';}
  document.getElementById('nxt').style.display='block';
}
function nextQ(){qIdx++;renderQ();}

// MATCH
let selNutrient=null, matchedPairs=0, matchState={};
function initMatch(){
  selNutrient=null;matchedPairs=0;matchState={};
  const left=document.getElementById('match-left'),right=document.getElementById('match-right');
  const ni=[0,1,2,3,4,5],ri=[...ni].sort(()=>Math.random()-.5);
  left.innerHTML='';right.innerHTML='';
  ni.forEach(i=>{
    const d=document.createElement('div');d.className='match-item';d.dataset.idx=i;
    d.innerHTML=`${nutrients[i].icon} ${nutrients[i].name}`;
    d.onclick=()=>pickNutrient(i,d);left.appendChild(d);
  });
  ri.forEach(i=>{
    const d=document.createElement('div');d.className='match-item';d.dataset.idx=i;
    d.textContent=roles[i];d.onclick=()=>pickRole(i,d);right.appendChild(d);
  });
  document.getElementById('match-status').textContent='Tap a nutrient, then tap its matching role!';
  document.getElementById('match-score').textContent='';
}
function pickNutrient(i,el){
  if(matchState[i]) return;
  document.querySelectorAll('#match-left .match-item').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');selNutrient=i;
}
function pickRole(i,el){
  if(selNutrient===null){document.getElementById('match-status').textContent='Pick a nutrient first!';return;}
  if(matchState['r'+i]) return;
  const st=document.getElementById('match-status');
  if(selNutrient===i){
    document.querySelectorAll('#match-left .match-item').forEach(e=>{if(parseInt(e.dataset.idx)===selNutrient){e.classList.remove('selected');e.classList.add('matched');}});
    el.classList.add('matched');matchState[selNutrient]=true;matchState['r'+i]=true;
    matchedPairs++;selNutrient=null;
    st.textContent=matchedPairs===6?'🎉 All matched! Amazing work!':'✅ Correct match! Keep going!';
    if(matchedPairs===6)document.getElementById('match-score').textContent='🏆 Perfect score!';
  } else {
    el.style.borderColor='#e24b4a';el.style.color='#e24b4a';
    st.textContent='❌ Try again — that\'s not the right match!';
    setTimeout(()=>{el.style.borderColor='';el.style.color='';},700);
    document.querySelectorAll('#match-left .match-item').forEach(e=>e.classList.remove('selected'));
    selNutrient=null;
  }
}

initQuiz();
</script>
</body>
</html>
