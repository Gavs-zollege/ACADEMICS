<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Measurement Practice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-deep: #0d47a1;
    --blue-mid: #1565c0;
    --blue-light: #e3f2fd;
    --blue-bright: #42a5f5;
    --green-deep: #2e7d32;
    --green-mid: #43a047;
    --green-light: #e8f5e9;
    --green-bright: #66bb6a;
    --orange-deep: #e65100;
    --orange-mid: #ff7043;
    --orange-light: #fff3e0;
    --amber-light: #fff8e1;
    --amber-deep: #f57f17;
    --red-deep: #c62828;
    --red-light: #ffebee;
    --gray-900: #263238;
    --gray-700: #546e7a;
    --gray-500: #78909c;
    --gray-400: #90a4ae;
    --gray-200: #e0e0e0;
    --gray-100: #f5f5f5;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 28px;
    --radius-pill: 999px;
    --shadow-soft: 0 8px 32px rgba(0,0,0,0.06);
    --shadow-btn: 0 4px 14px rgba(21,101,192,0.3);
    --shadow-card: 0 12px 48px rgba(0,0,0,0.08);
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    min-height: 100vh;
    background: linear-gradient(160deg, #dce8f7 0%, #fef0e0 50%, #fbe2ea 100%);
    background-attachment: fixed;
  }

  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

  .btn {
    border: none; font-family: var(--font-body); font-weight: 700; cursor: pointer;
    border-radius: var(--radius-pill); padding: 14px 36px; font-size: 15px;
    transition: transform 0.15s, box-shadow 0.2s, background 0.3s;
    letter-spacing: 0.3px; position: relative; overflow: hidden;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-blue { background: var(--blue-mid); color: #fff; box-shadow: var(--shadow-btn); }
  .btn-green { background: var(--green-mid); color: #fff; box-shadow: 0 4px 14px rgba(67,160,71,0.3); }
  .btn-gradient { background: linear-gradient(135deg, var(--blue-deep), var(--blue-bright)); color: #fff; box-shadow: 0 6px 20px rgba(21,101,192,0.35); }
  .btn-green-gradient { background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); color: #fff; box-shadow: 0 4px 14px rgba(67,160,71,0.3); }
  .btn-pulse { animation: pulse 1.5s infinite; }

  .hidden { display: none !important; }

  /* Intro screen */
  #intro-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .intro-card {
    max-width: 420px; text-align: center; padding: 48px 36px;
    background: rgba(255,255,255,0.88); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card); backdrop-filter: blur(12px);
    animation: fadeUp 0.6s ease;
  }
  .intro-card .emojis { font-size: 58px; margin-bottom: 16px; letter-spacing: 4px; }
  .intro-card h1 { font-size: 26px; font-weight: 800; color: var(--blue-deep); line-height: 1.2; margin-bottom: 12px; }
  .intro-card .desc { color: var(--gray-700); font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
  .intro-card .meta { color: var(--gray-400); font-size: 13px; margin-bottom: 28px; }
  .intro-card .btn { font-size: 17px; padding: 16px 48px; }

  /* Main app */
  #app-screen { padding: 20px 16px; display: none; }
  .app-inner { max-width: 460px; margin: 0 auto; }

  .app-header { text-align: center; margin-bottom: 24px; }
  .app-header h1 { font-size: 20px; font-weight: 800; color: var(--blue-deep); }
  .app-header .patient-info { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

  /* Progress bar */
  .progress-track { height: 8px; background: var(--gray-200); border-radius: 4px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-mid), var(--green-bright)); border-radius: 4px; transition: width 0.5s ease; width: 0; }

  /* Step indicators */
  .step-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .step-dot {
    width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 18px; border: 2px solid var(--gray-200);
    background: var(--gray-100); transition: all 0.3s;
  }
  .step-dot.active { background: var(--blue-light); border-color: var(--blue-bright); }
  .step-dot.completed { background: var(--green-light); border-color: var(--green-bright); }
  .step-dot.future { opacity: 0.4; }

  /* Step card */
  .step-card {
    background: rgba(255,255,255,0.92); border-radius: var(--radius-lg);
    padding: 28px 24px; box-shadow: var(--shadow-soft);
    backdrop-filter: blur(10px); animation: fadeUp 0.4s ease;
  }
  .step-label {
    display: inline-block; padding: 4px 14px; border-radius: 12px;
    background: var(--blue-light); color: var(--blue-mid); font-size: 12px;
    font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .step-card h2 { font-size: 22px; font-weight: 800; color: var(--gray-900); margin-bottom: 8px; }
  .step-card .instruction { color: var(--gray-700); font-size: 14px; line-height: 1.6; margin-bottom: 6px; }
  .step-task {
    color: var(--blue-mid); font-size: 13px; font-weight: 600;
    margin-bottom: 24px; padding: 8px 14px; background: var(--blue-light);
    border-radius: var(--radius-sm); display: inline-block;
  }
  .step-activity { display: flex; justify-content: center; }

  /* Scale display */
  .scale-display {
    width: 280px; height: 180px; border-radius: 20px; background: var(--gray-100);
    border: 3px solid #bbb; display: flex; flex-direction: column;
    align-items: center; justify-content: center; transition: all 0.5s;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  .scale-display.zeroed, .scale-display.stable { background: var(--green-light); border-color: var(--green-bright); }
  .scale-reading { font-size: 42px; font-family: var(--font-mono); font-weight: 700; color: #888; transition: color 0.4s; }
  .scale-display.zeroed .scale-reading,
  .scale-display.stable .scale-reading { color: var(--green-deep); }
  .scale-unit { font-size: 14px; color: #999; margin-top: 4px; }
  .scale-status { font-size: 13px; margin-top: 8px; font-weight: 600; }

  /* Tare button */
  .tare-btn {
    width: 180px; height: 56px; border-radius: 28px; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer; position: relative;
    overflow: hidden; color: #fff; letter-spacing: 1px;
    background: #1e88e5; box-shadow: 0 4px 14px rgba(30,136,229,0.3);
    font-family: var(--font-body); transition: background 0.3s;
  }
  .tare-btn.holding { background: var(--blue-deep); }
  .tare-btn.done { background: var(--green-bright); cursor: default; }
  .tare-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; background: rgba(255,255,255,0.25); }
  .tare-btn span { position: relative; z-index: 1; }

  /* Undress */
  .baby-area {
    width: 220px; height: 260px; background: linear-gradient(135deg, #fff9c4, #fff3e0);
    border-radius: var(--radius-lg); position: relative; border: 2px dashed #ffcc80;
    display: flex; align-items: center; justify-content: center;
  }
  .baby-area .baby-emoji { font-size: 80px; }
  .clothing-btn {
    position: absolute; right: -10px; width: 72px; height: 40px; border-radius: 20px;
    border: 2px solid #ffab40; background: #fff8e1; cursor: pointer;
    font-size: 13px; font-weight: 600; display: flex; align-items: center;
    justify-content: center; gap: 4px; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-family: var(--font-body);
  }
  .clothing-btn:hover { transform: scale(1.05); }
  .clothing-status {
    padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 600;
    transition: all 0.3s;
  }
  .clothing-status.removed { background: #c8e6c9; color: var(--green-deep); }
  .clothing-status.on { background: #ffecb3; color: var(--amber-deep); }

  /* Length board */
  .length-board {
    width: 320px; height: 120px; background: var(--gray-100); border-radius: 12px;
    border: 2px solid #90a4ae; position: relative; overflow: hidden;
  }
  .ruler-track { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: var(--gray-200); }
  .ruler-tick { position: absolute; bottom: 0; width: 1px; background: #616161; }
  .ruler-label { position: absolute; bottom: 22px; left: -8px; font-size: 9px; color: #616161; font-family: var(--font-mono); }
  .headboard { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; background: #78909c; border-radius: 4px 0 0 4px; }
  .footboard {
    position: absolute; top: 0; bottom: 0; width: 8px; background: var(--orange-mid);
    border-radius: 0 4px 4px 0; transition: background 0.3s;
  }
  .footboard.locked { background: var(--green-mid); }
  .length-reading {
    position: absolute; top: 8px; right: 12px; padding: 4px 12px;
    border-radius: 8px; font-size: 18px; font-family: var(--font-mono);
    font-weight: 700; background: var(--orange-light); color: var(--orange-deep);
  }
  .length-reading.locked { background: var(--green-light); color: var(--green-deep); }
  .length-baby { position: absolute; left: 16px; top: 15px; font-size: 50px; transition: all 0.3s; }

  /* Head circ */
  .head-area { width: 200px; height: 200px; position: relative; display: flex; align-items: center; justify-content: center; }
  .head-circle {
    width: 140px; height: 160px; border-radius: 50%; background: #ffe0b2;
    border: 2px solid #ffcc80; position: relative;
  }
  .head-eye { position: absolute; top: 55px; font-size: 12px; }
  .head-mouth { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); font-size: 10px; }
  .eyebrow-line {
    position: absolute; top: 48px; left: 20px; right: 20px;
    border-top: 1px dashed #ef6c00; font-size: 9px; color: #ef6c00;
    text-align: center; padding-top: 2px;
  }
  .tape-measure {
    position: absolute; left: -15px; right: -15px; height: 10px;
    background: rgba(255,112,67,0.5); border: 2px solid var(--orange-mid);
    border-radius: 4px; transition: background 0.3s, border-color 0.3s;
  }
  .tape-measure.locked { background: rgba(67,160,71,0.5); border-color: var(--green-mid); }
  .head-reading {
    padding: 6px 16px; border-radius: 12px; font-size: 22px;
    font-family: var(--font-mono); font-weight: 700;
  }

  /* Record sheet */
  .record-card {
    width: 100%; max-width: 380px; background: #fff; border-radius: var(--radius-md);
    border: 2px solid var(--gray-200); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .record-header {
    padding: 14px 20px; background: var(--blue-mid); color: #fff;
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
  }
  .record-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; border-bottom: 1px solid #f0f0f0;
  }
  .record-row:last-child { border-bottom: none; }
  .record-label { font-size: 13px; color: var(--gray-500); font-weight: 600; }
  .record-value { font-size: 20px; font-weight: 700; color: var(--gray-900); font-family: var(--font-mono); }
  .grade-badge { padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }
  .actual-val { font-size: 11px; color: var(--gray-400); margin-top: 3px; }

  /* Range slider */
  input[type="range"] {
    width: 280px; accent-color: var(--orange-mid); cursor: pointer;
  }
  .slider-label { font-size: 13px; color: var(--gray-700); font-weight: 600; }
</style>
</head>
<body>

<!-- ============ INTRO SCREEN ============ -->
<div id="intro-screen">
  <div class="intro-card">
    <div class="emojis">👶📏⚖️</div>
    <h1>Pediatric Measurement Practice</h1>
    <p class="desc">
      Practice the essential skills of weighing, measuring length, and recording
      head circumference for a <strong id="intro-age"></strong>-month-old infant.
    </p>
    <p class="meta">Interactive step-by-step simulation — 6 steps</p>
    <button class="btn btn-gradient" onclick="beginPractice()" style="font-size:17px;padding:16px 48px;">Begin Practice →</button>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="app-screen">
  <div class="app-inner">
    <div class="app-header">
      <h1>👶 Pediatric Measurements</h1>
      <div class="patient-info">Patient: <span id="header-age"></span>-month-old infant</div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="step-dots" id="step-dots"></div>

    <div class="step-card" id="step-card">
      <div class="step-label" id="step-label"></div>
      <h2 id="step-title"></h2>
      <p class="instruction" id="step-instruction"></p>
      <p class="step-task" id="step-task"></p>
      <div class="step-activity" id="step-activity"></div>
    </div>
  </div>
</div>

<script>
// ============ DATA ============
const STEPS = [
  { id:"zero",title:"Zero the Scale",icon:"⚖️",instruction:"Before weighing, you must zero (tare) the infant scale to ensure accuracy.",task:"Press and hold the TARE button to zero the scale",type:"tare"},
  { id:"undress",title:"Prepare the Infant",icon:"👶",instruction:"Remove the infant's clothing and diaper if possible for the most accurate weight.",task:"Tap each item to remove it",type:"undress"},
  { id:"weigh",title:"Weigh the Infant",icon:"⚖️",instruction:"Place the infant safely on the scale. Wait for the reading to stabilize before recording.",task:"Place the infant on the scale and wait for stabilization",type:"weigh"},
  { id:"length",title:"Measure Recumbent Length",icon:"📏",instruction:"Use the measuring board. Head against the fixed headboard, legs fully extended, feet flat against the footboard.",task:"Position the infant correctly and slide the footboard",type:"length"},
  { id:"head",title:"Measure Head Circumference",icon:"🧠",instruction:"Place the tape measure above the eyebrows and wrap it around the largest part of the head (the occiput).",task:"Drag the tape around the head at the correct position",type:"head"},
  { id:"record",title:"Record Measurements",icon:"📋",instruction:"Enter all measurements into the patient record. Check that values fall within expected ranges for the infant's age.",task:"Record your measurements below",type:"record"}
];

const BABY_AGE_MONTHS = Math.floor(Math.random() * 12) + 1;
const TRUE_WEIGHT = +(2.5 + BABY_AGE_MONTHS * 0.5 + (Math.random() - 0.5)).toFixed(2);
const TRUE_LENGTH = +(45 + BABY_AGE_MONTHS * 2.5 + (Math.random() - 0.5) * 2).toFixed(1);
const TRUE_HEAD = +(33 + BABY_AGE_MONTHS * 1.0 + (Math.random() - 0.5)).toFixed(1);

let currentStep = 0;
let completedSteps = [];
let measurements = { weight: 0, length: 0, head: 0 };

// Init intro
document.getElementById('intro-age').textContent = BABY_AGE_MONTHS;
document.getElementById('header-age').textContent = BABY_AGE_MONTHS;

// ============ NAVIGATION ============
function beginPractice() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  renderStep();
}

function completeStep() {
  if (!completedSteps.includes(currentStep)) completedSteps.push(currentStep);
  updateProgress();
  if (currentStep < STEPS.length - 1) {
    setTimeout(() => { currentStep++; renderStep(); }, 300);
  }
}

function updateProgress() {
  const pct = (completedSteps.length / STEPS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  renderDots();
}

function renderDots() {
  const container = document.getElementById('step-dots');
  container.innerHTML = '';
  STEPS.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot';
    if (completedSteps.includes(i)) { dot.classList.add('completed'); dot.textContent = '✓'; }
    else if (i === currentStep) { dot.classList.add('active'); dot.textContent = s.icon; }
    else { dot.classList.add('future'); dot.textContent = s.icon; }
    container.appendChild(dot);
  });
}

function renderStep() {
  const step = STEPS[currentStep];
  document.getElementById('step-label').textContent = `STEP ${currentStep+1} of ${STEPS.length}`;
  document.getElementById('step-title').textContent = `${step.icon} ${step.title}`;
  document.getElementById('step-instruction').textContent = step.instruction;
  document.getElementById('step-task').textContent = `🎯 ${step.task}`;

  // Re-animate card
  const card = document.getElementById('step-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease';

  renderDots();
  renderActivity(step.type);
}

// ============ ACTIVITIES ============
function renderActivity(type) {
  const el = document.getElementById('step-activity');
  switch(type) {
    case 'tare': el.innerHTML = buildTare(); initTare(); break;
    case 'undress': el.innerHTML = buildUndress(); initUndress(); break;
    case 'weigh': el.innerHTML = buildWeigh(); initWeigh(); break;
    case 'length': el.innerHTML = buildLength(); initLength(); break;
    case 'head': el.innerHTML = buildHead(); initHead(); break;
    case 'record': el.innerHTML = buildRecord(); initRecord(); break;
  }
}

// ---- TARE ----
function buildTare() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
      <div class="scale-display" id="tare-scale">
        <div class="scale-reading" id="tare-reading">---</div>
        <div class="scale-unit">kg</div>
        <div class="scale-status hidden" id="tare-status" style="color:var(--green-deep)">✓ Scale Zeroed</div>
      </div>
      <button class="tare-btn" id="tare-btn"
        onmousedown="tareStart()" onmouseup="tareEnd()" onmouseleave="tareEnd()"
        ontouchstart="tareStart()" ontouchend="tareEnd()">
        <div class="tare-fill" id="tare-fill"></div>
        <span id="tare-label">HOLD TARE</span>
      </button>
    </div>`;
}
let tareInterval = null, tareProgress = 0, tareDone = false;
function initTare() { tareProgress = 0; tareDone = false; }
function tareStart() {
  if (tareDone) return;
  document.getElementById('tare-btn').classList.add('holding');
  document.getElementById('tare-label').textContent = 'HOLD...';
  tareProgress = 0;
  tareInterval = setInterval(() => {
    tareProgress += 4;
    document.getElementById('tare-fill').style.width = tareProgress + '%';
    if (tareProgress >= 100) {
      clearInterval(tareInterval);
      tareDone = true;
      document.getElementById('tare-btn').classList.remove('holding');
      document.getElementById('tare-btn').classList.add('done');
      document.getElementById('tare-label').textContent = '✓ ZEROED';
      document.getElementById('tare-reading').textContent = '0.00';
      document.getElementById('tare-scale').classList.add('zeroed');
      document.getElementById('tare-status').classList.remove('hidden');
      setTimeout(completeStep, 600);
    }
  }, 50);
}
function tareEnd() {
  if (tareDone) return;
  clearInterval(tareInterval);
  tareProgress = 0;
  document.getElementById('tare-fill').style.width = '0%';
  document.getElementById('tare-btn').classList.remove('holding');
  document.getElementById('tare-label').textContent = 'HOLD TARE';
}

// ---- UNDRESS ----
function buildUndress() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="baby-area">
        <span class="baby-emoji">👶</span>
        <button class="clothing-btn" id="btn-hat" style="top:30px" onclick="removeClothing('hat')">🧢 ✕</button>
        <button class="clothing-btn" id="btn-shirt" style="top:100px" onclick="removeClothing('shirt')">👕 ✕</button>
        <button class="clothing-btn" id="btn-diaper" style="top:170px" onclick="removeClothing('diaper')">🩲 ✕</button>
      </div>
      <div style="display:flex;gap:12px">
        <div class="clothing-status on" id="status-hat">○ Hat</div>
        <div class="clothing-status on" id="status-shirt">○ Onesie</div>
        <div class="clothing-status on" id="status-diaper">○ Diaper</div>
      </div>
    </div>`;
}
let clothingState = {};
function initUndress() { clothingState = { hat: false, shirt: false, diaper: false }; }
function removeClothing(item) {
  if (clothingState[item]) return;
  clothingState[item] = true;
  document.getElementById('btn-' + item).classList.add('hidden');
  const labels = { hat: 'Hat', shirt: 'Onesie', diaper: 'Diaper' };
  const st = document.getElementById('status-' + item);
  st.textContent = '✓ ' + labels[item];
  st.className = 'clothing-status removed';
  if (clothingState.hat && clothingState.shirt && clothingState.diaper) {
    setTimeout(completeStep, 800);
  }
}

// ---- WEIGH ----
function buildWeigh() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="scale-display" id="weigh-scale">
        <div class="scale-reading" id="weigh-reading">0.00</div>
        <div class="scale-unit">kg</div>
        <div class="scale-status hidden" id="weigh-stabilizing" style="color:var(--orange-deep)">⏳ Stabilizing...</div>
        <div class="scale-status hidden" id="weigh-stable" style="color:var(--green-deep)">✓ Stable reading</div>
      </div>
      <button class="btn btn-blue" id="weigh-place-btn" onclick="placeInfant()">👶 Place Infant on Scale</button>
      <button class="btn btn-green btn-pulse hidden" id="weigh-record-btn" onclick="recordWeight()">📝 Record Weight: ${TRUE_WEIGHT} kg</button>
    </div>`;
}
let weighPlaced = false, weighStable = false, weighRecorded = false;
function initWeigh() { weighPlaced = false; weighStable = false; weighRecorded = false; }
function placeInfant() {
  if (weighPlaced) return;
  weighPlaced = true;
  document.getElementById('weigh-place-btn').classList.add('hidden');
  document.getElementById('weigh-stabilizing').classList.remove('hidden');
  document.getElementById('weigh-reading').style.color = 'var(--orange-deep)';
  let count = 0;
  const flicker = setInterval(() => {
    document.getElementById('weigh-reading').textContent = (TRUE_WEIGHT + (Math.random()-0.5)*0.3).toFixed(2);
    count++;
    if (count > 12) {
      clearInterval(flicker);
      document.getElementById('weigh-reading').textContent = TRUE_WEIGHT.toFixed(2);
      document.getElementById('weigh-reading').style.color = 'var(--green-deep)';
      document.getElementById('weigh-stabilizing').classList.add('hidden');
      document.getElementById('weigh-stable').classList.remove('hidden');
      document.getElementById('weigh-scale').classList.add('stable');
      document.getElementById('weigh-record-btn').classList.remove('hidden');
      weighStable = true;
    }
  }, 200);
}
function recordWeight() {
  if (weighRecorded) return;
  weighRecorded = true;
  measurements.weight = TRUE_WEIGHT;
  document.getElementById('weigh-record-btn').classList.add('hidden');
  setTimeout(completeStep, 500);
}

// ---- LENGTH ----
function buildLength() {
  let ticks = '';
  for (let i = 0; i < 32; i++) {
    const left = (i / 31) * 100;
    const h = i % 5 === 0 ? 20 : 10;
    ticks += `<div class="ruler-tick" style="left:${left}%;height:${h}px">`;
    if (i % 10 === 0) ticks += `<span class="ruler-label">${40 + i*2}</span>`;
    ticks += `</div>`;
  }
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="length-board">
        <div class="ruler-track">${ticks}</div>
        <div class="headboard"></div>
        <div class="length-baby hidden" id="length-baby">👶</div>
        <div class="footboard" id="footboard" style="left:0%"></div>
        <div class="length-reading hidden" id="length-reading">40.0 cm</div>
      </div>
      <button class="btn btn-blue" id="length-step0-btn" onclick="lengthStep(1)">Position head against headboard</button>
      <button class="btn btn-blue hidden" id="length-step1-btn" onclick="lengthStep(2)">Extend legs & position footboard</button>
      <div class="hidden" id="length-slider-area" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
        <label class="slider-label">Slide the footboard to measure length:</label>
        <input type="range" min="40" max="102" step="0.1" value="40" id="length-slider" oninput="updateLength()">
        <button class="btn btn-green" id="length-record-btn" onclick="lockLength()">📝 Record Length: 40.0 cm</button>
      </div>
      <div class="hidden" id="length-done" style="color:var(--green-deep);font-weight:700;font-size:15px">✓ Length recorded!</div>
    </div>`;
}
let lengthLocked = false;
function initLength() { lengthLocked = false; }
function lengthStep(s) {
  if (s === 1) {
    document.getElementById('length-baby').classList.remove('hidden');
    document.getElementById('length-step0-btn').classList.add('hidden');
    document.getElementById('length-step1-btn').classList.remove('hidden');
  } else {
    document.getElementById('length-step1-btn').classList.add('hidden');
    document.getElementById('length-reading').classList.remove('hidden');
    document.getElementById('length-slider-area').classList.remove('hidden');
    document.getElementById('length-slider-area').style.display = 'flex';
  }
}
function updateLength() {
  if (lengthLocked) return;
  const val = parseFloat(document.getElementById('length-slider').value);
  document.getElementById('length-reading').textContent = val.toFixed(1) + ' cm';
  document.getElementById('footboard').style.left = ((val - 40) / 62) * 100 + '%';
  document.getElementById('length-record-btn').textContent = `📝 Record Length: ${val.toFixed(1)} cm`;
}
function lockLength() {
  lengthLocked = true;
  const val = parseFloat(document.getElementById('length-slider').value);
  measurements.length = +val.toFixed(1);
  document.getElementById('length-slider-area').classList.add('hidden');
  document.getElementById('footboard').classList.add('locked');
  document.getElementById('length-reading').classList.add('locked');
  document.getElementById('length-done').classList.remove('hidden');
  setTimeout(completeStep, 600);
}

// ---- HEAD CIRCUMFERENCE ----
function buildHead() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="head-area">
        <div class="head-circle">
          <div class="head-eye" style="left:35px">👁️</div>
          <div class="head-eye" style="right:35px">👁️</div>
          <div class="head-mouth">👄</div>
          <div class="eyebrow-line">↑ above eyebrows</div>
          <div class="tape-measure" id="tape" style="top:50%"></div>
        </div>
      </div>
      <div class="head-reading" id="head-reading" style="background:var(--orange-light);color:var(--orange-deep)">30.0 cm</div>
      <div id="head-controls" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
        <label class="slider-label">Adjust tape position (above eyebrows → around occiput):</label>
        <input type="range" min="28" max="46" step="0.1" value="30" id="head-slider" oninput="updateHead()" style="width:260px">
        <button class="btn btn-green" id="head-record-btn" onclick="lockHead()">📝 Record: 30.0 cm</button>
      </div>
      <div class="hidden" id="head-done" style="color:var(--green-deep);font-weight:700">✓ Head circumference recorded!</div>
    </div>`;
}
let headLocked = false;
function initHead() { headLocked = false; }
function updateHead() {
  if (headLocked) return;
  const val = parseFloat(document.getElementById('head-slider').value);
  const correctMin = TRUE_HEAD - 1.5, correctMax = TRUE_HEAD + 1.5;
  const correct = val >= correctMin && val <= correctMax;
  document.getElementById('head-reading').textContent = val.toFixed(1) + ' cm';
  document.getElementById('head-reading').style.background = correct ? 'var(--green-light)' : 'var(--orange-light)';
  document.getElementById('head-reading').style.color = correct ? 'var(--green-deep)' : 'var(--orange-deep)';
  const pct = 100 - ((val - 28) / 18) * 100;
  document.getElementById('tape').style.top = pct + '%';
  document.getElementById('head-record-btn').textContent = `📝 Record: ${val.toFixed(1)} cm`;
}
function lockHead() {
  headLocked = true;
  const val = parseFloat(document.getElementById('head-slider').value);
  measurements.head = +val.toFixed(1);
  document.getElementById('head-controls').classList.add('hidden');
  document.getElementById('tape').classList.add('locked');
  document.getElementById('head-done').classList.remove('hidden');
  setTimeout(completeStep, 600);
}

// ---- RECORD SHEET ----
function buildRecord() {
  const rows = [
    { label:'Weight', value:`${measurements.weight} kg`, actual:`${TRUE_WEIGHT} kg`, diff: Math.abs(measurements.weight - TRUE_WEIGHT), threshold: 0.05 },
    { label:'Length', value:`${measurements.length} cm`, actual:`${TRUE_LENGTH} cm`, diff: Math.abs(measurements.length - TRUE_LENGTH), threshold: 1 },
    { label:'Head Circ.', value:`${measurements.head} cm`, actual:`${TRUE_HEAD} cm`, diff: Math.abs(measurements.head - TRUE_HEAD), threshold: 1 }
  ];
  let rowsHtml = rows.map((r, i) => {
    const grade = r.diff <= r.threshold ? { label:'Excellent', color:'var(--green-deep)', bg:'var(--green-light)' }
      : r.diff <= r.threshold*3 ? { label:'Good', color:'var(--amber-deep)', bg:'var(--amber-light)' }
      : { label:'Retry', color:'var(--red-deep)', bg:'var(--red-light)' };
    return `<div class="record-row">
      <div>
        <div class="record-label">${r.label}</div>
        <div class="record-value">${r.value}</div>
      </div>
      <div class="record-feedback hidden" style="text-align:right">
        <div class="grade-badge" style="background:${grade.bg};color:${grade.color}">${grade.label}</div>
        <div class="actual-val">Actual: ${r.actual}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%">
      <div class="record-card">
        <div class="record-header">📋 Patient Record — Infant (${BABY_AGE_MONTHS} months)</div>
        ${rowsHtml}
      </div>
      <button class="btn btn-blue" id="check-btn" onclick="checkAccuracy()">Check My Accuracy</button>
      <button class="btn btn-green-gradient hidden" id="restart-btn" onclick="restartPractice()">🔄 Practice Again (New Infant)</button>
    </div>`;
}
function initRecord() {}
function checkAccuracy() {
  document.querySelectorAll('.record-feedback').forEach(el => el.classList.remove('hidden'));
  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('restart-btn').classList.remove('hidden');
  if (!completedSteps.includes(currentStep)) completedSteps.push(currentStep);
  updateProgress();
}
function restartPractice() { window.location.reload(); }
</script>
</body>
</html>
