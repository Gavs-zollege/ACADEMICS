<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Specimen Collection Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #0a3a5c 0%, #0d4f7a 50%, #1a6fa8 100%); min-height: 100vh; padding: 20px; }
  #app {
    min-height: 520px;
    background: linear-gradient(135deg, #1a6fa8 0%, #0d4f7a 50%, #0a3a5c 100%);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  #app::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.06) 0%, transparent 40%);
    border-radius: 16px;
    pointer-events: none;
  }
  .title { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.4); position: relative; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,0.8); text-align: center; margin-bottom: 22px; font-weight: 500; position: relative; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.12); border-radius: 12px; padding: 10px 16px; margin-bottom: 20px; position: relative; }
  .score-item { text-align: center; }
  .score-label { font-size: 11px; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .score-val { font-size: 20px; font-weight: 700; color: #fff; }
  .progress-wrap { flex: 1; margin: 0 16px; }
  .progress-track { background: rgba(255,255,255,0.2); border-radius: 6px; height: 8px; }
  .progress-fill { background: #4ade80; border-radius: 6px; height: 8px; transition: width 0.4s ease; }
  .q-card { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 20px; margin-bottom: 16px; position: relative; }
  .q-label { font-size: 12px; font-weight: 700; color: #1a6fa8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .q-text { font-size: 16px; font-weight: 700; color: #0d2a3f; line-height: 1.5; margin-bottom: 16px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn { background: #f0f7ff; border: 2px solid #b5d4f4; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 700; color: #0d2a3f; cursor: pointer; text-align: left; transition: all 0.18s ease; display: flex; align-items: center; gap: 10px; }
  .opt-btn:hover:not(:disabled) { background: #dbeeff; border-color: #378add; transform: translateX(4px); }
  .opt-btn.correct { background: #d1fae5; border-color: #059669; color: #064e3b; }
  .opt-btn.wrong { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
  .opt-btn:disabled { cursor: default; }
  .opt-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .feedback-box { border-radius: 10px; padding: 12px 14px; margin-top: 14px; font-size: 14px; font-weight: 700; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.ok { background: #d1fae5; color: #064e3b; border: 1.5px solid #059669; }
  .feedback-box.no { background: #fee2e2; color: #7f1d1d; border: 1.5px solid #dc2626; }
  .next-btn { width: 100%; margin-top: 14px; background: #1a6fa8; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.18s; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #0d4f7a; }
  .result-card { background: rgba(255,255,255,0.95); border-radius: 14px; padding: 28px 20px; text-align: center; position: relative; }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 22px; font-weight: 700; color: #0d2a3f; margin-bottom: 8px; }
  .result-sub { font-size: 15px; font-weight: 600; color: #1a6fa8; margin-bottom: 20px; }
  .result-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .rb-item { background: #f0f7ff; border-radius: 10px; padding: 12px; }
  .rb-val { font-size: 24px; font-weight: 700; color: #0d2a3f; }
  .rb-label { font-size: 12px; font-weight: 600; color: #1a6fa8; text-transform: uppercase; letter-spacing: 0.5px; }
  .restart-btn { background: #1a6fa8; color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.18s; }
  .restart-btn:hover { background: #0d4f7a; }
  .step-icon { font-size: 28px; margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>
<div id="app">
  <div class="title">🩺 Specimen Collection Quiz</div>
  <div class="subtitle">Test your knowledge of proper collection procedures</div>
  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Score</div>
      <div class="score-val" id="scoreVal">0</div>
    </div>
    <div class="progress-wrap">
      <div style="font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;text-align:center;margin-bottom:4px;" id="progressLabel">Step 1 of 6</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="score-item">
      <div class="score-label">Streak</div>
      <div class="score-val" id="streakVal">0🔥</div>
    </div>
  </div>
  <div id="quizArea"></div>
</div>

<script>
const questions = [
  { icon:"🪪", step:"Step 1 — Patient Identity", text:"Before performing a specimen collection, what is the FIRST thing you must do?", options:[{text:"Put on gloves and PPE",correct:false},{text:"Verify the patient's identity and explain the test",correct:true},{text:"Prepare the collection device",correct:false},{text:"Document the date and time",correct:false}], feedback:{ok:"Correct! Always verify patient identity first to ensure accuracy and patient safety.",no:"Not quite. Verifying patient identity comes FIRST — before any clinical action."} },
  { icon:"🧤", step:"Step 2 — PPE", text:"Which PPE item is ESSENTIAL when collecting a specimen?", options:[{text:"Safety goggles only",correct:false},{text:"Full hazmat suit",correct:false},{text:"Gloves (following PPE requirements)",correct:true},{text:"Shoe covers only",correct:false}], feedback:{ok:"Excellent! Gloves are mandatory to protect both the collector and the patient from cross-contamination.",no:"Gloves are the minimum required PPE. Always follow your facility's full PPE requirements."} },
  { icon:"🧪", step:"Step 2 — PPE", text:"Why do we follow PPE requirements during specimen collection?", options:[{text:"To look professional",correct:false},{text:"To protect against infection and cross-contamination",correct:true},{text:"It is optional but recommended",correct:false},{text:"Only required for blood samples",correct:false}], feedback:{ok:"Right! PPE protects both the healthcare worker and patient from harmful pathogens.",no:"PPE is always about infection control — protecting yourself and others from contamination."} },
  { icon:"🔬", step:"Step 3 — Reading the Result", text:"When reading a rapid test result, which lines must you check?", options:[{text:"Only the Test (T) line",correct:false},{text:"Both the Control (C) and Test (T) lines",correct:true},{text:"Only the Control (C) line",correct:false},{text:"No lines are needed — read the color",correct:false}], feedback:{ok:"Spot on! The Control (C) line confirms the test worked correctly. The Test (T) line shows the result.",no:"You must check BOTH lines. The C line validates the test; the T line gives the result."} },
  { icon:"✅", step:"Step 3 — Reading the Result", text:"A rapid test shows ONLY a Control (C) line and NO Test (T) line. What does this mean?", options:[{text:"Invalid test — repeat it",correct:false},{text:"Positive result",correct:false},{text:"Negative result",correct:true},{text:"Inconclusive — needs lab confirmation",correct:false}], feedback:{ok:"Correct! One line at C only = Negative. Two lines (C + T) = Positive. No C line = Invalid.",no:"One line at C = Negative. Always remember: C line alone means no target detected."} },
  { icon:"📋", step:"Step 4 — Documentation", text:"After obtaining the result, what information must be documented? (Select the BEST answer)", options:[{text:"Only the result",correct:false},{text:"Date, time, result, and LMP",correct:true},{text:"Patient name only",correct:false},{text:"The brand of the test kit",correct:false}], feedback:{ok:"Perfect! Full documentation — Date, Time, Result, and LMP — is essential for accurate medical records.",no:"Complete documentation requires Date, Time, Result, AND LMP (Last Menstrual Period) for full clinical context."} }
];

let current=0, score=0, streak=0, answered=false;

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function render() {
  const area = document.getElementById('quizArea');
  if (current >= questions.length) { showResult(area); return; }
  const q = questions[current];
  const shuffled = shuffle(q.options);
  document.getElementById('progressLabel').textContent = `Step ${current+1} of ${questions.length}`;
  document.getElementById('progressFill').style.width = Math.round((current/questions.length)*100)+'%';
  answered = false;
  area.innerHTML = `
    <div class="q-card">
      <div class="q-label"><span class="step-icon">${q.icon}</span>${q.step}</div>
      <div class="q-text">${q.text}</div>
      <div class="options" id="opts">
        ${shuffled.map((o,i)=>`
          <button class="opt-btn" onclick="pick(this,${o.correct})" data-correct="${o.correct}">
            <span class="opt-icon">${['🅐','🅑','🅒','🅓'][i]}</span>
            <span>${o.text}</span>
          </button>`).join('')}
      </div>
      <div class="feedback-box" id="fb"></div>
      <button class="next-btn" id="nextBtn" onclick="next()">${current<questions.length-1?'Next Question →':'See Results 🎉'}</button>
    </div>`;
}

function pick(btn, correct) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  document.querySelectorAll('.opt-btn').forEach(b => { b.disabled=true; if(b.dataset.correct==='true') b.classList.add('correct'); });
  const fb = document.getElementById('fb');
  if (correct) {
    btn.classList.add('correct');
    score += 10+(streak*2); streak++;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('streakVal').textContent = streak+'🔥';
    fb.className='feedback-box show ok'; fb.innerHTML='✅ '+q.feedback.ok;
  } else {
    btn.classList.add('wrong'); streak=0;
    document.getElementById('streakVal').textContent='0🔥';
    fb.className='feedback-box show no'; fb.innerHTML='❌ '+q.feedback.no;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function next() { current++; render(); }

function showResult(area) {
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='Complete!';
  const pct = Math.round((score/(questions.length*14))*100);
  const emoji = pct>=85?'🏆':pct>=60?'👍':'📚';
  const msg = pct>=85?'Outstanding! You are ready to collect!':pct>=60?'Good effort! Review the steps and try again.':'Keep practicing — patient safety depends on accuracy!';
  area.innerHTML=`
    <div class="result-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">Quiz Complete!</div>
      <div class="result-sub">${msg}</div>
      <div class="result-breakdown">
        <div class="rb-item"><div class="rb-val">${score}</div><div class="rb-label">Final Score</div></div>
        <div class="rb-item"><div class="rb-val">${questions.length}</div><div class="rb-label">Questions</div></div>
        <div class="rb-item"><div class="rb-val">${pct}%</div><div class="rb-label">Accuracy</div></div>
        <div class="rb-item"><div class="rb-val">4</div><div class="rb-label">Steps Covered</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 Try Again</button>
    </div>`;
}

function restart() {
  current=0; score=0; streak=0;
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('streakVal').textContent='0🔥';
  render();
}

render();
</script>
</body>
</html>
