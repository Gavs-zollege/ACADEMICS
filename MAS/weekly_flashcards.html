<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emergency Flashcards</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#1a0a0a 0%,#2d0f0f 50%,#1a0a0a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:'Segoe UI',sans-serif;color:#fff}
  .badge{background:rgba(180,30,30,0.25);border:1px solid rgba(180,30,30,0.5);border-radius:30px;padding:6px 20px;display:inline-block;font-size:13px;color:#f87171;font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
  h1{font-size:clamp(22px,4vw,32px);font-weight:800;margin:0 0 4px;color:#fff;text-align:center}
  .subtitle{color:#fca5a5;font-size:14px;text-align:center;margin-bottom:10px}
  .progress-wrap{width:100%;max-width:600px;margin-bottom:16px}
  .progress-labels{display:flex;justify-content:space-between;font-size:13px;color:#fca5a5;margin-bottom:6px}
  .progress-bar-bg{background:rgba(255,255,255,0.1);border-radius:20px;height:8px}
  .progress-bar{background:linear-gradient(90deg,#b91c1c,#ef4444);height:8px;border-radius:20px;transition:width 0.4s ease;width:0%}
  .card{width:100%;max-width:600px;min-height:220px;border-radius:20px;border:2px solid rgba(255,255,255,0.1);box-shadow:0 20px 50px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 28px;cursor:pointer;transition:all 0.35s ease;text-align:center;position:relative;background:linear-gradient(135deg,#111827,#1f2937)}
  .card.flipped{background:linear-gradient(135deg,#7f1d1d,#b91c1c);border-color:#ef4444}
  .card-label{position:absolute;top:14px;right:18px;font-size:11px;font-weight:700;letter-spacing:1px;color:#6b7280;text-transform:uppercase}
  .card.flipped .card-label{color:#fca5a5}
  .card-text{font-size:clamp(14px,2.5vw,17px);line-height:1.6;color:#f3f4f6;font-weight:600;white-space:pre-line}
  .card.flipped .card-text{font-weight:400}
  .card-hint{margin-top:20px;font-size:12px;color:#9ca3af;font-style:italic}
  .card.flipped .card-hint{color:#fca5a5}
  .btns{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap;justify-content:center}
  button{border-radius:12px;padding:13px 28px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.5px;border:none}
  .btn-prev{background:rgba(255,255,255,0.08);color:#fff;border:2px solid rgba(255,255,255,0.2)!important}
  .btn-flip{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;box-shadow:0 4px 14px rgba(220,38,38,0.4)}
  .btn-next{background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;box-shadow:0 4px 14px rgba(21,128,61,0.4)}
  .btn-reset{margin-top:16px;background:transparent;color:#f87171;border:2px solid #f87171!important;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px}
  .dots{display:flex;gap:7px;margin-top:20px;flex-wrap:wrap;justify-content:center;max-width:400px}
  .dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.2);cursor:pointer;transition:background 0.3s;border:2px solid transparent}
  .dot.current{background:#ef4444;border-color:#fff}
  .dot.reviewed{background:#16a34a}
  .legend{display:flex;gap:18px;margin-top:12px;font-size:12px;color:#9ca3af}
  .tip{margin-top:20px;font-size:12px;color:#6b7280;text-align:center}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:10px">
  <div class="badge">🚨 When Every Second Counts</div>
  <h1>🩺 Emergency Flashcards</h1>
  <p class="subtitle">A fun recall activity to reinforce your emergency knowledge!</p>
</div>

<div class="progress-wrap">
  <div class="progress-labels">
    <span id="cardCounter">Card 1 of 10</span>
    <span id="reviewedLabel">0 reviewed · 0% done</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="card" id="card" onclick="toggleFlip()">
  <div class="card-label" id="cardLabel">❓ Question</div>
  <div class="card-text" id="cardText"></div>
  <div class="card-hint" id="cardHint">👆 Click the card to reveal the answer</div>
</div>

<div class="btns">
  <button class="btn-prev" onclick="prev()">◀ Previous</button>
  <button class="btn-flip" id="flipBtn" onclick="toggleFlip()">💡 Reveal Answer</button>
  <button class="btn-next" onclick="next()">Next ▶</button>
</div>

<div class="dots" id="dots"></div>
<div class="legend"><span>🔴 Current</span><span>🟢 Reviewed</span><span>⚪ Not yet visited</span></div>
<button class="btn-reset" id="resetBtn" style="display:none" onclick="reset()">🔁 Reset All Cards</button>
<p class="tip">💬 Tip: Go through all cards at least twice for the best recall!</p>

<script>
const cards=[
  {q:"What are the 5 common medical emergencies seen in an outpatient office?",a:"Syncope (fainting), Seizures, Hypoglycemia, Asthma attacks, and Anaphylaxis — plus Cardiac Arrest."},
  {q:"What are the 5 First Steps in a Medical Emergency?",a:"1. Assess the scene for safety\n2. Call for help or activate EMS\n3. Stay calm and reassure the patient\n4. Begin appropriate interventions (as trained)\n5. Document everything"},
  {q:"What is the Medical Assistant's role during an emergency?",a:"Stay with the patient and provide basic life support if certified, retrieve the emergency kit or AED, communicate clearly with the team, assist the physician or nurse, and document the event and care provided."},
  {q:"Name 4 pieces of Emergency Equipment found in a clinic.",a:"AED (Automated External Defibrillator), Emergency kit, Oxygen tank and mask, Blood pressure cuff and stethoscope, and Glucometer."},
  {q:"What should be included in Emergency Documentation?",a:"Time of onset and discovery, vital signs and observations, interventions performed, time EMS was called and arrived, and communication with the patient's family."},
  {q:"In Case Scenario #1 (Syncope after blood draw) — What do you do FIRST?",a:"Ensure the patient's safety by having them lie down or lean back to prevent a fall, assess responsiveness, stay calm, and call for help if the patient loses consciousness."},
  {q:"In Case Scenario #2 (Anaphylaxis) — What are the 3 key actions?",a:"1. Identify signs of anaphylaxis (swelling, difficulty breathing)\n2. Locate and administer epinephrine if trained\n3. Monitor breathing and circulation"},
  {q:"What are the 4 key Emergency Protocol items every MA should know?",a:"Office-specific emergency plan, regular drills and training, location of emergency exits, and how to call EMS from office phones."},
  {q:"What are the 4 wrap-up takeaways for emergency preparedness?",a:"1. Emergencies require quick, calm responses\n2. Know your scope of practice\n3. Always call for help if unsure\n4. Practice improves readiness"},
  {q:"What does AED stand for and when is it used?",a:"AED stands for Automated External Defibrillator. It is used during cardiac arrest to analyze the heart rhythm and deliver an electric shock if needed to restore a normal heartbeat."}
];

let idx=0, flipped=false, done=[];

function render(){
  const card=cards[idx], total=cards.length;
  const progress=Math.round(done.length/total*100);
  document.getElementById('cardCounter').textContent=`Card ${idx+1} of ${total}`;
  document.getElementById('reviewedLabel').textContent=`${done.length} reviewed · ${progress}% done`;
  document.getElementById('progressBar').style.width=progress+'%';
  document.getElementById('cardText').textContent=flipped?card.a:card.q;
  document.getElementById('cardLabel').textContent=flipped?'✅ Answer':'❓ Question';
  document.getElementById('cardHint').textContent=flipped?'Click to see the question again':'👆 Click the card to reveal the answer';
  document.getElementById('flipBtn').textContent=flipped?'🔄 Show Question':'💡 Reveal Answer';
  document.getElementById('card').className=flipped?'card flipped':'card';
  document.getElementById('resetBtn').style.display=done.length>0?'':'none';
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  cards.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===idx?' current':done.includes(i)?' reviewed':'');
    d.title=`Card ${i+1}`;
    d.onclick=()=>{idx=i;flipped=false;render();};
    dotsEl.appendChild(d);
  });
}

function toggleFlip(){flipped=!flipped;render();}
function next(){if(!done.includes(idx))done=[...done,idx];idx=(idx+1)%cards.length;flipped=false;render();}
function prev(){idx=(idx-1+cards.length)%cards.length;flipped=false;render();}
function reset(){idx=0;flipped=false;done=[];render();}

render();
</script>
</body>
</html>
